<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chronicle — AI RPG</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Cinzel:wght@400;700&display=swap');

:root {
  --bg: #0a0a0f;
  --bg2: #12121a;
  --bg3: #1a1a26;
  --gold: #c8a44e;
  --gold-dim: #8a7235;
  --text: #d4c5a0;
  --text-dim: #7a7060;
  --red: #a83232;
  --blue: #3a5a8a;
  --accent: #e8d5a0;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Noto Serif JP', serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
}

/* ===== SETUP SCREEN ===== */
#setup {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100dvh;
  padding: 20px;
  background: radial-gradient(ellipse at center, #1a1520 0%, #0a0a0f 70%);
}

#setup h1 {
  font-family: 'Cinzel', serif;
  font-size: clamp(2rem, 6vw, 3.5rem);
  color: var(--gold);
  letter-spacing: 0.15em;
  margin-bottom: 8px;
  text-shadow: 0 0 30px rgba(200,164,78,0.3);
}

#setup .subtitle {
  font-size: 0.75rem;
  color: var(--text-dim);
  letter-spacing: 0.3em;
  margin-bottom: 40px;
}

.setup-group {
  width: 100%;
  max-width: 500px;
  margin-bottom: 24px;
}

.setup-group label {
  display: block;
  font-size: 0.85rem;
  color: var(--gold);
  margin-bottom: 6px;
  letter-spacing: 0.05em;
}

.setup-group .hint {
  font-size: 0.7rem;
  color: var(--text-dim);
  margin-bottom: 8px;
  line-height: 1.5;
}

.setup-group input,
.setup-group textarea {
  width: 100%;
  background: var(--bg2);
  border: 1px solid var(--gold-dim);
  color: var(--text);
  padding: 10px 14px;
  border-radius: 4px;
  font-family: 'Noto Serif JP', serif;
  font-size: 0.9rem;
  outline: none;
  transition: border-color 0.2s;
}

.setup-group input:focus,
.setup-group textarea:focus {
  border-color: var(--gold);
}

.setup-group textarea { resize: vertical; min-height: 60px; }

#btn-start {
  font-family: 'Cinzel', serif;
  font-size: 1rem;
  background: linear-gradient(135deg, var(--gold-dim), var(--gold));
  color: var(--bg);
  border: none;
  padding: 14px 48px;
  border-radius: 4px;
  cursor: pointer;
  letter-spacing: 0.1em;
  font-weight: 700;
  margin-top: 16px;
  transition: transform 0.15s, box-shadow 0.15s;
}

#btn-start:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(200,164,78,0.3); }
#btn-start:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

.key-note {
  font-size: 0.65rem;
  color: var(--text-dim);
  margin-top: 4px;
  line-height: 1.4;
}

.key-note a { color: var(--gold-dim); }

/* ===== GAME SCREEN ===== */
#game { display: none; flex-direction: column; min-height: 100dvh; }

/* Top bar */
.topbar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 16px;
  background: var(--bg2);
  border-bottom: 1px solid #2a2a35;
  font-size: 0.75rem;
  flex-wrap: wrap;
}

.stat { display: flex; align-items: center; gap: 4px; }
.stat-bar {
  width: 60px; height: 6px;
  background: #2a2a35;
  border-radius: 3px;
  overflow: hidden;
}
.stat-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
.hp-fill { background: var(--red); width: 100%; }
.mp-fill { background: var(--blue); width: 100%; }

.topbar .lv { color: var(--gold); font-weight: 700; margin-left: auto; }

/* Story area */
.story-area {
  flex: 1;
  overflow-y: auto;
  padding: 20px 16px 120px;
  scroll-behavior: smooth;
}

.story-block {
  margin-bottom: 16px;
  animation: fadeIn 0.4s ease;
}

@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

.story-block.narrator {
  line-height: 1.9;
  font-size: 0.95rem;
  color: var(--text);
}

.story-block.action {
  color: var(--gold);
  font-size: 0.85rem;
  padding: 8px 0;
  border-left: 2px solid var(--gold-dim);
  padding-left: 12px;
}

.story-block.action::before {
  content: '▸ ';
  color: var(--gold-dim);
}

.story-block.system {
  color: var(--text-dim);
  font-size: 0.8rem;
  text-align: center;
  padding: 12px;
}

.story-block.error {
  color: #c44;
  font-size: 0.8rem;
  padding: 8px 12px;
  background: rgba(200,60,60,0.1);
  border-radius: 4px;
}

/* Loading */
.loading-dots { display: inline-flex; gap: 4px; padding: 12px 0; }
.loading-dots span {
  width: 6px; height: 6px;
  background: var(--gold-dim);
  border-radius: 50%;
  animation: bounce 1.2s infinite;
}
.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,80%,100% { transform:translateY(0); } 40% { transform:translateY(-8px); } }

/* Input area */
.input-area {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--bg2);
  border-top: 1px solid #2a2a35;
  padding: 10px 12px;
  padding-bottom: max(10px, env(safe-area-inset-bottom));
}

.mode-tabs {
  display: flex;
  gap: 2px;
  margin-bottom: 8px;
}

.mode-tab {
  flex: 1;
  padding: 6px;
  background: var(--bg3);
  border: 1px solid transparent;
  color: var(--text-dim);
  font-size: 0.7rem;
  font-family: 'Noto Serif JP', serif;
  cursor: pointer;
  border-radius: 3px;
  text-align: center;
  transition: all 0.15s;
}

.mode-tab.active {
  background: var(--bg);
  border-color: var(--gold-dim);
  color: var(--gold);
}

.input-row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
}

.input-row textarea {
  flex: 1;
  background: var(--bg);
  border: 1px solid #2a2a35;
  color: var(--text);
  padding: 10px 12px;
  border-radius: 6px;
  font-family: 'Noto Serif JP', serif;
  font-size: 0.9rem;
  resize: none;
  height: 42px;
  max-height: 100px;
  outline: none;
  line-height: 1.4;
}

.input-row textarea:focus { border-color: var(--gold-dim); }

.btn-send {
  width: 42px;
  height: 42px;
  background: var(--gold);
  border: none;
  border-radius: 6px;
  color: var(--bg);
  font-size: 1.2rem;
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0.15s;
}

.btn-send:disabled { opacity: 0.3; cursor: not-allowed; }

.action-btns {
  display: flex;
  gap: 6px;
  margin-top: 6px;
}

.action-btn {
  padding: 5px 14px;
  background: transparent;
  border: 1px solid #2a2a35;
  color: var(--text-dim);
  font-size: 0.7rem;
  font-family: 'Noto Serif JP', serif;
  cursor: pointer;
  border-radius: 3px;
  transition: all 0.15s;
}

.action-btn:hover { border-color: var(--gold-dim); color: var(--text); }
.action-btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* Settings overlay */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.overlay.show { display: flex; }

.overlay-box {
  background: var(--bg2);
  border: 1px solid var(--gold-dim);
  border-radius: 8px;
  padding: 24px;
  max-width: 480px;
  width: 100%;
  max-height: 80vh;
  overflow-y: auto;
}

.overlay-box h3 {
  color: var(--gold);
  font-size: 1rem;
  margin-bottom: 16px;
  font-family: 'Cinzel', serif;
}

.overlay-box .close-btn {
  float: right;
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 1.2rem;
  cursor: pointer;
}

.overlay-box label { display: block; color: var(--gold-dim); font-size: 0.8rem; margin: 12px 0 4px; }
.overlay-box textarea, .overlay-box input[type="text"], .overlay-box input[type="password"] {
  width: 100%;
  background: var(--bg);
  border: 1px solid #2a2a35;
  color: var(--text);
  padding: 8px 10px;
  border-radius: 4px;
  font-family: 'Noto Serif JP', serif;
  font-size: 0.85rem;
}

.overlay-box textarea { min-height: 80px; resize: vertical; }

.overlay-box .save-btn {
  margin-top: 16px;
  padding: 8px 24px;
  background: var(--gold);
  color: var(--bg);
  border: none;
  border-radius: 4px;
  font-family: 'Noto Serif JP', serif;
  cursor: pointer;
}
</style>
</head>
<body>

<!-- ===== SETUP SCREEN ===== -->
<div id="setup">
  <h1>CHRONICLE</h1>
  <div class="subtitle">YOUR STORY · YOUR RULES</div>

  <div class="setup-group">
    <label>▸ 主人公の名前</label>
    <input type="text" id="s-name" placeholder="例：魔王、リン、旅人…">
  </div>

  <div class="setup-group">
    <label>▸ 主人公の説明</label>
    <div class="hint">職業・外見・性格・能力など。書いた内容がそのままゲームに反映される。</div>
    <textarea id="s-hero" rows="3" placeholder="例：中性的な見た目の魔王。圧倒的な魔力を持つが退屈している。"></textarea>
  </div>

  <div class="setup-group">
    <label>▸ 世界・舞台</label>
    <div class="hint">舞台・時代・世界観・始まりの場所。空欄ならAIが決める。</div>
    <textarea id="s-world" rows="2" placeholder="例：日本の大阪、中世ファンタジー…"></textarea>
  </div>

  <div class="setup-group">
    <label>▸ NovelAI APIキー</label>
    <input type="password" id="s-key" placeholder="pst-...">
    <div class="key-note">キーはブラウザ内にのみ保存。<a href="https://novelai.net/account" target="_blank">novelai.net</a> → アカウント設定 → 永続的APIトークン</div>
  </div>

  <button id="btn-start" onclick="startGame()">冒険を始める</button>
</div>

<!-- ===== GAME SCREEN ===== -->
<div id="game">
  <div class="topbar">
    <div class="stat">❤ <div class="stat-bar"><div class="stat-bar-fill hp-fill"></div></div></div>
    <div class="stat">✦ <div class="stat-bar"><div class="stat-bar-fill mp-fill"></div></div></div>
    <div class="lv">Lv.1</div>
    <button class="action-btn" onclick="showSettings()" style="margin-left:auto;">⚙</button>
  </div>

  <div class="story-area" id="story-area"></div>

  <div class="input-area">
    <div class="mode-tabs">
      <button class="mode-tab active" data-mode="do" onclick="setMode('do',this)">⚔ 行動する</button>
      <button class="mode-tab" data-mode="say" onclick="setMode('say',this)">💬 話す</button>
      <button class="mode-tab" data-mode="story" onclick="setMode('story',this)">📖 描写</button>
    </div>
    <div class="input-row">
      <textarea id="user-input" placeholder="行動を入力…" rows="1" onkeydown="handleKey(event)"></textarea>
      <button class="btn-send" id="btn-send" onclick="send()">▶</button>
    </div>
    <div class="action-btns">
      <button class="action-btn" id="btn-continue" onclick="doContinue()">続きを書く</button>
      <button class="action-btn" id="btn-retry" onclick="doRetry()">やり直す</button>
    </div>
  </div>
</div>

<!-- ===== SETTINGS OVERLAY ===== -->
<div class="overlay" id="settings-overlay">
  <div class="overlay-box">
    <button class="close-btn" onclick="hideSettings()">✕</button>
    <h3>SETTINGS</h3>
    <label>主人公の名前</label>
    <input type="text" id="set-name">
    <label>主人公の説明</label>
    <textarea id="set-hero"></textarea>
    <label>世界設定</label>
    <textarea id="set-world"></textarea>
    <label>NovelAI APIキー</label>
    <input type="password" id="set-key">
    <button class="save-btn" onclick="saveSettings()">保存</button>
  </div>
</div>

<script>
// ===== STATE =====
const STATE = {
  heroName: '',
  heroDesc: '',
  world: '',
  apiKey: '',
  mode: 'do',        // do / say / story
  storyText: '',      // 全ストーリーのクリーンテキスト
  lastPrompt: '',     // 最後に送ったプロンプト（retry用）
  lastAction: '',     // 最後のユーザー入力（retry用）
  lastMode: 'do',     // 最後のモード（retry用）
  busy: false
};

const PROXY_URL = 'https://novel-proxy.sansan2103.workers.dev';

// ===== INIT =====
function init() {
  // Restore saved settings
  STATE.heroName = localStorage.getItem('chr_name') || '';
  STATE.heroDesc = localStorage.getItem('chr_hero') || '';
  STATE.world = localStorage.getItem('chr_world') || '';
  STATE.apiKey = localStorage.getItem('chronicle_key') || '';

  document.getElementById('s-name').value = STATE.heroName;
  document.getElementById('s-hero').value = STATE.heroDesc;
  document.getElementById('s-world').value = STATE.world;
  document.getElementById('s-key').value = STATE.apiKey;
}

init();

// ===== START GAME =====
function startGame() {
  STATE.heroName = document.getElementById('s-name').value.trim() || '冒険者';
  STATE.heroDesc = document.getElementById('s-hero').value.trim() || '謎多き旅人';
  STATE.world = document.getElementById('s-world').value.trim() || '剣と魔法の異世界';
  STATE.apiKey = document.getElementById('s-key').value.trim();

  if (!STATE.apiKey) {
    alert('APIキーを入力してください');
    return;
  }

  // Save
  localStorage.setItem('chr_name', STATE.heroName);
  localStorage.setItem('chr_hero', STATE.heroDesc);
  localStorage.setItem('chr_world', STATE.world);
  localStorage.setItem('chronicle_key', STATE.apiKey);

  // Switch screen
  document.getElementById('setup').style.display = 'none';
  document.getElementById('game').style.display = 'flex';

  // Show intro message
  addBlock('system', `【${STATE.world}】 ${STATE.heroName}：${STATE.heroDesc}`);
  addBlock('system', '最初の行動を入力してください。');
}

// ===== DISPLAY =====
function addBlock(type, text) {
  const area = document.getElementById('story-area');
  const div = document.createElement('div');
  div.className = `story-block ${type}`;
  div.textContent = text;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function addLoading() {
  const area = document.getElementById('story-area');
  const div = document.createElement('div');
  div.className = 'story-block narrator';
  div.id = 'loading';
  div.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function removeLoading() {
  const el = document.getElementById('loading');
  if (el) el.remove();
}

// ===== MODE =====
function setMode(mode, btn) {
  STATE.mode = mode;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  const input = document.getElementById('user-input');
  const placeholders = { do: '行動を入力…', say: '台詞を入力…', story: '展開を記述…' };
  input.placeholder = placeholders[mode] || '';
  input.focus();
}

// ===== PROMPT BUILDING =====
// Kayraは純粋なテキスト補完モデル。
// プロンプトの末尾をそのまま「続ける」だけ。
// だからユーザーの行動をプロンプトの最後の文にして、
// Kayraにその直後を書かせる。

function buildPrompt(action, mode) {
  // ATTG memory block - Kayraのジャンル制御
  // 冒険・アクション寄りにして、恋愛・BLを回避
  const isModern = STATE.world.includes('現代') || STATE.world.includes('日本') || STATE.world.includes('大阪') || STATE.world.includes('東京');
  const genre = isModern ? 'modern action adventure' : 'dark fantasy adventure';
  const memory = `[ Author: adventure novelist; Tags: action, adventure, exploration, dramatic, descriptive prose; Genre: ${genre}; Setting: ${STATE.world} ]\n`;

  // ユーザーの行動を自然な物語文に変換
  let actionLine = '';
  if (action && action.trim()) {
    const act = action.trim();
    if (mode === 'say') {
      actionLine = `\n「${act}」\n　${STATE.heroName}はそう言った。`;
    } else if (mode === 'story') {
      actionLine = '\n　' + (act.endsWith('。') ? act : act + '。');
    } else {
      // 行動モード：ユーザー入力をそのまま行動文に組み込む
      // 末尾の形で判定して自然な文にする
      if (act.endsWith('る') || act.endsWith('す') || act.endsWith('く') || act.endsWith('ぐ') || act.endsWith('む') || act.endsWith('ぶ') || act.endsWith('つ') || act.endsWith('ぬ')) {
        // 辞書形 → そのまま「〜ことにした」
        actionLine = `\n　${STATE.heroName}は${act}ことにした。`;
      } else if (act.endsWith('した') || act.endsWith('った') || act.endsWith('いた') || act.endsWith('んだ') || act.endsWith('てた')) {
        // 過去形 → そのまま
        actionLine = `\n　${STATE.heroName}は${act}。`;
      } else if (act.endsWith('て') || act.endsWith('で')) {
        // て形 → 「〜みた」
        actionLine = `\n　${STATE.heroName}は${act}みた。`;
      } else if (act.endsWith('。') || act.endsWith('！') || act.endsWith('？')) {
        actionLine = `\n　${STATE.heroName}は${act}`;
      } else {
        // その他 → 「〜した」
        actionLine = `\n　${STATE.heroName}は${act}。`;
      }
    }
  }

  // プロンプト組み立て
  let prompt = memory;

  // キャラ設定（常に含める＝Kayraのアンカー）
  const charLine = `　${STATE.heroName}――${STATE.heroDesc}。`;

  if (STATE.storyText.length === 0) {
    // 初回：舞台設定→行動で物語開始
    prompt += `　${STATE.world}。${charLine}\n`;
    prompt += actionLine + '\n';
  } else {
    // 2回目以降：前の文脈（最後の500文字）＋行動
    const clean = STATE.storyText.trim();
    const context = clean.length > 500 ? clean.slice(-500) : clean;
    prompt += charLine + '\n***\n' + context;
    prompt += actionLine + '\n';
  }

  return prompt;
}

// ===== API CALL =====
async function callKayra(prompt) {
  const res = await fetch(PROXY_URL, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + STATE.apiKey
    },
    body: JSON.stringify({
      input: prompt,
      model: 'kayra-v1',
      parameters: {
        max_length: 150,
        min_length: 1,
        use_string: true,
        temperature: 0.55,
        top_k: 30,
        top_p: 0.9,
        tail_free_sampling: 0.95,
        repetition_penalty: 1.5,
        repetition_penalty_range: 2048,
        repetition_penalty_slope: 3.33,
        repetition_penalty_frequency: 0.03,
        repetition_penalty_presence: 0,
        ban_bracket_generation: true
      }
    })
  });

  if (!res.ok) {
    const text = await res.text();
    throw new Error(`API Error ${res.status}: ${text}`);
  }

  const data = await res.json();
  if (data.error) throw new Error(data.error || data.message || JSON.stringify(data));
  return data.output || '';
}

// ===== OUTPUT CLEANING =====
function cleanOutput(raw) {
  let text = raw;

  // ATTG タグを除去 [ ... ]
  text = text.replace(/\[[^\]]{0,200}\]/g, '');

  // > action 形式を除去
  text = text.replace(/^>.*$/gm, '');

  // *** 区切りを除去
  text = text.replace(/\*{2,}/g, '');

  // メタ情報・指示文の漏出を除去
  text = text.replace(/^[\s　]*(Author|Tags|Genre|Setting|Note|Chapter|Scene|END|続く|つづく|第\d+[話章回節部])[\s　]*[：:].*/gim, '');
  text = text.replace(/^[\s　]*(最初の行動|行動を入力|入力してください|主人公[：:]).*/gm, '');

  // リスト系を除去
  text = text.replace(/^[\s　]*(武器|防具|アイテム|スキル|能力|ステータス|HP|MP|攻撃力|防御力|所持|装備|レベル|Lv|種族|職業|称号|クエスト|名前|年齢|性別|身長|体重|好き|嫌い|趣味|特技|属性)[\s　]*[：:].*/gm, '');

  // 箇条書き除去
  text = text.replace(/^[\s　]*[-・●▸▹►◆◇★☆※→⇒]+\s*.*/gm, '');

  // 番号付きリスト除去
  text = text.replace(/^[\s　]*\d+[\.)）]\s*.*/gm, '');

  // 空行を整理
  text = text.replace(/\n{3,}/g, '\n\n');
  text = text.trim();

  // ループ検出＆除去：同じ文が繰り返されてたら最初の1つだけ残す
  const sentences = text.split(/(?<=[。！？…」』])/);
  const seen = new Set();
  const unique = [];
  for (const s of sentences) {
    const key = s.trim();
    if (key.length < 2) continue;
    if (seen.has(key)) continue;
    seen.add(key);
    unique.push(s);
  }
  text = unique.join('');

  // 最後の完全な文で切る（。！？…」』のいずれかで終わる位置）
  const lastEnd = Math.max(
    text.lastIndexOf('。'),
    text.lastIndexOf('！'),
    text.lastIndexOf('？'),
    text.lastIndexOf('…'),
    text.lastIndexOf('」'),
    text.lastIndexOf('』')
  );
  if (lastEnd > 0 && lastEnd < text.length - 1) {
    text = text.slice(0, lastEnd + 1);
  }

  return text.trim();
}

// ===== SEND =====
async function send() {
  if (STATE.busy) return;
  const input = document.getElementById('user-input');
  const action = input.value.trim();
  if (!action) return;

  STATE.busy = true;
  setUIBusy(true);
  input.value = '';

  // ユーザーの行動を表示
  const modeLabels = { do: '行動', say: '発言', story: '描写' };
  addBlock('action', `${modeLabels[STATE.mode]}：${action}`);

  // プロンプト構築
  const prompt = buildPrompt(action, STATE.mode);
  STATE.lastPrompt = prompt;
  STATE.lastAction = action;
  STATE.lastMode = STATE.mode;

  addLoading();

  try {
    console.log('=== PROMPT ===\n', prompt);
    let raw = await callKayra(prompt);
    console.log('=== RAW OUTPUT ===\n', raw);
    let text = cleanOutput(raw);
    console.log('=== CLEAN OUTPUT ===\n', text);

    // テキストが短すぎたら追加生成（最大2回）
    let attempts = 0;
    while (text.length < 30 && attempts < 2) {
      const morePrompt = prompt + text;
      const more = await callKayra(morePrompt);
      text += cleanOutput(more);
      attempts++;
    }

    if (!text || text.length < 5) {
      text = '（物語の続きを生成できませんでした。もう一度試してください。）';
    }

    removeLoading();
    addBlock('narrator', text);

    // クリーンテキストを蓄積（次のプロンプトの文脈になる）
    // buildPromptと同じ形式で行動文を組み立てる
    let actionText = '';
    if (STATE.mode === 'say') {
      actionText = `「${action}」と${STATE.heroName}は言った。`;
    } else if (STATE.mode === 'story') {
      actionText = action.endsWith('。') ? action : action + '。';
    } else {
      const act = action.trim();
      if (act.endsWith('る') || act.endsWith('す') || act.endsWith('く') || act.endsWith('ぐ') || act.endsWith('む')) {
        actionText = `${STATE.heroName}は${act}ことにした。`;
      } else if (act.endsWith('した') || act.endsWith('った') || act.endsWith('いた')) {
        actionText = `${STATE.heroName}は${act}。`;
      } else {
        actionText = `${STATE.heroName}は${act}。`;
      }
    }
    STATE.storyText += actionText + text + '\n';

  } catch (err) {
    removeLoading();
    addBlock('error', `エラー: ${err.message}`);
    console.error(err);
  }

  STATE.busy = false;
  setUIBusy(false);
}

// ===== CONTINUE =====
async function doContinue() {
  if (STATE.busy || STATE.storyText.length === 0) return;

  STATE.busy = true;
  setUIBusy(true);
  addLoading();

  // 行動なしで続きを生成
  const prompt = buildPrompt(null, 'story');
  STATE.lastPrompt = prompt;

  try {
    const raw = await callKayra(prompt);
    let text = cleanOutput(raw);

    if (!text || text.length < 5) {
      text = '（続きを生成できませんでした。）';
    }

    removeLoading();
    addBlock('narrator', text);
    STATE.storyText += text + '\n';

  } catch (err) {
    removeLoading();
    addBlock('error', `エラー: ${err.message}`);
  }

  STATE.busy = false;
  setUIBusy(false);
}

// ===== RETRY =====
async function doRetry() {
  if (STATE.busy || !STATE.lastPrompt) return;

  // 最後のnarrator blockを削除
  const area = document.getElementById('story-area');
  const blocks = area.querySelectorAll('.story-block.narrator');
  if (blocks.length > 0) {
    const lastBlock = blocks[blocks.length - 1];
    // storyTextから最後の出力を除去
    const lastText = lastBlock.textContent;
    if (STATE.storyText.endsWith(lastText + '\n')) {
      STATE.storyText = STATE.storyText.slice(0, -(lastText.length + 1));
    }
    lastBlock.remove();
  }

  STATE.busy = true;
  setUIBusy(true);
  addLoading();

  try {
    // 同じプロンプトで再生成（temperatureが効くので違う結果になる）
    const raw = await callKayra(STATE.lastPrompt);
    let text = cleanOutput(raw);

    if (!text || text.length < 5) {
      text = '（生成できませんでした。）';
    }

    removeLoading();
    addBlock('narrator', text);

    // storyTextを更新
    const actionText = STATE.lastMode === 'say'
      ? `「${STATE.lastAction}」と${STATE.heroName}は言った。`
      : STATE.lastMode === 'story'
        ? STATE.lastAction
        : `${STATE.heroName}は${STATE.lastAction}。`;
    if (STATE.lastAction) {
      STATE.storyText += actionText + text + '\n';
    } else {
      STATE.storyText += text + '\n';
    }

  } catch (err) {
    removeLoading();
    addBlock('error', `エラー: ${err.message}`);
  }

  STATE.busy = false;
  setUIBusy(false);
}

// ===== UI HELPERS =====
function setUIBusy(busy) {
  document.getElementById('btn-send').disabled = busy;
  document.getElementById('btn-continue').disabled = busy;
  document.getElementById('btn-retry').disabled = busy;
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
}

// Auto-resize textarea
document.getElementById('user-input')?.addEventListener('input', function() {
  this.style.height = '42px';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

// ===== SETTINGS =====
function showSettings() {
  document.getElementById('set-name').value = STATE.heroName;
  document.getElementById('set-hero').value = STATE.heroDesc;
  document.getElementById('set-world').value = STATE.world;
  document.getElementById('set-key').value = STATE.apiKey;
  document.getElementById('settings-overlay').classList.add('show');
}

function hideSettings() {
  document.getElementById('settings-overlay').classList.remove('show');
}

function saveSettings() {
  STATE.heroName = document.getElementById('set-name').value.trim() || STATE.heroName;
  STATE.heroDesc = document.getElementById('set-hero').value.trim() || STATE.heroDesc;
  STATE.world = document.getElementById('set-world').value.trim() || STATE.world;
  STATE.apiKey = document.getElementById('set-key').value.trim() || STATE.apiKey;

  localStorage.setItem('chr_name', STATE.heroName);
  localStorage.setItem('chr_hero', STATE.heroDesc);
  localStorage.setItem('chr_world', STATE.world);
  localStorage.setItem('chronicle_key', STATE.apiKey);

  hideSettings();
  addBlock('system', '設定を更新しました。');
}
