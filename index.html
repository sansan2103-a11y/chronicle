const _origParsePlan = Planner.parsePlan.bind(Planner);
Planner.parsePlan = function(rawText, inputType) {
  if (S.cfg.simpleMode) {
    let text = (rawText || '').trim();
    text = text.replace(/^```[a-z]*\s*/i, '').replace(/```\s*$/, '');
    text = text.replace(/[过这没现还说让对给从将们点东几亲爱觉吗么吧呢哪谁怎样此后状围]/g, '');
    text = text.replace(/[A-Za-z][A-Za-z0-9_.]{2,}/g, '');
    // Anti-loop: detect repetitive short patterns (《X》。《X》。… or 「X」。「X」。… or short phrases) and truncate
    // Drop meta-narrative scene-break lines
    {
      const metaRx = /(プロジェクター|モニター|再生画面|スクリーン|シーンは終了|シーンが終了|場面転換|別世界|別の場所|タイムジャンプ|未来視|回想シーン|夢から覚め|目を覚ます|メタ視点|作戦会議|プレゼント|お暇します|戻ります|今夜\d+時|\d+日目|\d+時\d+分|\d+:\d+\)?|失礼します|お疲れ様|では失礼|いつもの|背広姿|スーツ姿|サラリーマン|出勤|退勤|帰宅)/;
      const lines0 = text.split(/\n+/);
      const filtered0 = lines0.filter(l => !metaRx.test(l));
      // Keep filtered output even if heavily meta-tainted; just drop offending lines
      text = filtered0.join('\n');
    }
    // Detect mention of character names not in the cast and warn (replace with generic "誰か" if clearly an invented PoV character)
    (function() {
      const allowed = new Set();
      const heroN = (S.cast.hero||{}).name;
      if (heroN) {
        allowed.add(heroN);
        // Also add first/last name parts split on common separators
        heroN.split(/[\s・]/).forEach(p => p && allowed.add(p));
      }
      (S.cast.npcs||[]).forEach(n => {
        if (n && n.name) {
          allowed.add(n.name);
          n.name.split(/[\s・]/).forEach(p => p && allowed.add(p));
        }
      });
      // Find candidate katakana names (2-6 chars) followed by particle が|は|を|に|と|の|も|へ|や
      const rx = /([ァ-ヶー]{2,6})(?=[がはをにとのもへやでまでより、。「」])/g;
      const seen = new Map();
      let m;
      while ((m = rx.exec(text)) !== null) {
        const name = m[1];
        if (allowed.has(name)) continue;
        // Skip common words / pronouns
        if (/^(コト|モノ|ココ|ソコ|アソコ|ドコ|ナニ|アレ|コレ|ソレ|ドレ|ボク|オレ|ワタシ|アナタ|キミ|オマエ|カレ|カノジョ|ミナ|ミンナ|ダレ|ナゼ|ドウ|アア|ウン|ハイ|イイエ|イヤ)$/.test(name)) continue;
        seen.set(name, (seen.get(name)||0)+1);
      }
      // Replace ANY unknown name occurrence with generic "その人物" (zero tolerance)
      for (const [name, count] of seen) {
        if (count >= 1) {
          text = text.split(name).join('その人物');
        }
      }
      window._lastUnknownNames = Array.from(seen.entries());
    })();
    text = (function(t) {
      // Pattern A: 《...》。 or 「...」。 or （...）。 repeated 3+ times consecutively → keep first
      t = t.replace(/((?:《[^《》\n]{1,30}》|「[^「」\n]{1,30}」|（[^（）\n]{1,30}）)。?)\1{2,}/g, '$1');
      // Pattern B: same 4-20 char substring repeated 3+ times consecutively → keep first
      t = t.replace(/(.{4,20}?)\1{2,}/g, '$1');
      // Pattern C: dialogue lines starting with same character speaker repeated 3+ times → keep 2
      const quoteLines = t.match(/「[^「」\n]{1,80}」/g) || [];
      if (quoteLines.length >= 4) {
        const counts = {};
        for (const q of quoteLines) {
          const head = q.replace(/^「(.{1,4}).*$/, '$1');
          counts[head] = (counts[head]||0) + 1;
        }
        for (const head in counts) {
          if (counts[head] >= 3) {
            // Remove all but first 2 occurrences of quotes starting with this head
            let kept = 0;
            t = t.replace(new RegExp('「' + head.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + '[^「」\\n]*」', 'g'), (m) => {
              kept++;
              return kept <= 2 ? m : '';
            });
          }
        }
      }
      return t;
    })(text);
    let lines = text.split(/\n+/).map(s => s.trim()).filter(Boolean);
    const turns = S.turns || [];
    const prev = turns.length ? (Array.isArray(turns[turns.length-1].narrative) ? turns[turns.length-1].narrative : []) : [];
    const prevSet = new Set(prev.map(s => (s||'').trim()));
    lines = lines.filter(l => !prevSet.has(l));
    const seen = new Set();
    lines = lines.filter(l => { if (seen.has(l)) return false; seen.add(l); return true; });
    lines = lines.filter(l => /[぀-ゟ゠-ヿ]/.test(l));
    // Safety net: if everything got filtered out, recover at least something from raw text
    if (lines.length === 0) {
      const rawSentences = (rawText || '').replace(/[\u0000-\u001F]/g, ' ').split(/[。！？\n]+/).map(s=>s.trim()).filter(s => s.length >= 4 && /[぀-ゟ゠-ヿ]/.test(s));
      if (rawSentences.length > 0) lines = rawSentences.slice(0, 4).map(s => s + '。');
      else lines = ['…再生成に失敗。もう一度試してください。'];
    }
    lines = lines.slice(0, 8);
    const heroName = (S.cast.hero || {}).name;
    if (heroName && inputType === 'SAY') {
      const rxAct = new RegExp(`${heroName}[はがを].{0,20}(殴|刺|掴|捕まえ|蹴|握|縛|押|叫び)`);
      lines = lines.filter(s => !rxAct.test(s));
    }
    return {
      playerIntent: { kind: 'other', tone: 'neutral' },
      npcInnerLife: null,
      npcReactionPhase: { npcName: (S.cast.npcs[0]||{}).name||'', emotion: S.cast.npcs[0]?.emotion||'中立', interpretation:'', dialogue:null, bodyLanguage:'', resistance:'mid', subtext:null },
      environmentResponse: '',
      branchCandidates: [],
      narrative: lines
    };
  }
  return _origParsePlan(rawText, inputType);
};

function _strHash(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) { h = ((h << 5) - h) + s.charCodeAt(i); h |= 0; }

}

// Dialogue extraction & VN-style cards
// ─────────────────────────────────────────────────────────────
function _extractDialogue(narrativeText) {
  if (!narrativeText) return [];
  const text = Array.isArray(narrativeText) ? narrativeText.join('\n') : String(narrativeText);
  const heroName = S.cast.hero.name || '';
  const npcs = (S.cast.npcs || []).map(n => n.name).filter(Boolean);
  const allNames = heroName ? [heroName, ...npcs] : npcs;
  // Build name regex parts (also handle name parts split by spaces)
  const nameParts = new Set();
  allNames.forEach(n => {
    nameParts.add(n);
    n.split(/[\s・]/).forEach(p => { if (p && p.length >= 2) nameParts.add(p); });
  });
  const namesArr = Array.from(nameParts).sort((a,b) => b.length - a.length);
  // Extract dialogue patterns
  const results = [];
  // Split into lines first
  const lines = text.split(/\n+/);
  for (const line of lines) {
    // Pattern A: Name「dialogue」 or Name は/が ... 「dialogue」
    // Pattern B: 「dialogue」 と Name が言った/呟いた/etc
    // Find ALL 「...」 in line and try to find nearest preceding/following name
    const dialogueMatches = [];
    let m;
    const dRx = /「([^「」]+?)」/g;
    while ((m = dRx.exec(line)) !== null) {
      dialogueMatches.push({ text: m[1], start: m.index, end: m.index + m[0].length });
    }
    for (const d of dialogueMatches) {
      // Look backwards in line for a name within 20 chars
      const before = line.slice(Math.max(0, d.start - 30), d.start);
      // Look forward for name with 言/呟/叫/etc within 20 chars
      const after = line.slice(d.end, d.end + 30);
      let speaker = null;
      for (const n of namesArr) {
        if (before.includes(n)) { speaker = n; break; }
      }
      if (!speaker) {
        for (const n of namesArr) {
          if (after.includes(n)) { speaker = n; break; }
        }
      }
      if (!speaker && results.length > 0) {
        // No identifiable speaker, use last speaker (continuation)
        // Skip - require explicit identification
      }
      results.push({ speaker: speaker || null, text: d.text, isHero: speaker === heroName });
    }
  }
  return results;
}
window._extractDialogue = _extractDialogue;

function _renderDialogueCards(turn) {
  const dialogues = _extractDialogue(turn.narrative);
  if (dialogues.length === 0) return null;
  const heroName = S.cast.hero.name || '主人公';
  const heroAvUrl = _heroAvatar();
  // Map NPC name → avatarUrl
  const npcMap = {};
  (S.cast.npcs || []).forEach(n => {
    if (n.name) npcMap[n.name] = _avatarUrl(n.name, n.desc);
  });
  const wrap = document.createElement('div');
  wrap.className = 'dialogue-list';
  for (const d of dialogues) {
    if (!d.speaker) continue; // skip unattributed
    const row = document.createElement('div');
    row.className = 'dialogue-row';
    const av = document.createElement('div');
    av.className = 'dialogue-avatar';
    let url = null;
    let nm = d.speaker;
    if (d.isHero || d.speaker === heroName) {
      url = heroAvUrl; nm = heroName;
    } else {
      url = npcMap[d.speaker] || null;
    }
    if (url) av.style.backgroundImage = 'url("' + url + '")';
    else av.textContent = nm.charAt(0);
    const body = document.createElement('div');
    body.className = 'dialogue-body';
    const nameEl = document.createElement('div');
    nameEl.className = 'dialogue-name';
    nameEl.textContent = nm;
    const textEl = document.createElement('div');
    textEl.className = 'dialogue-text';
    textEl.textContent = d.text;
    body.appendChild(nameEl);
    body.appendChild(textEl);
    row.appendChild(av);
    row.appendChild(body);
    wrap.appendChild(row);
  }
  if (wrap.children.length === 0) return null;
  return wrap;
}

window._renderDialogueCards = function(turn) {
  const dialogues = window._extractDialogue(turn.narrative);
  if (dialogues.length === 0) return null;
  const heroName = S.cast.hero.name || '主人公';
  const heroUrl = window._getHeroAvatar();
  // Build name → {url, fullName} map, keyed by both full names AND split parts
  const npcMap = {};
  (S.cast.npcs || []).forEach(n => {
    if (!n.name) return;
    const url = window._getNpcAvatar(n);
    npcMap[n.name] = { url, fullName: n.name };
    n.name.split(/[\s・]/).forEach(p => {
      if (p && p.length >= 2 && !npcMap[p]) npcMap[p] = { url, fullName: n.name };
    });
  });
  // Same for hero name parts
  const heroEntry = { url: heroUrl, fullName: heroName };
  const heroParts = new Set([heroName]);
  heroName.split(/[\s・]/).forEach(p => { if (p && p.length >= 2) heroParts.add(p); });

  const wrap = document.createElement('div');
  wrap.className = 'dialogue-list';
  for (const d of dialogues) {
    if (!d.speaker) continue;
    let url = null;
    let displayName = d.speaker;
    if (heroParts.has(d.speaker) || d.isHero) {
      url = heroUrl;
      displayName = heroName;
    } else if (npcMap[d.speaker]) {
      url = npcMap[d.speaker].url;
      displayName = npcMap[d.speaker].fullName;
    }
    const row = document.createElement('div');
    row.className = 'dialogue-row';
    const av = document.createElement('div');
    av.className = 'dialogue-avatar';
    if (url) {
      av.style.backgroundImage = 'url("' + url + '")';
    } else {
      av.textContent = displayName.charAt(0);
    }
    const body = document.createElement('div');
    body.className = 'dialogue-body';
    const nameEl = document.createElement('div');
    nameEl.className = 'dialogue-name';
    nameEl.textContent = displayName;
    const textEl = document.createElement('div');
    textEl.className = 'dialogue-text';
    textEl.textContent = d.text;
    body.appendChild(nameEl);
    body.appendChild(textEl);
    row.appendChild(av);
    row.appendChild(body);
    wrap.appendChild(row);
  }
  if (wrap.children.length === 0) return null;
  return wrap;
};

  const seed = (baseSeed + (extraSeed || 0) * 7919) % 100000;

// Avatar load tracker (caches success/fail per URL)
window._avatarLoadCache = window._avatarLoadCache || {};

// Robust avatar setter: tries to preload, on success sets bg, on failure shows letter
window._setAvatarBg = function(el, url, fallbackChar) {
  if (!el) return;
  if (!url) {
    el.style.backgroundImage = '';
    el.textContent = fallbackChar || '?';
    return;
  }
  // Reset state
  el.textContent = fallbackChar || '?';
  el.style.backgroundImage = '';

  // Check cache
  const cached = window._avatarLoadCache[url];
  if (cached === 'ok') {
    el.style.backgroundImage = 'url("' + url + '")';
    el.textContent = '';
    return;
  }
  if (cached === 'fail') {
    return; // already known to fail; keep letter
  }

  // Preload
  const img = new Image();
  let done = false;
  const timeout = setTimeout(() => {
    if (done) return;
    done = true;
    window._avatarLoadCache[url] = 'fail';
    // keep letter
  }, 25000);
  img.onload = () => {
    if (done) return;
    done = true;
    clearTimeout(timeout);
    window._avatarLoadCache[url] = 'ok';
    if (img.naturalWidth > 32) { // valid image
      el.style.backgroundImage = 'url("' + url + '")';
      el.textContent = '';
    }
  };
  img.onerror = () => {
    if (done) return;
    done = true;
    clearTimeout(timeout);
    window._avatarLoadCache[url] = 'fail';
    // keep letter shown
  };
  img.src = url;
};

// Persistent cache via localStorage
const _AV_CACHE_KEY = 'chr_av_cache_v1';
function _loadAvCache() {
  try { return JSON.parse(localStorage.getItem(_AV_CACHE_KEY) || '{}'); } catch { return {}; }
}
function _saveAvCache(cache) {
  try {
    // Keep cache size manageable (max 50 entries)
    const entries = Object.entries(cache);
    if (entries.length > 50) {
      const trimmed = Object.fromEntries(entries.slice(-40));
      localStorage.setItem(_AV_CACHE_KEY, JSON.stringify(trimmed));
    } else {
      localStorage.setItem(_AV_CACHE_KEY, JSON.stringify(cache));
    }
  } catch {}
}
window._avatarLoadCache = _loadAvCache();

// Override _setAvatarBg with Pollinations -> DiceBear fallback
window._setAvatarBg = function(el, primaryUrl, fallbackChar, name, desc, extraSeed) {
  if (!el) return;
  el.textContent = fallbackChar || '?';
  el.style.backgroundImage = '';

  if (!primaryUrl) {
    // Try DiceBear directly
    const dbUrl = (name || desc) ? window._dicebearUrl(name, desc, extraSeed) : null;
    if (dbUrl) {
      el.style.backgroundImage = 'url("' + dbUrl + '")';
      el.textContent = '';
    }
    return;
  }

  // Cached?
  const cached = window._avatarLoadCache[primaryUrl];
  if (cached === 'ok') {
    el.style.backgroundImage = 'url("' + primaryUrl + '")';
    el.textContent = '';
    return;
  }
  // If known fail, go straight to DiceBear
  if (cached === 'fail') {
    const dbUrl = window._dicebearUrl(name, desc, extraSeed);
    el.style.backgroundImage = 'url("' + dbUrl + '")';
    el.textContent = '';
    return;
  }

  // Try Pollinations with timeout
  const img = new Image();
  let done = false;
  const timeout = setTimeout(() => {
    if (done) return; done = true;
    window._avatarLoadCache[primaryUrl] = 'fail';
    _saveAvCache(window._avatarLoadCache);
    // Fallback to DiceBear
    const dbUrl = window._dicebearUrl(name, desc, extraSeed);
    el.style.backgroundImage = 'url("' + dbUrl + '")';
    el.textContent = '';
  }, 12000);
  img.onload = () => {
    if (done) return; done = true;
    clearTimeout(timeout);
    if (img.naturalWidth > 32) {
      window._avatarLoadCache[primaryUrl] = 'ok';
      _saveAvCache(window._avatarLoadCache);
      el.style.backgroundImage = 'url("' + primaryUrl + '")';
      el.textContent = '';
    } else {
      window._avatarLoadCache[primaryUrl] = 'fail';
      _saveAvCache(window._avatarLoadCache);
      const dbUrl = window._dicebearUrl(name, desc, extraSeed);
      el.style.backgroundImage = 'url("' + dbUrl + '")';
      el.textContent = '';
    }
  };
  img.onerror = () => {
    if (done) return; done = true;
    clearTimeout(timeout);
    window._avatarLoadCache[primaryUrl] = 'fail';
    _saveAvCache(window._avatarLoadCache);
    const dbUrl = window._dicebearUrl(name, desc, extraSeed);
    el.style.backgroundImage = 'url("' + dbUrl + '")';
    el.textContent = '';
  };
  img.src = primaryUrl;
};

// Smarter foreign garbage check: extract narrative from JSON first
window._hasForeignGarbageOriginal = Api._hasForeignGarbage.bind(Api);
Api._hasForeignGarbage = function(text) {
  if (!text) return false;
  let checkText = text;
  // Try to extract narrative from JSON if present
  try {
    let t = text;
    const fence = t.match(/\`\`\`(?:json)?\\s*([\\s\\S]+?)\\s*\`\`\`/);
    if (fence) t = fence[1];
    const s = t.indexOf('{'), e = t.lastIndexOf('}');
    if (s !== -1 && e !== -1 && s < e) {
      const json = JSON.parse(t.slice(s, e + 1));
      if (json.narrative) {
        checkText = Array.isArray(json.narrative) ? json.narrative.join('\n') : String(json.narrative);
      } else {
        // It's JSON but no narrative field — check the values, not keys
        const values = [];
        function collectValues(obj) {
          if (typeof obj === 'string') values.push(obj);
          else if (Array.isArray(obj)) obj.forEach(collectValues);
          else if (obj && typeof obj === 'object') Object.values(obj).forEach(collectValues);
        }
        collectValues(json);
        checkText = values.join('\n');
      }
    }
  } catch(e) { /* not JSON, use raw text */ }

  const enMatches = (checkText.match(/[A-Za-z][A-Za-z0-9_.]{2,}/g) || []).length;
  const zhMatches = (checkText.match(/[过这没现还说让对给从将们点东几亲爱觉吗么吧呢哪谁怎样此后状围]/g) || []).length;
  return enMatches >= 3 || zhMatches >= 2;
};

  }
  const nameToFull = {}; // name fragment → original full name
  if (heroName) {
    nameToFull[heroName] = heroName;
    heroName.split(/[\s・]/).forEach(p => { if (p && p.length >= 2) nameToFull[p] = heroName; });
  }
  npcs.forEach(n => {
    nameToFull[n] = n;
    n.split(/[\s・]/).forEach(p => { if (p && p.length >= 2) nameToFull[p] = n; });
  });
  // Sort by length desc so longer names match first
  const namesArr = Object.keys(nameToFull).sort((a,b) => b.length - a.length);

  let lastNamedSpeaker = null; // for pronoun resolution

  const results = [];
  const dRx = /「([^「」]+?)」/g;

    const before = text.slice(Math.max(0, dStart - 80), dStart);
    const after = text.slice(dEnd, dEnd + 40);

    let speaker = null;

    // Search BEFORE: prefer the closest (rightmost) name occurrence
    let bestPosBefore = -1;
    let bestNameBefore = null;
    for (const n of namesArr) {
      const pos = before.lastIndexOf(n);
      if (pos > bestPosBefore) {
        bestPosBefore = pos;
        bestNameBefore = n;
      }
    }
    if (bestNameBefore) speaker = bestNameBefore;

    // Search AFTER if not found before
    if (!speaker) {
      for (const n of namesArr) {
        if (after.includes(n)) { speaker = n; break; }
      }

    // Update lastNamedSpeaker only if we found one in the actual surrounding context

    if (bestNameBefore || (after && namesArr.some(n => after.includes(n)))) {

window._splitDialogueText = function(text) {
  if (!text || text.length < 8) return [text];
  // Split when sentence-final punctuation is followed by space, full-width space, end, or 「」
  const result = [];
  let current = '';
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    current += c;
    if (/[！？]/.test(c)) {
      const next = text[i+1] || '';
      if (next === ' ' || next === '　' || next === '' || /[「」]/.test(next)) {
        const trimmed = current.trim();
        if (trimmed) result.push(trimmed);
        current = '';
        if (next === ' ' || next === '　') i++;
      }
    } else if (c === '。') {
      const next = text[i+1] || '';
      if (next === ' ' || next === '　' || next === '' || /[「」]/.test(next)) {
        const trimmed = current.trim();
        if (trimmed) result.push(trimmed);
        current = '';
        if (next === ' ' || next === '　') i++;
      }
    }
  }
  const last = current.trim();
  if (last) result.push(last);
  return result.length > 0 ? result : [text];
};

    heroName.split(/[\s・]/).forEach(p => { if (p && p.length >= 2) heroParts.add(p); });
  }
  const nameToFull = {};
  if (heroName) {
    nameToFull[heroName] = heroName;
    heroName.split(/[\s・]/).forEach(p => { if (p && p.length >= 2) nameToFull[p] = heroName; });
  }
  npcs.forEach(n => {
    nameToFull[n] = n;
    n.split(/[\s・]/).forEach(p => { if (p && p.length >= 2) nameToFull[p] = n; });
  });
  const namesArr = Object.keys(nameToFull).sort((a,b) => b.length - a.length);

  // Build quote ranges to skip
  const quoteRanges = [];
  const qRx = /「([^「」]+?)」/g;
  let qm;
  while ((qm = qRx.exec(text)) !== null) {
    quoteRanges.push({ start: qm.index, end: qm.index + qm[0].length });
  }

  const SPEECH_VERB_RX = /と[^。、\n]{0,4}(叫|呟|漏ら|呻|喘|発し|呼び|言|喚|吐|声|嗚)/;
  let lastNamedSpeaker = null;
  // Roughly determine last speaker from baseEvents
  if (baseEvents.length > 0) lastNamedSpeaker = baseEvents[baseEvents.length-1].speaker;

  const seenAt = new Set();
  baseEvents.forEach(e => seenAt.add(e.text));
  const newEvents = [];

  // Apply regex patterns
  for (const rx of window.ONOMATOPOEIA_REGEX) {
    let m;
    rx.lastIndex = 0;
    while ((m = rx.exec(text)) !== null) {
      const oStart = m.index, oEnd = m.index + m[0].length;
      const matched = m[0];
      if (matched.length < 2) continue;
      // Skip if inside a quote
      if (quoteRanges.some(r => r.start < oStart && r.end > oEnd)) continue;
      // Skip duplicates
      if (seenAt.has(matched)) continue;
      // Word boundary check
      const charBefore = text[oStart-1] || '\n';
      const charAfter = text[oEnd] || '\n';
      // Allow if surrounded by punctuation/whitespace/と
      if (charAfter && !/[、。！？「」\s\nと]/.test(charAfter)) continue;
      // Context check
      const before30 = text.slice(Math.max(0, oStart-30), oStart);
      const after30 = text.slice(oEnd, oEnd+30);
      const after15 = text.slice(oEnd, oEnd+15);
      const hasSpeechVerb = SPEECH_VERB_RX.test(after15);
      let nameNearby = null;
      for (const n of namesArr) {
        if (before30.includes(n) || after30.includes(n)) { nameNearby = n; break; }
      }
      const hasPronoun = /彼女|あの娘|あの子|彼は|彼が|彼の/.test(before30 + after30);
      if (!hasSpeechVerb && !nameNearby && !(hasPronoun && lastNamedSpeaker)) continue;
      let speaker = nameNearby || lastNamedSpeaker;
      const fullName = speaker ? (nameToFull[speaker] || speaker) : null;
      if (!fullName) continue;
      seenAt.add(matched);
      newEvents.push({
        speaker: fullName,
        text: matched,
        isHero: fullName === heroName || heroParts.has(fullName),
        isSfx: true
      });
    }
  }

  return baseEvents.concat(newEvents);
};

// Threshold: NPC inner thoughts surface as dialogue when stress >= this
window.INNER_STRESS_THRESHOLD = 80;

// Extend _extractDialogue: chain on top of current version, add 《》 inner thought extraction
const _origExtractP2 = window._extractDialogue;
window._extractDialogue = function(narrativeText) {
  const baseEvents = _origExtractP2(narrativeText);
  if (!narrativeText) return baseEvents;
  const text = Array.isArray(narrativeText) ? narrativeText.join('\n') : String(narrativeText);
  const heroName = S.cast.hero.name || '';
  const npcs = (S.cast.npcs || []).map(n => n.name).filter(Boolean);
  const heroParts = new Set();
  if (heroName) {
    heroParts.add(heroName);
    heroName.split(/[\s・]/).forEach(p => { if (p && p.length >= 2) heroParts.add(p); });
  }
  const nameToFull = {};
  if (heroName) {
    nameToFull[heroName] = heroName;
    heroName.split(/[\s・]/).forEach(p => { if (p && p.length >= 2) nameToFull[p] = heroName; });
  }
  npcs.forEach(n => {
    nameToFull[n] = n;
    n.split(/[\s・]/).forEach(p => { if (p && p.length >= 2) nameToFull[p] = n; });
  });
  const namesArr = Object.keys(nameToFull).sort((a,b) => b.length - a.length);

  const innerEvents = [];
  let lastNamedSpeaker = null;
  if (baseEvents.length > 0) lastNamedSpeaker = baseEvents[baseEvents.length-1].speaker;

  // Extract 《...》 inner thoughts
  const innerRx = /《([^《》]+?)》/g;
  let im;
  while ((im = innerRx.exec(text)) !== null) {
    const iStart = im.index, iEnd = im.index + im[0].length, iText = im[1];
    const before = text.slice(Math.max(0, iStart - 80), iStart);
    const after = text.slice(iEnd, iEnd + 40);

    let speaker = null;
    let bestPos = -1, bestName = null;
    for (const n of namesArr) {
      const pos = before.lastIndexOf(n);
      if (pos > bestPos) { bestPos = pos; bestName = n; }
    }
    if (bestName) speaker = bestName;
    if (!speaker) {
      for (const n of namesArr) {
        if (after.includes(n)) { speaker = n; break; }
      }
    }
    if (!speaker && lastNamedSpeaker) speaker = lastNamedSpeaker;

    const fullName = speaker ? (nameToFull[speaker] || speaker) : null;
    if (!fullName) continue;

    const isHero = fullName === heroName || heroParts.has(fullName);
    // For NPCs: only surface inner thoughts when stress >= threshold
    if (!isHero) {
      const npc = (S.cast.npcs || []).find(n => n.name === fullName);
      if (!npc || (npc.stress || 0) < window.INNER_STRESS_THRESHOLD) continue;
    }
    // Hero: always include (no stress concept)

    innerEvents.push({
      type: 'inner',
      start: iStart, end: iEnd,
      text: iText,
      speaker: fullName,
      isHero,
      isInner: true,
      isSfx: false
    });
  }

  // Merge with base events, sort by position
  const allEvents = baseEvents.concat(innerEvents).sort((a, b) => {
    // sort by start; for events without start (e.g. baseEvents lacks position), keep order
    return (a.start || 0) - (b.start || 0);
  });

  return allEvents;
};

// Wrap _renderDialogueCards: apply inner-thought-card class and connection markers
const _origRenderCardsP2 = window._renderDialogueCards;
window._renderDialogueCards = function(turn) {
  const div = _origRenderCardsP2(turn);
  if (!div) return null;
  // Get current extracted dialogues (in same order as rendered) for class assignment
  const dialogues = window._extractDialogue(turn.narrative);
  // Also include the prepended SAY hero card if present
  const rows = Array.from(div.querySelectorAll('.dialogue-row'));
  // Map rows to dialogues by text content (best-effort)
  const usedDlg = new Set();
  rows.forEach(row => {
    const textEl = row.querySelector('.dialogue-text');
    const nameEl = row.querySelector('.dialogue-name');
    if (!textEl || !nameEl) return;
    const text = textEl.textContent;
    const speaker = nameEl.textContent;
    // Find matching dialogue
    for (let i = 0; i < dialogues.length; i++) {
      if (usedDlg.has(i)) continue;
      const d = dialogues[i];
      if (d.text === text && d.speaker === speaker) {
        usedDlg.add(i);
        if (d.isInner) {
          row.classList.add('inner-thought-card');
        }
        break;
      }
    }
  });

  // Apply connection markers: when row[i] is inner and row[i-1] is same-speaker outer
  for (let i = 1; i < rows.length; i++) {
    const cur = rows[i];
    const prev = rows[i-1];
    const curIsInner = cur.classList.contains('inner-thought-card');
    const prevIsInner = prev.classList.contains('inner-thought-card');
    if (curIsInner && !prevIsInner) {
      const curName = cur.querySelector('.dialogue-name')?.textContent;
      const prevName = prev.querySelector('.dialogue-name')?.textContent;
      if (curName && curName === prevName) {
        prev.classList.add('connected-from');
        cur.classList.add('connected-to');
      }
    }
  }

  return div;
};

// Helper: stress class based on bucket
window._stressClass = function(stress) {
  if (stress >= 100) return 'stress-shattered';
  if (stress >= 90)  return 'stress-breaking';
  if (stress >= 70)  return 'stress-shaky';
  if (stress >= 50)  return 'stress-mild';

};

// Helper: count chapter markers in turns up to idx
function _chapterNumberFor(idx) {

    const narr = Array.isArray(t.narrative) ? t.narrative.join('\n') : (t.narrative || '');

      if (i === idx) return n;

// Update _avatarUrl to include frame key in seed (so frame change = new image)
window._avatarUrl = function(name, desc, extraSeed, emotion) {
  if (!name && !desc) return null;
  let prompt = window._buildAvatarPrompt(name, desc);
  // Determine current frame for seed
  const styleKey = (S.cfg && S.cfg.avatarStyle) || 'monogatari';
  let frameKey = (S.cfg.frameStyle && S.cfg.frameStyle !== 'preset') ? S.cfg.frameStyle : (window.AVATAR_STYLE_FRAME_DEFAULT[styleKey] || 'ornate');
  let seedExtra = '|' + frameKey;
  if (S.cfg && S.cfg.dynamicAvatar && emotion) {
    const expr = window.EMOTION_MAP[emotion] || emotion;
    prompt = 'expression: ' + expr + ', ' + prompt;
    seedExtra += '|' + emotion;
  }
  const baseSeed = window._strHash((name || '') + '|' + (desc || '') + seedExtra);
  const seed = (baseSeed + (extraSeed || 0) * 7919) % 100000;
  return 'https://image.pollinations.ai/prompt/' + encodeURIComponent(prompt) + '?width=384&height=384&seed=' + seed + '&nologo=true&private=true';
};

// Toast notification system
window._toast = function(msg, type) {
  type = type || 'ok';
  const t = document.createElement('div');
  t.className = 'toast toast-' + type;
  t.textContent = msg;
  document.body.appendChild(t);
  requestAnimationFrame(() => t.classList.add('show'));
  setTimeout(() => {
    t.classList.remove('show');
    setTimeout(() => t.remove(), 400);
  }, 4500);
};

window._regenAllAvatars = async function() {
  const characters = [];
  if (S.cast.hero && S.cast.hero.name) {
    characters.push({ type: 'hero', label: S.cast.hero.name });
  }
  (S.cast.npcs || []).forEach((npc, i) => {
    if (npc && npc.name) characters.push({ type: 'npc', idx: i, label: npc.name });
  });

  const total = characters.length;
  const btn = document.getElementById('btnRegenAll');
  if (total === 0) {
    window._toast('対象キャラがいません（名前未設定）', 'warn');
    return;
  }

  const origText = btn ? btn.textContent : '';
  if (btn) {
    btn.disabled = true;
    btn.classList.add('regen-running');
  }

  // Clear caches once at start
  window._avatarLoadCache = {};
  try { localStorage.removeItem('chr_av_cache_v1'); } catch (e) {}

  const failures = [];

  for (let i = 0; i < total; i++) {
    const c = characters[i];
    if (btn) btn.textContent = '再生成中 (' + (i+1) + '/' + total + ')...';

    try {
      // Bump seed with random jump
      const jump = Math.floor(Math.random() * 1000) + 1;
      let url = null;
      if (c.type === 'hero') {
        S.cast.hero.avatarSeed = (S.cast.hero.avatarSeed || 0) + jump;
        url = window._getHeroAvatar();
      } else {
        const npc = S.cast.npcs[c.idx];
        if (npc) {
          npc.avatarSeed = (npc.avatarSeed || 0) + jump;
          url = window._getNpcAvatar(npc);
        }
      }

      // Preload (8s timeout)
      if (url) {
        await new Promise(resolve => {
          const img = new Image();
          let done = false;
          const timer = setTimeout(() => {
            if (done) return; done = true;
            failures.push(c.label);
            resolve();
          }, 8000);
          img.onload = () => {
            if (done) return; done = true;
            clearTimeout(timer);
            if (img.naturalWidth < 32) failures.push(c.label);
            resolve();
          };
          img.onerror = () => {
            if (done) return; done = true;
            clearTimeout(timer);
            failures.push(c.label);
            resolve();
          };
          img.src = url;
        });
      }
    } catch (e) {
      failures.push(c.label);
    }

    // Throttle 700ms between requests
    if (i < total - 1) {
      await new Promise(r => setTimeout(r, 700));
    }
  }

  // Save state and refresh UI
  S.save();
  if (UI._renderNpcList) UI._renderNpcList();
  if (UI.renderAll) UI.renderAll();
  if (window._renderHeroAvatarInSettings) window._renderHeroAvatarInSettings();

  if (btn) {
    btn.disabled = false;
    btn.classList.remove('regen-running');
    btn.textContent = origText || '🔄 全キャラ一括再生成';
  }

  if (failures.length === 0) {
    window._toast('全' + total + 'キャラの再生成完了', 'ok');
  } else {
    const succ = total - failures.length;
    window._toast(succ + '/' + total + '完了。失敗: ' + failures.join('、'), 'warn');
  }
};

(function clearStaleFails() {
  try {

    const cache = JSON.parse(localStorage.getItem(KEY) || '{}');
    let removed = 0;
    for (const url of Object.keys(cache)) {

// Fix dialogue attribution priority — handle と+name+verb after-pattern
// ─────────────────────────────────────────────────────────────
const _origExtractAttrFix = window._extractDialogue;
window._extractDialogue = function(narrativeText) {
  // Use original extraction but post-process to fix attribution
  if (!narrativeText) return _origExtractAttrFix(narrativeText);
  const text = Array.isArray(narrativeText) ? narrativeText.join('\n') : String(narrativeText);
  const heroName = S.cast.hero.name || '';
  const npcs = (S.cast.npcs || []).map(n => n.name).filter(Boolean);
  const heroParts = new Set();
  if (heroName) {
    heroParts.add(heroName);
    heroName.split(/[\s・]/).forEach(p => { if (p && p.length >= 2) heroParts.add(p); });
  }
  const nameToFull = {};
  if (heroName) {
    nameToFull[heroName] = heroName;
    heroName.split(/[\s・]/).forEach(p => { if (p && p.length >= 2) nameToFull[p] = heroName; });
  }
  npcs.forEach(n => {
    nameToFull[n] = n;
    n.split(/[\s・]/).forEach(p => { if (p && p.length >= 2) nameToFull[p] = n; });
  });
  const namesArr = Object.keys(nameToFull).sort((a,b) => b.length - a.length);
  const SPEECH_VERBS = '言|呟|叫|呻|喘|漏ら|呼び|尋ね|応|返|答|問|告|微笑|頷|首を|語|諭|怒鳴|喚|嘆|嘲|呼|聞';
  
  // Step 1: Get base events from existing extraction
  const baseEvents = _origExtractAttrFix(narrativeText);
  
  // Step 2: For each event, check if there's a と+name+verb pattern AFTER the quote that overrides
  // We need to find each event's position in the text
  const enriched = baseEvents.map(ev => {
    if (!ev.text) return ev;
    // Find position of this exact dialogue text in narrative
    const quoted = '「' + ev.text + '」';
    const idx = text.indexOf(quoted);
    if (idx < 0) return ev;  // can't find (might be split chunk), keep as is
    const dEnd = idx + quoted.length;
    const after = text.slice(dEnd, dEnd + 60);
    // Check pattern: と[NAME](?:[はがも])?(...)*[VERB]
    let attrName = null;
    for (const n of namesArr) {
      const escName = n.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const rx = new RegExp('と' + escName + '[はがも]?[^。、\\n]{0,8}(?:' + SPEECH_VERBS + ')');
      if (rx.test(after)) {
        attrName = n;
        break;
      }
      // Also: 「」+name+は+verb pattern (no と)
      const rx2 = new RegExp('^[^「]{0,3}' + escName + '[はがも][^。、\\n]{0,12}(?:' + SPEECH_VERBS + ')');
      if (rx2.test(after)) {
        attrName = n;
        break;
      }
    }
    if (attrName) {
      const fullName = nameToFull[attrName] || attrName;
      const isHero = fullName === heroName || heroParts.has(fullName);
      // Override attribution
      return { ...ev, speaker: fullName, isHero };
    }
    return ev;
  });
  
  return enriched;
};

// Helper: try loading Pollinations with timeout
function _tryLoadPollinations(url, timeoutMs) {
  return new Promise(resolve => {
    const img = new Image();
    let done = false;
    const timer = setTimeout(() => {
      if (done) return; done = true;
      resolve({ ok: false, reason: 'timeout' });
    }, timeoutMs);
    img.onload = () => {
      if (done) return; done = true;
      clearTimeout(timer);
      if (img.naturalWidth >= 32) resolve({ ok: true, w: img.naturalWidth });
      else resolve({ ok: false, reason: 'tiny image' });
    };
    img.onerror = () => {
      if (done) return; done = true;
      clearTimeout(timer);
      resolve({ ok: false, reason: 'load error' });
    };
    img.src = url;
  });
}

// Helper: persist cache state to localStorage
function _persistAvCache(url, state) {
  window._avatarLoadCache[url] = state;
  try {
    const KEY = 'chr_av_cache_v1';
    const ls = JSON.parse(localStorage.getItem(KEY) || '{}');
    ls[url] = state;
    // Keep size bounded
    const entries = Object.entries(ls);
    if (entries.length > 80) {
      const trimmed = Object.fromEntries(entries.slice(-60));
      localStorage.setItem(KEY, JSON.stringify(trimmed));
    } else {
      localStorage.setItem(KEY, JSON.stringify(ls));
    }
  } catch(e){}
}

// Override _setAvatarBg with longer timeout + retry-with-different-seed
window._setAvatarBg = function(el, primaryUrl, fallbackChar, name, desc, extraSeed) {
  if (!el) return;
  el.textContent = fallbackChar || '?';
  el.style.backgroundImage = '';
  
  if (!primaryUrl) {
    const dbUrl = (name || desc) ? window._dicebearUrl(name, desc, extraSeed) : null;
    if (dbUrl) { el.style.backgroundImage = 'url("' + dbUrl + '")'; el.textContent = ''; }
    return;
  }
  
  // Cached as ok? show immediately
  if (window._avatarLoadCache[primaryUrl] === 'ok') {
    el.style.backgroundImage = 'url("' + primaryUrl + '")';
    el.textContent = '';
    return;
  }
  
  // Async: try original URL, then retry with bumped seeds, then DiceBear
  (async () => {
    const TIMEOUT_MS = 45000;  // ← extended 22s → 45s for Pollinations cold-start
    const MAX_RETRIES = 3;
    
    // Attempt 1: original URL
    let result = await _tryLoadPollinations(primaryUrl, TIMEOUT_MS);
    if (result.ok) {
      _persistAvCache(primaryUrl, 'ok');
      el.style.backgroundImage = 'url("' + primaryUrl + '")';
      el.textContent = '';
      return;
    }
    _persistAvCache(primaryUrl, 'fail');
    
    // Retry attempts: bump seed and try again
    let currentSeed = extraSeed || 0;
    for (let i = 0; i < MAX_RETRIES; i++) {
      currentSeed += Math.floor(Math.random() * 1000) + 100;
      const retryUrl = window._avatarUrl(name, desc, currentSeed);
      if (!retryUrl) break;
      result = await _tryLoadPollinations(retryUrl, TIMEOUT_MS);
      if (result.ok) {
        _persistAvCache(retryUrl, 'ok');
        el.style.backgroundImage = 'url("' + retryUrl + '")';
        el.textContent = '';
        return;
      }
      _persistAvCache(retryUrl, 'fail');
    }
    
    // All retries failed → DiceBear
    const dbUrl = window._dicebearUrl(name, desc, extraSeed);
    el.style.backgroundImage = 'url("' + dbUrl + '")';
    el.textContent = '';
  })();
};

// Fix 4 critical issues:
// 1. Narrative coherence (tighten prompt — reduce noise)
// 2. JSON leak in narrative (filter JSON-like items)
// 3. English inner thoughts (stronger language rule)
// 4. Missing avatars (better speaker fallback)
// ─────────────────────────────────────────────────────────────

// Sanitize narrative array — drop JSON-like / English-heavy items
window._sanitizeNarrative = function(arr) {
  if (!Array.isArray(arr)) return [];
  return arr.filter(item => {
    if (typeof item !== 'string') return false;  // drop objects/null
    const s = item.trim();
    if (!s) return false;
    // Drop JSON-like fragments
    if (/^[{[]/.test(s)) return false;
    if (/^"s*"s*:/.test(s)) return false;        // empty-key JSON like '"" : "..."'
    if (/^"[a-zA-Z]+"s*:/.test(s)) return false;  // English JSON keys '"name": "..."'
    if (/^s*"s*:s*/.test(s)) return false;
    // Drop English-heavy lines (over 40% ASCII letters with no Japanese kana)
    const totalChars = s.length;
    const asciiLetters = (s.match(/[a-zA-Z]/g) || []).length;
    const hasJapanese = /[぀-ゟ゠-ヿ一-龥]/.test(s);
    if (asciiLetters > 8 && asciiLetters / totalChars > 0.35 && !hasJapanese) return false;
    // Drop lines with too many English words (3+ words of 3+ ASCII chars)
    const enWords = (s.match(/[A-Za-z][A-Za-z]{2,}/g) || []).length;
    if (enWords >= 4 && !hasJapanese) return false;
    // Drop pure key/value JSON dump lines
    if (/^[^「『《]*"[^"]*"s*:s*"[^"]*"[^「『《]*$/.test(s)) return false;
    return true;
  }).map(s => {
    // Strip stray English-language inner thoughts that match common patterns
    return s.replace(/《s*[A-Za-z][A-Za-zs?!,'".-]+》/g, '');
  }).filter(s => s.trim());
};

// Brave Shields fix: use fetch + blob URL instead of direct img.src
// (Brave blocks <img> from pollinations.ai but allows fetch)
// ─────────────────────────────────────────────────────────────

window._blobUrlCache = window._blobUrlCache || {};

// Fetch image as blob URL (cached) — bypasses Brave's <img> blocker
async function _fetchAsBlob(url, timeoutMs) {
  // Check cache first
  if (window._blobUrlCache[url]) return { ok: true, blobUrl: window._blobUrlCache[url] };
  
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), timeoutMs || 45000);
  try {
    const r = await fetch(url, { cache: 'force-cache', signal: ctrl.signal });
    clearTimeout(timer);
    if (!r.ok) return { ok: false, reason: 'http ' + r.status };
    const blob = await r.blob();
    if (!blob.type.startsWith('image/')) return { ok: false, reason: 'not image: ' + blob.type };
    if (blob.size < 1000) return { ok: false, reason: 'too small ' + blob.size };
    const blobUrl = URL.createObjectURL(blob);
    window._blobUrlCache[url] = blobUrl;
    return { ok: true, blobUrl, bytes: blob.size };
  } catch (e) {
    clearTimeout(timer);
    return { ok: false, reason: e.name + ':' + e.message };
  }
}
window._fetchAsBlob = _fetchAsBlob;

// Replace _tryLoadPollinations to use blob fetch
window._tryLoadPollinations = async function(url, timeoutMs) {
  const r = await _fetchAsBlob(url, timeoutMs || 45000);

};

// Override randomFill with massively expanded data
const _origRandomFillExpand = UI.randomFill.bind(UI);
UI.randomFill = function() {
  const D = window._RANDOM_DATA_V2;
  const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];
  
  const hName = document.getElementById('cfgHName');
  const hDesc = document.getElementById('cfgHDesc');
  const cLoc = document.getElementById('cfgLoc');
  const cTone = document.getElementById('cfgTone');
  const cObj = document.getElementById('cfgObj');
  const cLore = document.getElementById('cfgLore');
  
  if (hName && !hName.value.trim()) {
    const h = pick(D.heroes);
    hName.value = h.name;
    if (hDesc && !hDesc.value.trim()) hDesc.value = h.desc;
  } else if (hDesc && !hDesc.value.trim()) {
    hDesc.value = pick(D.heroes).desc;
  }
  if (cLoc && !cLoc.value.trim()) cLoc.value = pick(D.locs);
  if (cTone && !cTone.value.trim()) cTone.value = pick(D.tones);
  if (cObj && !cObj.value.trim()) cObj.value = pick(D.objs);
  if (cLore && !cLore.value.trim()) cLore.value = pick(D.lores);
  
  // NPC: add one if list is empty, then fill
  const existingCards = document.querySelectorAll('#npcList .npc-card');
  if (existingCards.length === 0) {
    UI.addNpc();
    setTimeout(() => {
      const card = document.querySelector('#npcList .npc-card:last-child');
      if (!card) return;
      const nd = pick(D.npcs);
      const set = (f, v) => { const el = card.querySelector('[data-f="' + f + '"]'); if (el && !el.value.trim()) el.value = v; };
      set('name', nd.name); set('desc', nd.desc); set('personality', nd.personality);
      set('coreDesire', nd.coreDesire); set('coreFear', nd.coreFear); set('wound', nd.wound);
    }, 50);
  }
  
  // Sync to state after fill (existing wrapper does this with toast)
  setTimeout(() => {
    if (hName) S.cast.hero.name = hName.value.trim();
    if (hDesc) S.cast.hero.desc = hDesc.value.trim();
    if (cLoc) S.scene.loc = cLoc.value.trim();
    if (cTone) S.scene.tone = cTone.value.trim();
    if (cObj) S.scene.obj = cObj.value.trim();
    if (cLore) S.scene.lore = cLore.value.trim();
    document.querySelectorAll('#npcList .npc-card').forEach((card, i) => {
      if (!S.cast.npcs[i]) return;
      ['name','desc','personality','coreDesire','coreFear','wound'].forEach(f => {
        const el = card.querySelector('[data-f="' + f + '"]');
        if (el) S.cast.npcs[i][f] = el.value.trim();
      });
    });
    S.save();
    if (window._renderHeroAvatarInSettings) window._renderHeroAvatarInSettings();
    if (window._toast) window._toast('未入力フィールドをランダム生成して保存しました', 'ok');
  }, 250);
};

// Helper: sync ALL NPC card DOM values back to S.cast.npcs
function _syncNpcDomToState() {
  document.querySelectorAll('#npcList .npc-card').forEach((card, i) => {
    if (!S.cast.npcs[i]) return;
    ['name','desc','personality','coreDesire','coreFear','wound'].forEach(f => {
      const el = card.querySelector('[data-f="' + f + '"]');
      if (el) S.cast.npcs[i][f] = el.value.trim();
    });
  });
}
window._syncNpcDomToState = _syncNpcDomToState;

// Helper: sync hero/scene DOM to state too
function _syncAllDomToState() {
  const hName = document.getElementById('cfgHName');
  const hDesc = document.getElementById('cfgHDesc');
  const cLoc = document.getElementById('cfgLoc');
  const cTone = document.getElementById('cfgTone');
  const cObj = document.getElementById('cfgObj');
  const cLore = document.getElementById('cfgLore');
  if (hName) S.cast.hero.name = hName.value.trim();
  if (hDesc) S.cast.hero.desc = hDesc.value.trim();
  if (cLoc) S.scene.loc = cLoc.value.trim();
  if (cTone) S.scene.tone = cTone.value.trim();
  if (cObj) S.scene.obj = cObj.value.trim();
  if (cLore) S.scene.lore = cLore.value.trim();
  _syncNpcDomToState();
}
window._syncAllDomToState = _syncAllDomToState;

// Fix #1: NPC avatar regen — sync DOM before re-render to preserve typed-but-not-saved data
window._regenNpcAvatar = function(idx) {
  const npc = S.cast.npcs[idx];
  if (!npc) return;
  // CRITICAL: sync ALL DOM values to state BEFORE re-render (preserves user typing)
  _syncAllDomToState();
  
  // Bump seed
  const jump = Math.floor(Math.random() * 1000) + 1;
  npc.avatarSeed = (npc.avatarSeed || 0) + jump;
  // Clear cache
  window._avatarLoadCache = {};
  for (const u of Object.values(window._blobUrlCache || {})) {

// Override Planner.build to soften the threatening tone of the format rule
const _origPlanBuildSoften = Planner.build.bind(Planner);
Planner.build = function(inputType, inputText) {
  const result = _origPlanBuildSoften(inputType, inputText);
  if (S.cfg.simpleMode) return result;
  // Replace the harsh "破棄される" wording if present  
  result.sys = result.sys.replace(/【🚫 出力フォーマット違反の絶対禁止 🚫】[\s\S]*?違反したら全部破棄される。/, '');
  // Add a SOFTER, more positive language reinforcement at the end
  result.sys += '\n\n【★narrativeの書き方】narrative配列は **日本語の自然な地の文と台詞のみ** で構成する：' +
    '\n• 各要素は完結した一文（〜した／〜と言った／〜だった等）。' +
    '\n• 内心《》も日本語のみ。英語の独白は使わない。' +
    '\n• JSON構造の生テキストや英単語連続は narrative に入れない。' +
    '\n• NPCのcoreDesireやcoreFearの値は **物語として自然な日本語に変換** して使う。' +
    '\n配列は **最低5要素** 出力する。空にしない。';
  return result;
};

// Override _sanitizeNarrative to be MORE LENIENT — only drop obvious garbage
window._sanitizeNarrative = function(arr) {
  if (!Array.isArray(arr)) return [];
  return arr.filter(item => {
    if (typeof item !== 'string') return false;
    const s = item.trim();
    if (!s) return false;
    // Drop only OBVIOUS JSON garbage (raw object dumps)
    if (/^\{\s*"\w+"/.test(s)) return false;       // {"key":...
    if (/^"\s*"\s*:/.test(s)) return false;         // "":
    if (/^"\w+"\s*:\s*"[^"]*"\s*$/.test(s)) return false; // pure JSON pair
    // Drop pure English-only lines (no Japanese chars, mostly latin)
    const hasJapanese = /[぀-ゟ゠-ヿ一-龥]/.test(s);
    const asciiCount = (s.match(/[a-zA-Z]/g) || []).length;
    if (!hasJapanese && asciiCount > 6) return false;
    return true;
  }).map(s => {
    // Strip stray English-only inner thoughts but keep the rest of the line
    return s.replace(/《\s*[A-Za-z][A-Za-z\s\?\!,'"\.\-]+》/g, '');
  }).filter(s => s.trim());
};

// Override parsePlan wrapper: if narrative is empty/dot-only after sanitize,
// substitute with a bridge text reflecting the player input
const _origParsePlanBridge = Planner.parsePlan.bind(Planner);
Planner.parsePlan = function(rawText, inputType) {
  const plan = _origParsePlanBridge(rawText, inputType);
  if (!plan) return plan;
  // Sanitize
  if (plan.narrative) {
    plan.narrative = window._sanitizeNarrative(plan.narrative);
  }
  // Detect "empty result" — narrative is just dots or empty
  const isEffectivelyEmpty = !plan.narrative || 
    plan.narrative.length === 0 ||
    (plan.narrative.length <= 2 && plan.narrative.every(s => /^[…\.\s]*$/.test(s)));
  
  if (isEffectivelyEmpty) {
    // Build bridge from raw response — try to extract any Japanese sentences
    const text = rawText || '';
    const jpSentences = text
      .split(/[。！？\n]+/)
      .map(s => s.trim())
      .filter(s => /[぀-ゟ゠-ヿ一-龥]/.test(s) && s.length >= 4 && s.length <= 200);
    if (jpSentences.length > 0) {
      plan.narrative = jpSentences.slice(0, 6).map(s => s.endsWith('。') || s.endsWith('！') || s.endsWith('？') ? s : s + '。');
    } else {
      // Last resort: synthesize a minimal bridge reflecting input
      const heroName = S.cast.hero.name || '主人公';
      const lastTurn = (S.turns || []).slice(-1)[0];
      const inp = (lastTurn && lastTurn.playerText) || '';
      if (inputType === 'DO' && inp) {
        plan.narrative = [
          heroName + 'は' + inp.replace(/。$/,'') + '。',
          '空気が変わった。',
          '次の瞬間、何かが起こりそうな気配が漂う。'
        ];
      } else if (inputType === 'SAY' && inp) {
        plan.narrative = [
          heroName + 'の言葉に、その場の空気が一瞬止まった。',
          '相手の表情が微かに動いた。'
        ];
      } else {
        plan.narrative = ['物語は続いている。', '次の展開を待つ静寂。'];
      }
    }
  }
  return plan;
};

// Fix A: Chapter marker — switch from =SCENE: to =場面: (Japanese)
// to avoid getting eaten by English-stripping filter

// Update Planner.build to use =場面: in instructions
const _origPlanBuildABFix = Planner.build.bind(Planner);
Planner.build = function(inputType, inputText) {
  const result = _origPlanBuildABFix(inputType, inputText);
  if (S.cfg.simpleMode) return result;
  // Replace any =SCENE: instructions with =場面: in the prompt
  result.sys = result.sys.replace(/=SCENE:/g, '=場面:').replace(/=SCENE\\s*:/g, '=場面:');
  return result;
};

// Update renderTurn to detect both =場面: and legacy =SCENE: (in case stripped to =:)
const _origRTChapterFix = UI.renderTurn.bind(UI);
UI.renderTurn = function(turn, idx) {
  const div = _origRTChapterFix(turn, idx);
  // Remove any chapter-marker that may have been added by the original (with broken =:)
  div.querySelectorAll('.chapter-marker').forEach(m => m.remove());
  // Look for our patterns
  const narr = Array.isArray(turn.narrative) ? turn.narrative.join('\n') : (turn.narrative || '');
  const mJP = narr.match(/=場面:\s*([^=\n]+?)=/);
  const mLegacy = narr.match(/=:\s*([^=\n]+?)=/);  // English stripped
  const m = mJP || mLegacy;
  if (m) {
    // Compute chapter num
    let chapterNum = 1;
    for (let i = 0; i <= idx && i < S.turns.length; i++) {
      const t = S.turns[i];
      const tNarr = Array.isArray(t.narrative) ? t.narrative.join('\n') : (t.narrative || '');
      if (/=場面:|=:/i.test(tNarr) && /=[^=\n]+=/.test(tNarr)) {
        if (i === idx) break;
        chapterNum++;
      }
    }
    const title = m[1].trim();
    const marker = document.createElement('div');
    marker.className = 'chapter-marker';
    marker.innerHTML = '<span class="cm-deco">✦</span>' +
      '<div class="cm-content">' +
        '<div class="cm-num">第' + chapterNum + '章</div>' +
        '<div class="cm-title">' + UI.esc(title) + '</div>' +
      '</div>' +
      '<span class="cm-deco">✦</span>';
    if (div.firstChild) div.insertBefore(marker, div.firstChild);
    else div.appendChild(marker);
    // Strip the marker from displayed narrative
    const block = div.querySelector('.narr-block');
    if (block) {
      block.querySelectorAll('p, .ptext').forEach(p => {
        p.innerHTML = p.innerHTML.replace(/=場面:\s*[^=\n]+?=\s*/g, '').replace(/=:\s*[^=\n]+?=\s*/g, '');
        if (!p.textContent.trim()) p.remove();
      });
    }
  }
  return div;
};

// ─────────────────────────────────────────────────────────────
// Fix B: Speaker attribution — exclude names inside quotes (vocative)
// when searching BEFORE for the speaker
// ─────────────────────────────────────────────────────────────

// Wrap _extractDialogue to apply better speaker resolution
const _origExtractAB = window._extractDialogue;
window._extractDialogue = function(narrativeText) {
  const baseEvents = _origExtractAB(narrativeText);
  if (!narrativeText) return baseEvents;
  const text = Array.isArray(narrativeText) ? narrativeText.join('\n') : String(narrativeText);
  
  const heroName = S.cast.hero.name || '';
  const npcs = (S.cast.npcs || []).map(n => n.name).filter(Boolean);
  const heroParts = new Set();
  if (heroName) {
    heroParts.add(heroName);
    heroName.split(/[\s・]/).forEach(p => { if (p && p.length >= 2) heroParts.add(p); });
  }
  const nameToFull = {};
  if (heroName) {
    nameToFull[heroName] = heroName;
    heroName.split(/[\s・]/).forEach(p => { if (p && p.length >= 2) nameToFull[p] = heroName; });
  }
  npcs.forEach(n => {
    nameToFull[n] = n;
    n.split(/[\s・]/).forEach(p => { if (p && p.length >= 2) nameToFull[p] = n; });
  });
  const namesArr = Object.keys(nameToFull).sort((a,b) => b.length - a.length);
  
  // Strip quoted regions from text for speaker search (vocative names inside 「」 don't count)
  function stripQuotes(s) {
    return s.replace(/「[^「」]*」/g, '____').replace(/《[^《》]*》/g, '____');
  }
  
  // For each event, re-evaluate speaker using stripped text
  let lastNamedSpeaker = null;
  const enriched = [];
  for (const ev of baseEvents) {
    if (!ev.text) { enriched.push(ev); continue; }
    const quoted = '「' + ev.text + '」';
    const idx = text.indexOf(quoted);
    if (idx < 0) {
      // Can't find — keep as is (may be split chunk or sfx)
      if (ev.speaker) lastNamedSpeaker = ev.speaker;
      enriched.push(ev);
      continue;
    }
    const dEnd = idx + quoted.length;
    
    // BEFORE: search 80 chars before, BUT strip quoted text
    const beforeRaw = text.slice(Math.max(0, idx - 80), idx);
    const beforeStripped = stripQuotes(beforeRaw);
    
    let bestPos = -1, bestName = null;
    for (const n of namesArr) {
      const pos = beforeStripped.lastIndexOf(n);
      if (pos > bestPos) { bestPos = pos; bestName = n; }
    }
    
    // AFTER pattern: と+name+verb (already prioritized in earlier wrapper)
    const after60 = text.slice(dEnd, dEnd + 60);
    const SPEECH_VERBS = '言|呟|叫|呻|喘|漏ら|呼び|尋ね|応|返|答|問|告|微笑|頷|首を|語|諭|怒鳴|喚|嘆|嘲|呼|聞';
    let afterPatternName = null;
    for (const n of namesArr) {
      const escName = n.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const rx = new RegExp('と' + escName + '[はがも]?[^。、\\n]{0,8}(?:' + SPEECH_VERBS + ')');
      if (rx.test(after60)) { afterPatternName = n; break; }
    }
    
    let chosenName = afterPatternName || bestName;
    
    // Layer 1 inheritance: if no speaker found, use last from PREVIOUS adjacent quote
    if (!chosenName && enriched.length > 0) {
      // Check if previous event's quote ends within 25 chars of this one's start
      const prev = enriched[enriched.length - 1];
      if (prev.speaker) {
        // Use prev speaker if quotes are close (Layer 1 adjacency)
        // We don't have direct positions but adjacency is reasonable assumption
        chosenName = prev.speaker;
      }
    }
    
    // Pronoun resolution
    if (!chosenName) {
      const ctx = beforeStripped + stripQuotes(after60);
      if (/彼女|あの娘|あの子|彼の|彼は|彼が/.test(ctx) && lastNamedSpeaker) {
        chosenName = lastNamedSpeaker;
      }
    }
    
    const fullName = chosenName ? (nameToFull[chosenName] || chosenName) : null;
    const isHero = !!(fullName && (fullName === heroName || heroParts.has(fullName)));
    
    if (fullName) lastNamedSpeaker = chosenName;
    
    enriched.push({ ...ev, speaker: fullName, isHero });
  }
  
  return enriched;
};




// ─────────────────────────────────────────────────────────────
// Fix narrative slice limit — original cuts at 8 items, but we now have
// chapter markers, env SFX, dialogues, inner thoughts → easily exceed 8
// ─────────────────────────────────────────────────────────────
const _origParsePlanSlice = Planner.parsePlan.bind(Planner);
Planner.parsePlan = function(rawText, inputType) {
  const plan = _origParsePlanSlice(rawText, inputType);
  if (!plan || !plan.narrative) return plan;
  // The original applies .slice(0, 8). Our wrappers run AFTER. So if input had >8,
  // some are already gone. We can't recover those. But we can ensure narratives
  // re-extracted from raw JSON contain MORE items.
  // Fix: re-extract narrative from raw JSON if available, ignoring slice limit
  try {
    let t = rawText.trim();
    const fence = t.match(/\`\`\`(?:json)?\\s*([\\s\\S]+?)\\s*\`\`\`/);
    if (fence) t = fence[1];
    const s = t.indexOf('{'), e = t.lastIndexOf('}');
    if (s !== -1 && e !== -1) t = t.slice(s, e + 1);
    const json = JSON.parse(t);
    if (Array.isArray(json.narrative) && json.narrative.length > plan.narrative.length) {
      // We lost items to the slice. Recover ALL items, then apply OUR sanitize
      let allNarr = json.narrative.filter(x => typeof x === 'string' && x.trim());
      // Apply hero filter if needed (DO/SAY) — minimal version
      const heroName = S.cast.hero.name;
      if (heroName && inputType === 'SAY') {
        const rxAct = new RegExp(heroName + '[はがを].{0,20}(殴|刺|掴|捕まえ|蹴|握|縛|押|叫び)');
        allNarr = allNarr.filter(s => !rxAct.test(s));
      }
      // Apply foreign garbage filter from original
      allNarr = allNarr.map(line => {
        let t = line;
        // ASCII 3+ removal — but skip our marker patterns =場面: etc
        if (!/=場面:|\*[—–-]/.test(t)) {
          t = t.replace(/[A-Za-z][A-Za-z0-9_.]{2,}/g, '');
        }
        t = t.replace(/[过这没现还说让对给从将们点东几亲爱觉吗么吧呢哪谁怎样此后状围]/g, '');
        return t.replace(/\\s+/g, ' ').trim();
      }).filter(line => line && line.length >= 2 && /[぀-ゟ゠-ヿ]/.test(line));
      // Apply our sanitize
      allNarr = window._sanitizeNarrative(allNarr);
      // INCREASED limit: 15
      plan.narrative = allNarr.slice(0, 15);
    }
  } catch(e) {
    // not JSON, leave plan.narrative as is
  }
  if (plan.narrative.length === 0) plan.narrative = ['…'];
  return plan;
};



// ─────────────────────────────────────────────────────────────
// Fix 429 spam + Settings export/import
// ─────────────────────────────────────────────────────────────

// Track rate-limit state — once we hit 429, back off for the session
window._pollRateLimited = window._pollRateLimited || { until: 0, hitCount: 0 };

// Override _fetchAsBlob to detect 429 and back off
const _origFetchAsBlob = window._fetchAsBlob;
window._fetchAsBlob = async function(url, timeoutMs) {
  // If we recently got 429s, skip Pollinations entirely
  if (url.includes('pollinations') && Date.now() < window._pollRateLimited.until) {
    return { ok: false, reason: 'rate-limit-cooldown' };
  }
  // Cache hit
  if (window._blobUrlCache[url]) return { ok: true, blobUrl: window._blobUrlCache[url] };
  
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), timeoutMs || 45000);
  try {
    const r = await fetch(url, { cache: 'force-cache', signal: ctrl.signal });
    clearTimeout(timer);
    if (r.status === 429) {
      // Rate limited — back off for 5 min
      window._pollRateLimited.hitCount++;
      window._pollRateLimited.until = Date.now() + (5 * 60 * 1000);
      if (window._toast && window._pollRateLimited.hitCount === 1) {
        window._toast('Pollinations レート制限中。DiceBearで代替表示（5分後リトライ可）', 'warn');
      }
      return { ok: false, reason: '429' };
    }
    if (!r.ok) return { ok: false, reason: 'http ' + r.status };
    const blob = await r.blob();
    if (!blob.type.startsWith('image/')) return { ok: false, reason: 'not image: ' + blob.type };
    if (blob.size < 1000) return { ok: false, reason: 'too small ' + blob.size };
    const blobUrl = URL.createObjectURL(blob);
    window._blobUrlCache[url] = blobUrl;
    // Reset hit count on success
    window._pollRateLimited.hitCount = 0;
    return { ok: true, blobUrl, bytes: blob.size };
  } catch (e) {
    clearTimeout(timer);
    return { ok: false, reason: e.name + ':' + e.message };
  }
};

// Override _setAvatarBg to skip retries when rate-limited
window._setAvatarBg = function(el, primaryUrl, fallbackChar, name, desc, extraSeed) {
  if (!el) return;
  el.textContent = fallbackChar || '?';
  el.style.backgroundImage = '';
  
  if (!primaryUrl) {
    const dbUrl = (name || desc) ? window._dicebearUrl(name, desc, extraSeed) : null;
    if (dbUrl) {
      window._fetchAsBlob(dbUrl, 10000).then(r => {
        if (r.ok) { el.style.backgroundImage = 'url("' + r.blobUrl + '")'; el.textContent = ''; }
      });
    }
    return;
  }
  
  if (window._avatarLoadCache[primaryUrl] === 'ok' && window._blobUrlCache[primaryUrl]) {
    el.style.backgroundImage = 'url("' + window._blobUrlCache[primaryUrl] + '")';
    el.textContent = '';
    return;
  }
  
  // If rate-limited, immediately go to DiceBear (no Pollinations attempt)
  const isRateLimited = Date.now() < window._pollRateLimited.until;
  if (isRateLimited) {
    const dbUrl = window._dicebearUrl(name, desc, extraSeed);
    window._fetchAsBlob(dbUrl, 10000).then(r => {
      if (r.ok) { el.style.backgroundImage = 'url("' + r.blobUrl + '")'; el.textContent = ''; }
    });
    return;
  }
  
  // Try Pollinations once (no retry seed bumping when potential rate limit)
  (async () => {
    const TIMEOUT_MS = 45000;
    let result = await window._fetchAsBlob(primaryUrl, TIMEOUT_MS);
    if (result.ok) {
      el.style.backgroundImage = 'url("' + result.blobUrl + '")';
      el.textContent = '';
      window._avatarLoadCache[primaryUrl] = 'ok';
      return;
    }
    
    // If 429 — give up immediately, go to DiceBear
    if (result.reason === '429' || result.reason === 'rate-limit-cooldown') {
      const dbUrl = window._dicebearUrl(name, desc, extraSeed);
      const dbR = await window._fetchAsBlob(dbUrl, 10000);
      if (dbR.ok) {
        el.style.backgroundImage = 'url("' + dbR.blobUrl + '")';
        el.textContent = '';
      }
      return;
    }
    
    // Other errors — try ONE retry with new seed (was 3, reduced to 1)
    const newSeed = (extraSeed || 0) + Math.floor(Math.random() * 1000) + 100;
    const retryUrl = window._avatarUrl(name, desc, newSeed);
    if (retryUrl) {
      result = await window._fetchAsBlob(retryUrl, TIMEOUT_MS);
      if (result.ok) {
        el.style.backgroundImage = 'url("' + result.blobUrl + '")';
        el.textContent = '';
        window._avatarLoadCache[retryUrl] = 'ok';
        return;
      }
    }
    
    // Final fallback: DiceBear
    const dbUrl = window._dicebearUrl(name, desc, extraSeed);
    const dbR = await window._fetchAsBlob(dbUrl, 10000);
    if (dbR.ok) {
      el.style.backgroundImage = 'url("' + dbR.blobUrl + '")';
      el.textContent = '';
    }
  })();
};

// Override batch regen with stronger throttle (700ms → 2500ms) + early-stop on 429
window._regenAllAvatars = async function() {
  const characters = [];
  if (S.cast.hero && S.cast.hero.name) characters.push({ type: 'hero', label: S.cast.hero.name });
  (S.cast.npcs || []).forEach((npc, i) => { if (npc && npc.name) characters.push({ type: 'npc', idx: i, label: npc.name }); });
  const total = characters.length;
  const btn = document.getElementById('btnRegenAll');
  if (total === 0) { window._toast('対象キャラがいません', 'warn'); return; }
  const origText = btn ? btn.textContent : '';
  if (btn) { btn.disabled = true; btn.classList.add('regen-running'); }
  
  // Reset rate-limit state and caches
  window._pollRateLimited = { until: 0, hitCount: 0 };
  window._avatarLoadCache = {};
  for (const u of Object.values(window._blobUrlCache || {})) {
    try { URL.revokeObjectURL(u); } catch(e){}
  }
  window._blobUrlCache = {};
  try { localStorage.removeItem('chr_av_cache_v1'); } catch(e){}
  
  const failures = [];
  
  for (let i = 0; i < total; i++) {
    const c = characters[i];
    if (btn) btn.textContent = '再生成中 (' + (i+1) + '/' + total + ')...';
    
    // If we've already hit rate limit, skip all remaining and use DiceBear
    if (Date.now() < window._pollRateLimited.until) {
      failures.push(c.label + '(レート制限)');
      continue;
    }
    
    let url = null;
    const jump = Math.floor(Math.random() * 1000) + 1;
    if (c.type === 'hero') {
      S.cast.hero.avatarSeed = (S.cast.hero.avatarSeed || 0) + jump;
      url = window._getHeroAvatar();
    } else {
      const npc = S.cast.npcs[c.idx];
      if (npc) {
        npc.avatarSeed = (npc.avatarSeed || 0) + jump;
        url = window._getNpcAvatar(npc);
      }
    }
    if (!url) { failures.push(c.label); continue; }
    
    const r = await window._fetchAsBlob(url, 45000);
    if (!r.ok) failures.push(c.label + (r.reason ? '('+r.reason+')' : ''));
    
    // Stronger throttle: 2500ms between requests (was 500-700ms)
    if (i < total - 1) await new Promise(r => setTimeout(r, 2500));
  }
  
  S.save();
  if (UI._renderNpcList) UI._renderNpcList();
  if (UI.renderAll) UI.renderAll();
  if (window._renderHeroAvatarInSettings) window._renderHeroAvatarInSettings();
  
  if (btn) { btn.disabled = false; btn.classList.remove('regen-running'); btn.textContent = origText || '🔄 全キャラ一括再生成'; }
  
  if (failures.length === 0) window._toast('全' + total + 'キャラの再生成完了', 'ok');
  else window._toast((total - failures.length) + '/' + total + '完了。失敗: ' + failures.join('、'), 'warn');
};

window._exportSettings = function() {
  const data = {
    version: 1,
    exportedAt: new Date().toISOString(),
    cfg: S.cfg,
    cast: S.cast,
    scene: S.scene,
    turns: S.turns
  };
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
  a.href = url;
  a.download = 'chronicle-backup-' + ts + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  if (window._toast) window._toast('設定をエクスポートしました', 'ok');
};

window._importSettings = function() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json,application/json';
  input.onchange = (e) => {
    const f = e.target.files?.[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.cfg && !data.cast) throw new Error('無効な形式');
        // Confirm before overwrite
        if (!confirm('現在の設定とゲームデータを上書きしてインポートします。よろしいですか？')) return;
        // Restore
        if (data.cfg) S.cfg = Object.assign({}, S.cfg, data.cfg);
        if (data.cast) S.cast = data.cast;
        if (data.scene) S.scene = data.scene;
        if (data.turns) S.turns = data.turns;
        S.save();
        // Refresh UI
        if (UI.closeSettings) UI.closeSettings();
        setTimeout(() => {
          if (UI.renderAll) UI.renderAll();
          if (UI.openSettings) UI.openSettings();
          if (window._toast) window._toast('設定をインポートしました（' + (data.cast?.npcs?.length || 0) + 'NPC、' + (data.turns?.length || 0) + 'ターン）', 'ok');
        }, 200);
      } catch (e) {
        if (window._toast) window._toast('インポート失敗: ' + e.message, 'err');
      }
    };
    reader.readAsText(f);
  };
  input.click();
};

// Ephemeral NPCs — detect unregistered characters in narrative
// + auto-generate avatars from extracted descriptions
// ─────────────────────────────────────────────────────────────

// Common Japanese words to skip (not characters)
const COMMON_NON_NAMES = new Set([
  '彼女','彼','あの','この','その','どの','皆','誰','何','男','女','子','人','者',
  '声','目','手','顔','心','身体','世界','空気','空','風','窓','扉','床','壁',
  '血','涙','涙','光','闇','影','音','匂','息','汗','時','瞬間','刻','日','夜',
  '朝','昼','夕','部屋','家','道','森','街','村','町','国','所','場',
  '何か','誰か','他者','相手','自分','対象','存在','生物','獣','動物'
]);

window._extractEphemeralNpcs = function(narrativeText) {
  const text = Array.isArray(narrativeText) ? narrativeText.join('\n') : String(narrativeText || '');
  
  // Build set of known names
  const knownNames = new Set();
  if (S.cast.hero.name) {
    knownNames.add(S.cast.hero.name);
    S.cast.hero.name.split(/[\s・]/).forEach(p => { if (p) knownNames.add(p); });
  }
  (S.cast.npcs || []).forEach(n => {
    if (n.name) {
      knownNames.add(n.name);
      n.name.split(/[\s・]/).forEach(p => { if (p) knownNames.add(p); });
    }
  });
  
  // Detection patterns
  // Pattern 1: 「...」と[NAME][はがも][verb] (post-quote attribution)
  const SPEECH_VERBS = '言|呟|叫|呻|喘|漏ら|呼び|尋ね|応|返|答|問|告|微笑|頷|首を|語|諭|怒鳴|喚|嘆|嘲|呼|聞';
  const rxAfter = new RegExp('」と([^\\s「」、。！？\\n]{2,8})[はがも][^。、\\n]{0,5}(?:' + SPEECH_VERBS + ')', 'g');
  // Pattern 2: [NAME]が現れた / 立っていた / 入ってきた / 姿を見せた (entrance)
  const rxEnter = /([^\s「」、。！？\n]{2,8})が(?:現れ|立っ|入っ|姿を見せ|歩いて|やって来|割り込|飛び出|迫っ)/g;
  // Pattern 3: [NAME]は「...」と... (pre-quote attribution)
  const rxBefore = /([^\s「」、。！？\n]{2,8})[はがも][^「」\n]{0,5}「/g;
  
  const candidates = new Map(); // name → { count, contexts: [...] }
  
  function record(name, idx) {
    if (knownNames.has(name)) return;
    if (COMMON_NON_NAMES.has(name)) return;
    if (name.length < 2 || name.length > 8) return;
    // Reject if mostly hiragana (likely common verb/noun) — names usually have katakana or specific kanji
    const kataCount = (name.match(/[ァ-ヶー]/g) || []).length;
    const kanjiCount = (name.match(/[一-龥]/g) || []).length;
    if (kataCount === 0 && kanjiCount === 0) return; // pure hiragana usually isn't a name
    if (!candidates.has(name)) candidates.set(name, { count: 0, idx: idx });
    candidates.get(name).count++;
  }
  
  let m;
  while ((m = rxAfter.exec(text)) !== null) record(m[1], m.index);
  while ((m = rxEnter.exec(text)) !== null) record(m[1], m.index);
  while ((m = rxBefore.exec(text)) !== null) record(m[1], m.index);
  
  // For each candidate, extract description from surrounding text
  const result = {};
  for (const [name, info] of candidates) {
    const idx = info.idx;
    // Look at 60 chars BEFORE the name for descriptors
    const before = text.slice(Math.max(0, idx - 60), idx);
    // Description heuristic: adjective + person noun pattern
    const descMatch = before.match(/([黒赤青白銀金緑紫橙黄茶老若小大細太美醜怪奇謎異幼薄厚][^\s、。\n「」]{0,15}(?:の|な|い)?[^\s、。\n「」]{0,5}(男|女|少年|少女|老人|青年|戦士|魔導|魔術|司祭|神官|商人|騎士|盗賊|姫|王|貴族|傭兵|農夫|市民|怪物|魔物|幽霊|妖精|獣|犬|猫|蛇|鳥|モンスター|不死|住民|村人|兵士|衛兵|奴隷|囚人|侍女|執事|使用人|者|人物))/);
    let desc = '';
    if (descMatch) {
      desc = descMatch[1];
    } else {
      // No description found — use name as base
      desc = name + 'という名の人物';
    }
    // Add tone hint from scene
    if (S.scene.tone) desc += '、' + S.scene.tone.split(/[、,。]/)[0] + 'な雰囲気';
    
    result[name] = {
      name: name,
      desc: desc,
      ephemeral: true,
      avatarSeed: 0
    };
  }
  return result;
};

// Wrap _renderDialogueCards to handle ephemeral NPCs
const _origRenderEphemeral = window._renderDialogueCards;
window._renderDialogueCards = function(turn) {
  const div = _origRenderEphemeral(turn);
  if (!div) return null;
  
  // Detect ephemeral characters in this turn's narrative
  const ephemerals = window._extractEphemeralNpcs(turn.narrative);
  if (Object.keys(ephemerals).length === 0) return div;
  
  // For each dialogue row whose speaker matches an ephemeral, set up avatar
  div.querySelectorAll('.dialogue-row').forEach(row => {
    const av = row.querySelector('.dialogue-avatar');
    if (!av) return;
    if (av.style.backgroundImage) return; // already set
    const nameEl = row.querySelector('.dialogue-name');
    const speakerName = nameEl?.textContent?.replace(/（呟き）/g,'').trim() || '';
    if (!speakerName) return;
    
    // Check ephemeral cast
    const eph = ephemerals[speakerName];
    if (eph) {
      // Add ephemeral marker class for visual distinction
      row.classList.add('ephemeral-char');
      // Generate avatar URL using ephemeral data
      const url = window._avatarUrl(eph.name, eph.desc, eph.avatarSeed);
      window._setAvatarBg(av, url, speakerName.charAt(0), eph.name, eph.desc, eph.avatarSeed);
    }
  });
  
  return div;
};

// Also: re-extract dialogues including ephemerals so dialogue cards are CREATED for them
const _origExtractEphemeral = window._extractDialogue;
window._extractDialogue = function(narrativeText) {
  const baseEvents = _origExtractEphemeral(narrativeText);
  if (!narrativeText) return baseEvents;
  const text = Array.isArray(narrativeText) ? narrativeText.join('\n') : String(narrativeText);
  const ephemerals = window._extractEphemeralNpcs(text);
  
  // Find dialogues whose speakers were dropped (not in known cast) and try to attribute to ephemerals
  const SPEECH_VERBS = '言|呟|叫|呻|喘|漏ら|呼び|尋ね|応|返|答|問|告|微笑|頷|首を|語|諭|怒鳴|喚|嘆|嘲|呼|聞';
  const dRx = /「([^「」]+?)」/g;
  const allQuotes = [];
  let m;
  while ((m = dRx.exec(text)) !== null) {
    allQuotes.push({ start: m.index, end: m.index + m[0].length, text: m[1] });
  }
  
  // For each quote, check if any ephemeral name is in nearby text and not in baseEvents
  const baseTextSet = new Set(baseEvents.map(e => e.text));
  const newEvents = [];
  for (const q of allQuotes) {
    if (baseTextSet.has(q.text)) continue; // already attributed
    const before = text.slice(Math.max(0, q.start - 80), q.start);
    const after = text.slice(q.end, q.end + 60);
    let ephName = null;
    for (const ephK of Object.keys(ephemerals)) {
      const escName = ephK.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const rxAfter = new RegExp('と' + escName + '[はがも]?[^。、\\n]{0,8}(?:' + SPEECH_VERBS + ')');
      if (rxAfter.test(after) || before.lastIndexOf(ephK) > -1) {
        ephName = ephK;
        break;
      }
    }
    if (ephName) {
      newEvents.push({
        speaker: ephName,
        text: q.text,
        isHero: false,
        isInner: false,
        isSfx: false,
        ephemeral: true
      });
    }
  }
  
  return baseEvents.concat(newEvents);
};

// Whitelist of "person nouns" that can be ephemeral speakers (vs common-noun-skip list)
window.PERSON_NOUNS = [
  // 人物
  '男','女','少年','少女','老人','老婆','老女','婆さん','爺さん','青年','若者','子供','赤子',
  // 職業/身分
  '兵士','衛兵','騎士','戦士','傭兵','盗賊','商人','行商人','農夫','農民','市民','住民','村人',
  '司祭','神官','僧','尼','巫女','占い師','魔導士','魔術師','魔女','学者','記録官','使者',
  '貴族','王','姫','王妃','執事','侍女','使用人','奴隷','囚人','逃亡者','旅人','流れ者',
  // 怪物・異形
  '狼','獣','犬','猫','蛇','鳥','鴉','烏','馬','龍','竜','妖精','幽霊','亡霊','怪物','魔物',
  'モンスター','悪魔','悪霊','吸血鬼','人狼','妖','化物','化け物','異形','不死者','屍鬼',
  // 抽象
  '人物','者','声'
];

window._extractEphemeralNpcs = function(narrativeText) {
  const text = Array.isArray(narrativeText) ? narrativeText.join('\n') : String(narrativeText || '');
  const knownNames = new Set();
  if (S.cast.hero.name) {
    knownNames.add(S.cast.hero.name);
    S.cast.hero.name.split(/[\s・]/).forEach(p => { if (p) knownNames.add(p); });
  }
  (S.cast.npcs || []).forEach(n => {
    if (n.name) {
      knownNames.add(n.name);
      n.name.split(/[\s・]/).forEach(p => { if (p) knownNames.add(p); });
    }
  });
  const personNounSet = new Set(window.PERSON_NOUNS);
  const result = {};
  const SPEECH_VERBS = '言|呟|叫|呻|喘|漏ら|呼び|尋ね|応|返|答|問|告|微笑|頷|首を|語|諭|怒鳴|喚|嘆|嘲|呼|聞|唸';
  
  // Find dialogues with post-attribution: 「...」と[noun]は[verb]
  const rxAttrib = /」と([^\s「」、。！？\n]{1,8})[はがも]?[^。、\n]{0,5}(?:言|呟|叫|呻|喘|漏ら|呼び|尋ね|応|返|答|問|告|微笑|頷|首を|語|諭|怒鳴|喚|嘆|嘲|呼|聞|唸)/g;
  let m;
  while ((m = rxAttrib.exec(text)) !== null) {
    const candidate = m[1];
    if (knownNames.has(candidate)) continue;
    // Only accept if it's a person noun OR ends with a person noun
    let acceptedName = null;
    if (personNounSet.has(candidate)) {
      acceptedName = candidate;
    } else {
      // Try suffix match — e.g. "黒衣の男" → "男"
      for (const pn of window.PERSON_NOUNS) {
        if (candidate.endsWith(pn) && candidate.length > pn.length) {
          acceptedName = pn; // use the short form as display name
          break;
        }
      }
    }
    if (!acceptedName) continue;
    if (result[acceptedName]) continue; // already extracted
    
    // Extract descriptor from before the dialogue (within 60 chars)
    const dialogueStart = m.index;
    const before = text.slice(Math.max(0, dialogueStart - 100), dialogueStart);
    // Pattern: adjective + noun (黒衣の男, 巨大な狼, 青白い少女, etc.)
    const escName = acceptedName.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const descRx = new RegExp('([^\\s、。「」]{1,20}[のなき]?)?' + escName, 'g');
    let descMatch = null;
    let dm;
    while ((dm = descRx.exec(before)) !== null) {
      descMatch = dm[1] || ''; // keep last (closest to dialogue)
    }
    let desc = (descMatch || '') + acceptedName;
    if (S.scene.tone) desc += '、' + S.scene.tone.split(/[、,。]/)[0].slice(0, 25) + 'な雰囲気';
    
    result[acceptedName] = {
      name: acceptedName,
      desc: desc.slice(0, 100),
      ephemeral: true,
      avatarSeed: 0
    };
  }
  return result;
};

// Re-extract dialogues including ephemerals
const _origExtractEphV2 = window._extractDialogue;
window._extractDialogue = function(narrativeText) {
  let baseEvents = _origExtractEphV2(narrativeText);
  if (!narrativeText) return baseEvents;
  const text = Array.isArray(narrativeText) ? narrativeText.join('\n') : String(narrativeText);
  const ephemerals = window._extractEphemeralNpcs(text);
  if (Object.keys(ephemerals).length === 0) return baseEvents;
  
  const SPEECH_VERBS = '言|呟|叫|呻|喘|漏ら|呼び|尋ね|応|返|答|問|告|微笑|頷|首を|語|諭|怒鳴|喚|嘆|嘲|呼|聞|唸';
  
  // For each base event, check if its speaker should actually be an ephemeral
  // (because there's a と[noun][verb] pattern AFTER the quote)
  const enriched = baseEvents.map(ev => {
    if (!ev.text) return ev;
    const quoted = '「' + ev.text + '」';
    const idx = text.indexOf(quoted);
    if (idx < 0) return ev;
    const after = text.slice(idx + quoted.length, idx + quoted.length + 60);
    
    for (const ephName of Object.keys(ephemerals)) {
      const escName = ephName.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const rx = new RegExp('と' + escName + '[はがも]?[^。、\\n]{0,8}(?:' + SPEECH_VERBS + ')');
      if (rx.test(after)) {
        return { ...ev, speaker: ephName, isHero: false, ephemeral: true };
      }
    }
    return ev;
  });
  
  return enriched;
};

// Update render with ephemeral handling

  });
  
  return div;
};

const _origExtractMultiQuote = window._extractDialogue;
window._extractDialogue = function(narrativeText) {
  if (!narrativeText) return _origExtractMultiQuote(narrativeText);
  let text = Array.isArray(narrativeText) ? narrativeText.join('\n') : String(narrativeText);
  // Normalize 〝...〟 → 「...」
  text = text.replace(/〝([^〝〟\n]+?)〟/g, '「$1」');
  // ASCII " ... " around Japanese → 「 ... 」
  text = text.replace(/"([^"\n]{1,80}?)"/g, function(m, inner) {
    if (/[぀-ゟ゠-ヿ一-龥]/.test(inner) && !/^\s*\w+\s*:\s*/.test(inner)) {
      return '「' + inner + '」';
    }
    return m;
  });
  // Full-width " ... "
  text = text.replace(/"([^"\n]{1,80}?)"/g, function(m, inner) {
    if (/[぀-ゟ゠-ヿ一-龥]/.test(inner)) return '「' + inner + '」';
    return m;
  });
  return _origExtractMultiQuote(text);
};

  setInterval(function(){
    cleanupBadV3Cards();
    syncDialogueLogV4();

  /* Watch narrative for changes */
  function setupObserverV4(){

      clearTimeout(window._v4SyncT);
      window._v4SyncT = setTimeout(syncDialogueLogV4, 700);
    });
    obs.observe(np, {childList:true, subtree:true, characterData:true});
    np._v4Observed = true;
    console.log("[Patch v4] observer attached");

  }
  setTimeout(function(){if(!setupObserverV4())setTimeout(setupObserverV4,2000);}, 1500);
