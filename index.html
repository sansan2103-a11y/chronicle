<script>
/* ========================================================================
 * v42: Sync gender dropdown <-> description '性別: X' prefix.
 *  - On settings open: if desc has '性別: 男' or '性別: 女' that contradicts
 *    the dropdown value, take desc as truth and update dropdown.
 *  - When user changes dropdown: rewrite desc's leading '性別: X' phrase.
 *  - When user types in desc and changes '性別: X': update dropdown.
 *  - Same logic for hero (cfgHDesc) and each NPC card.
 * ======================================================================== */
(function v42GenderSync(){
  var TAG = '[v42]';

  function detectGenderInDesc(text){
    var t = String(text||'');
    var m = t.match(/性別[:：]?\s*([男女])(性)?/);
    if (m) return m[1] === '男' ? '男性' : '女性';
    return null; /* unknown */
  }

  function rewriteDescGender(desc, newGender){
    var d = String(desc||'');
    if (/性別[:：]?\s*[男女](性)?/.test(d)) {
      d = d.replace(/性別[:：]?\s*[男女](性)?[。、]?\s*/, '性別: ' + newGender + '。 ');
    } else {
      d = '性別: ' + newGender + '。 ' + d;
    }
    return d;
  }

  function getCurrentDropdown(scope){
    var sel = scope.querySelector('.v38-gender-row[data-v38="1"] select');
    return sel ? sel.value : null;
  }
  function setDropdown(scope, value){
    var sel = scope.querySelector('.v38-gender-row[data-v38="1"] select');
    if (!sel) return;
    if (sel.value !== value) {
      sel.value = value;
      sel.dispatchEvent(new Event('change', {bubbles:true}));
    }
  }
  function setTextareaValue(ta, newVal){
    if (!ta) return;
    if (ta.value === newVal) return;
    var setter = Object.getOwnPropertyDescriptor(window.HTMLTextAreaElement.prototype, 'value').set;
    setter.call(ta, newVal);
    ta.dispatchEvent(new Event('input', {bubbles:true}));
  }

  function syncOne(descTa, scope, isHero, idx){
    if (!descTa || !scope) return;
    var descGen = detectGenderInDesc(descTa.value);
    var dropdownGen = getCurrentDropdown(scope);
    if (!dropdownGen) return;
    /* If desc has explicit gender and it differs from dropdown -> trust desc */
    if (descGen && descGen !== dropdownGen) {
      setDropdown(scope, descGen);
      /* Update state */
      try {
        var st = JSON.parse(localStorage.getItem('chr6')||'{}');
        if (isHero) {
          if (st.cast && st.cast.hero) { st.cast.hero.gender = descGen; }
        } else {
          if (st.cast && st.cast.npcs && st.cast.npcs[idx]) { st.cast.npcs[idx].gender = descGen; }
        }
        localStorage.setItem('chr6', JSON.stringify(st));
      } catch(e){}
    }
  }

  function wireDropdownChange(descTa, scope){
    var sel = scope.querySelector('.v38-gender-row[data-v38="1"] select');
    if (!sel || sel.dataset.v42Wired === '1') return;
    sel.dataset.v42Wired = '1';
    sel.addEventListener('change', function(){
      if (!descTa) return;
      var newDesc = rewriteDescGender(descTa.value, sel.value);
      if (newDesc !== descTa.value) setTextareaValue(descTa, newDesc);
    });
  }

  function applyAll(){
    /* Hero */
    var hDesc = document.getElementById('cfgHDesc');
    var hName = document.getElementById('cfgHName');
    if (hDesc && hName) {
      var heroScope = hName.closest('.fld') || hName.parentElement;
      /* Need a scope that contains v38 hero row. v41 placed it in nameFld. */
      var heroFld = hName.closest('.fld');
      if (heroFld && heroFld.querySelector('.v38-gender-row[data-v38="1"][data-hero="1"]')) {
        syncOne(hDesc, heroFld, true, -1);
        wireDropdownChange(hDesc, heroFld);
      }
    }
    /* NPCs */
    document.querySelectorAll('.npc-card').forEach(function(card, i){
      var descTa = card.querySelector('textarea[data-f="desc"]');
      if (!descTa) return;
      syncOne(descTa, card, false, i);
      wireDropdownChange(descTa, card);
    });
  }
  setInterval(applyAll, 800);
  setTimeout(applyAll, 300);
  setTimeout(applyAll, 1000);
  console.log(TAG, 'gender desc-dropdown sync active');
})();
</script>

<script>
/* ========================================================================
 * v43: Post-render dedupe of duplicated narrative paragraphs + dialogue cards.
 *  Llama-3.3 70B has been emitting identical-paragraph repeats; v10/v20 only
 *  warn. v43 cleans the visible UI so the user doesn't have to look at it.
 *  - Narrative panel: remove identical consecutive paragraph elements.
 *  - Dialogue log: remove identical consecutive cards (same speaker + text).
 *  - Also: same speaker + same text duplicates within recent N cards (3-window).
 * ======================================================================== */
(function v43Dedupe(){
  var TAG = '[v43]';

  function dedupeNarrative(){
    /* Narrative paragraphs are inside the展開の描写 column. Best heuristic:
     * find paragraph-like nodes inside the right column, dedupe by trimmed text. */
    var roots = document.querySelectorAll('.narrative, .narr, .narrative-frame, [class*="narrative"]');
    var nodes = [];
    if (roots.length) {
      roots.forEach(function(r){
        Array.from(r.querySelectorAll('p, div')).forEach(function(n){
          /* leaf-ish: no large children */
          if (n.children.length <= 1) nodes.push(n);
        });
      });
    } else {
      /* Fallback: find narrative text by scanning common patterns */
      Array.from(document.querySelectorAll('p, .narr-p, .narrative p')).forEach(function(n){
        nodes.push(n);
      });
    }
    var prevText = '';
    nodes.forEach(function(n){
      var t = (n.textContent||'').trim();
      if (!t) return;
      if (t === prevText && t.length > 8) {
        /* Mark hidden via style */
        if (n.style.display !== 'none') {
          n.style.display = 'none';
          n.dataset.v43Dup = '1';
        }
      } else {
        prevText = t;
      }
    });
  }

  function dedupeDialogueCards(){
    /* Dialogue cards are typically in 会話ログ panel. Find by .dialogue-list or
     * .dialogue-card class. */
    var lists = document.querySelectorAll('.dialogue-list, .dialogue-log, .dlg-list, [class*="dialogue"]');
    var cards = [];
    lists.forEach(function(list){
      Array.from(list.children).forEach(function(c){
        if (c.classList && (c.className.indexOf('card') >= 0 || c.className.indexOf('dialogue') >= 0)) {
          cards.push(c);
        }
      });
    });
    /* Fallback: any .dialogue-card */
    if (cards.length === 0) {
      cards = Array.from(document.querySelectorAll('.dialogue-card, [class*="dialogue-card"]'));
    }
    /* Dedupe: collect (speaker, text) tuples; mark second+ occurrence within last 5 hidden */
    var recentSeen = [];
    cards.forEach(function(card){
      /* Extract speaker + text. Speaker often in .name/.speaker/h-class, text in .text/.line */
      var sp = card.querySelector('.dialogue-name, .speaker, .name, [class*="name"]');
      var tx = card.querySelector('.dialogue-text, .text, .line, [class*="text"]');
      var key = (sp ? sp.textContent.trim() : '') + '|' + (tx ? tx.textContent.trim() : card.textContent.trim().slice(0,80));
      if (!key || key.length < 5) return;
      var found = recentSeen.indexOf(key) >= 0;
      if (found) {
        if (card.style.display !== 'none') {
          card.style.display = 'none';
          card.dataset.v43Dup = '1';
        }
      } else {
        recentSeen.push(key);
        if (recentSeen.length > 5) recentSeen.shift();
      }
    });
  }

  function applyAll(){
    try { dedupeNarrative(); } catch(e){ console.warn(TAG,'narr',e); }
    try { dedupeDialogueCards(); } catch(e){ console.warn(TAG,'dlg',e); }
  }
  /* Hook MutationObserver for instant cleanup when new content arrives */
  var observer = new MutationObserver(function(){
    if (window.__v43Pending) return;
    window.__v43Pending = setTimeout(function(){
      window.__v43Pending = null;
      applyAll();
    }, 300);
  });
  function startObserver(){
    var targets = document.querySelectorAll('.dialogue-list, .narrative, .narrative-frame, [class*="narrative"], main');
    targets.forEach(function(t){
      observer.observe(t, {childList: true, subtree: true, characterData: true});
    });
    if (targets.length === 0) setTimeout(startObserver, 1000);
  }
  setTimeout(startObserver, 500);
  setInterval(applyAll, 2000);
  setTimeout(applyAll, 600);
  console.log(TAG, 'narrative + dialogue dedupe active');
})();
</script>

<script>
/* ========================================================================
 * v44: Override v31's overly-aggressive model filter. Restore Hermes 3 405B
 *      and ensure full curated set is present in cfgOrModel dropdown.
 * ======================================================================== */
(function v44ModelRestore(){
  var TAG = '[v44]';

  /* Final curated set with labels, ordered by recommendation for R18 horror */
  var DESIRED = [
    {value: 'nousresearch/hermes-3-llama-3.1-405b', label: 'Hermes 3 405B（最高品質：表現の幅）'},
    {value: 'anthropic/claude-sonnet-4-5',          label: 'Claude Sonnet 4.5（高品質：文章繊細）'},
    {value: 'sao10k/l3.3-euryale-70b',              label: 'Euryale 70B（成人描写）'},
    {value: 'anthropic/claude-haiku-4-5',           label: 'Claude Haiku 4.5（安定・速い）'},
    {value: 'meta-llama/llama-3.3-70b-instruct',    label: 'LLaMA 3.3 70B（汎用：反復しやすい）'}
  ];

  function applyV44(){
    var sel = document.getElementById('cfgOrModel');
    if (!sel) return;
    /* Build a set of current values */
    var currentValues = Array.from(sel.options).map(function(o){return o.value;});
    var desiredValues = DESIRED.map(function(d){return d.value;});

    /* If we already match exactly + in correct order, skip */
    var matches = currentValues.length === desiredValues.length &&
                  currentValues.every(function(v,i){ return v === desiredValues[i]; });
    if (matches && sel.dataset.v44 === '1') return;

    /* Save current selection */
    var prevSelected = sel.value;

    /* Wipe + rebuild */
    sel.innerHTML = '';
    DESIRED.forEach(function(d){
      var o = document.createElement('option');
      o.value = d.value;
      o.textContent = d.label;
      sel.appendChild(o);
    });

    /* Restore selection if possible, else default to Hermes */
    if (desiredValues.indexOf(prevSelected) >= 0) {
      sel.value = prevSelected;
    } else {
      sel.value = 'nousresearch/hermes-3-llama-3.1-405b';
    }
    sel.dataset.v44 = '1';
    /* Clear v31's flag so it re-runs filter only if dropdown is re-populated by user code */
    delete sel.dataset.v31;
  }
  setInterval(applyV44, 800);
  setTimeout(applyV44, 200);
  setTimeout(applyV44, 1000);
  console.log(TAG, 'model dropdown curated, Hermes restored');
})();
</script>

<script>
/* ========================================================================
 * v45: Hermes 3 405B improvement bundle.
 *  (1) Wrap fetch to inject explicit gender-voice rules + Japanese-quality
 *      nudge into the system prompt for OpenRouter requests.
 *  (2) Force model = Hermes 3 405B if state says Hermes (state-protector).
 *  (3) Sanitize narrative segments after parsing to strip leading/trailing
 *      asterisks (markdown leak) before they render.
 *  (4) Re-extract dialogue from narrative quoted strings 「...」 / 『...』
 *      when the model embeds dialogue in narrative.
 * ======================================================================== */
(function v45HermesImprove(){
  var TAG = '[v45]';

  /* ---- (1) + (2): fetch wrapper ---- */
  var origFetch = window.fetch;
  if (!origFetch.__v45Wrapped) {
    window.fetch = function(input, init){
      try {
        var url = typeof input === 'string' ? input : (input && input.url) || '';
        if (url.indexOf('openrouter.ai') >= 0 && init && typeof init.body === 'string') {
          var body = JSON.parse(init.body);
          if (body && body.messages) {
            /* Force Hermes if state has it */
            try {
              var st = JSON.parse(localStorage.getItem('chr6')||'{}');
              if (st.cfg && st.cfg.orModel === 'nousresearch/hermes-3-llama-3.1-405b') {
                body.model = 'nousresearch/hermes-3-llama-3.1-405b';
              }
            } catch(e){}

            /* Inject gender-voice + Japanese-quality rules into system message */
            var hermesAddon =
              '\n\n【★日本語表現の必須ルール（厳守）】\n' +
              '1. 男性キャラは女言葉（〜わ、〜のよ、〜かしら、〜なのね）絶対禁止。「〜だ」「〜だな」「〜だろう」「〜ぜ」「〜さ」「〜か？」を使う。\n' +
              '2. 女性キャラは「〜わ」「〜のよ」「〜かしら」自然に使う。男言葉「〜だぜ」は禁止。\n' +
              '3. 性別: 男性 → 必ず男性的語尾。性別: 女性 → 必ず女性的語尾。\n' +
              '4. 日本語の typo（誤字・存在しない単語）禁止。「さっきり」「ぼっそり」のような誤字は使わない。\n' +
              '5. narrative内のセリフは必ず「」で囲む。地の文と混ぜない。\n' +
              '6. 装飾は *—...—* ではなく — ... — を使う。アスタリスク（*）は narrative に書かない。';

            body.messages = body.messages.map(function(m){
              if (m.role === 'system' && typeof m.content === 'string') {
                if (m.content.indexOf('日本語表現の必須ルール') < 0) {
                  m.content = m.content + hermesAddon;
                }
              }
              return m;
            });
            init = Object.assign({}, init, {body: JSON.stringify(body)});
          }
        }
      } catch(e){ console.warn(TAG, 'fetch hook', e); }
      return origFetch.call(this, input, init);
    };
    window.fetch.__v45Wrapped = true;
  }

  /* ---- State protector: keep Hermes selected if user wanted it ---- */
  var lastUserChoice = null;
  function protectState(){
    var st;
    try { st = JSON.parse(localStorage.getItem('chr6')||'{}'); } catch(e){ return; }
    if (!st.cfg) return;
    /* If state was Hermes recently and got reverted, restore */
    if (lastUserChoice === 'nousresearch/hermes-3-llama-3.1-405b' &&
        st.cfg.orModel !== 'nousresearch/hermes-3-llama-3.1-405b') {
      st.cfg.orModel = 'nousresearch/hermes-3-llama-3.1-405b';
      try { localStorage.setItem('chr6', JSON.stringify(st)); } catch(e){}
    } else if (st.cfg.orModel === 'nousresearch/hermes-3-llama-3.1-405b') {
      lastUserChoice = 'nousresearch/hermes-3-llama-3.1-405b';
    } else if (lastUserChoice === null) {
      /* First read */
      lastUserChoice = st.cfg.orModel;
    }
  }
  setInterval(protectState, 1000);
  setTimeout(protectState, 200);

  /* ---- (3): sanitize narrative segments after they're rendered ---- */
  function sanitizeNarrativeSegments(){
    /* Find all rendered narrative paragraphs and strip * markers */
    var nodes = document.querySelectorAll('.narrative p, .narr-p, [class*="narrative"] p, .narr-segment');
    nodes.forEach(function(n){
      if (n.dataset.v45Sanitized === '1') return;
      var t = n.textContent || '';
      /* Strip leading/trailing single-asterisks AND wrappers like *—text—* */
      var cleaned = t
        .replace(/^\s*\*+\s*/, '')          /* leading * */
        .replace(/\s*\*+\s*$/, '')          /* trailing * */
        .replace(/\*+(——|—|--)/g, '$1')      /* *— or *-- */
        .replace(/(——|—|--)\*+/g, '$1');     /* —* or --* */
      if (cleaned !== t) {
        n.textContent = cleaned;
        n.dataset.v45Sanitized = '1';
      }
    });
  }

  /* Also sanitize at state level - rewrite saved narrative arrays */
  function sanitizeStateNarrative(){
    try {
      var st = JSON.parse(localStorage.getItem('chr6')||'{}');
      var changed = false;
      (st.turns || []).forEach(function(t){
        if (t.plan && t.plan.narrative && Array.isArray(t.plan.narrative)) {
          t.plan.narrative = t.plan.narrative.map(function(seg){
            if (typeof seg !== 'string') return seg;
            var orig = seg;
            seg = seg
              .replace(/^\s*\*+\s*/, '')
              .replace(/\s*\*+\s*$/, '')
              .replace(/\*+(——|—|--)/g, '$1')
              .replace(/(——|—|--)\*+/g, '$1');
            if (seg !== orig) changed = true;
            return seg;
          });
        }
      });
      if (changed) localStorage.setItem('chr6', JSON.stringify(st));
    } catch(e){}
  }

  /* ---- (4): extract dialogue from narrative quoted strings ---- */
  function extractDialogueFromNarrative(){
    /* Walk turns: for each turn where dialogue card is empty but narrative has 「...」, extract */
    /* Note: we don't mutate state here since the original render is from state.
       Instead, we patch the dialogue list in DOM if cards look empty. */
    var dlgCards = document.querySelectorAll('.dialogue-card, [class*="dialogue-card"]');
    /* Find empty cards (no name OR no text) */
    var emptyCards = [];
    dlgCards.forEach(function(card){
      var nameEl = card.querySelector('.dialogue-name, .name, .speaker, [class*="name"]');
      var textEl = card.querySelector('.dialogue-text, .text, .line, [class*="text"]');
      var nameTxt = nameEl ? (nameEl.textContent||'').trim() : '';
      var textTxt = textEl ? (textEl.textContent||'').trim() : '';
      if (!nameTxt || !textTxt) emptyCards.push({card: card, name: nameEl, text: textEl});
    });
    if (emptyCards.length === 0) return;
    /* Pull recent narratives & extract 「...」 */
    var st;
    try { st = JSON.parse(localStorage.getItem('chr6')||'{}'); } catch(e){ return; }
    var npcs = (st.cast && st.cast.npcs) || [];
    var allDialogues = [];
    (st.turns||[]).slice(-3).forEach(function(t){
      if (t.plan && t.plan.narrative) {
        var narr = Array.isArray(t.plan.narrative) ? t.plan.narrative.join(' ') : String(t.plan.narrative);
        var matches = narr.match(/「([^」]+)」/g) || [];
        matches.forEach(function(m){
          var line = m.replace(/^「|」$/g, '');
          /* Guess speaker by mention proximity */
          var speaker = '';
          npcs.forEach(function(n){
            if (n.name && narr.indexOf(n.name) >= 0 && narr.indexOf(n.name) < narr.indexOf(m)) {
              speaker = n.name;
            }
          });
          if (!speaker && st.cast && st.cast.hero && narr.indexOf(st.cast.hero.name) < narr.indexOf(m)) {
            speaker = st.cast.hero.name;
          }
          if (speaker && line) allDialogues.push({speaker: speaker, text: line});
        });
      }
    });
    /* Fill empty cards */
    emptyCards.forEach(function(ec, i){
      if (i >= allDialogues.length) return;
      var d = allDialogues[i];
      if (ec.name && !ec.name.textContent.trim()) ec.name.textContent = d.speaker;
      if (ec.text && !ec.text.textContent.trim()) ec.text.textContent = d.text;
    });
  }

  function applyAll(){
    try { sanitizeNarrativeSegments(); } catch(e){ console.warn(TAG,'sanitize',e); }
    try { sanitizeStateNarrative(); } catch(e){ console.warn(TAG,'state',e); }
    try { extractDialogueFromNarrative(); } catch(e){ console.warn(TAG,'extract',e); }
  }
  setInterval(applyAll, 1500);
  setTimeout(applyAll, 600);

  console.log(TAG, 'Hermes improvement bundle active (gender voice + asterisk sanitize + dialogue extract + state protect)');
})();

  function getSection(text, name){

          statusText: resp.statusText,

        });

      }
      return resp;
    };
    window.fetch.__v46Wrapped = true;
  }

})();

        npcName: '', instantEmotion: '', innerThought: '',
        triggeredFear: null, underlyingNeed: null, defenseMechanism: 'none',
        stressDelta: 0, trustDelta: 0
      },
      narrative: [],
      npcReactionPhase: {
        npcName: '', emotion: '', bodyLanguage: '',
        dialogue: null, subtext: null, interpretation: '', resistance: ''
      },
      environmentResponse: '',
      branchCandidates: []
    };

    var narrSec = getSection(text, 'NARRATIVE');
    if (narrSec) {
      var cleaned = stripMeta(narrSec);
      plan.narrative = cleaned.split(/\n\n+/)
        .map(function(s){ return s.trim().replace(/^\*+\s*/, '').replace(/\s*\*+$/, ''); })
        .filter(function(s){ return s.length > 0; });
      if (plan.narrative.length === 0 && cleaned) {
        plan.narrative = cleaned.split(/\n/).map(function(s){return s.trim();}).filter(function(s){return s.length>0;});
      }
      if (plan.narrative.length === 0 && cleaned) plan.narrative = [cleaned];
    }

    var npcRaw = getSection(text, 'NPC');
    if (npcRaw) {
      /* Use [^\n]* to keep capture on same line */
      function pick(label){
        var re = new RegExp(label + '[:：][\\t ]*([^\\n]*)');
        var m = npcRaw.match(re);
        return m ? m[1].trim() : '';
      }
      var name = pick('名前');
      /* If empty or starts with field-marker like '感情:', it's a parser miss */
      if (name && !/^(感情|内心|本能的|ストレス|信頼)/.test(name)) {
        plan.npcInnerLife.npcName = name;
        plan.npcReactionPhase.npcName = name;
      }
      var emo = pick('感情');
      if (emo) {
        plan.npcInnerLife.instantEmotion = emo;
        plan.npcReactionPhase.emotion = emo;
      }
      var inner = pick('内心');
      if (inner) plan.npcInnerLife.innerThought = inner;
      var fear = pick('本能的恐怖');
      if (fear && fear !== '-') plan.npcInnerLife.triggeredFear = fear;
      var need = pick('本能的欲求');
      if (need && need !== '-') plan.npcInnerLife.underlyingNeed = need;
      var sd = pick('ストレス変動');
      if (sd) {
        var n = parseInt(sd, 10);
        if (!isNaN(n)) plan.npcInnerLife.stressDelta = n;
      }
      var td = pick('信頼変動');
      if (td) {
        var n2 = parseInt(td, 10);
        if (!isNaN(n2)) plan.npcInnerLife.trustDelta = n2;
      }
    }

    /* If npcName empty but state has NPC, use first NPC name as fallback */
    if (!plan.npcInnerLife.npcName) {
      try {
        var st = JSON.parse(localStorage.getItem('chr6')||'{}');
        var n0 = st.cast && st.cast.npcs && st.cast.npcs[0];
        if (n0 && n0.name) {
          plan.npcInnerLife.npcName = n0.name;
          plan.npcReactionPhase.npcName = n0.name;
        }
      } catch(e){}
    }

    var dlg = getSection(text, 'DIALOGUE');
    if (dlg && dlg !== '-') {
      var dlgClean = stripMeta(dlg).replace(/^「+/, '').replace(/」+$/, '').trim();
      if (dlgClean) plan.npcReactionPhase.dialogue = dlgClean;
    }

    var env = getSection(text, 'ENVIRONMENT');
    if (env && env !== '-') plan.environmentResponse = stripMeta(env);

    var br = getSection(text, 'BRANCH');
    if (br) {
      plan.branchCandidates = br.split(/\n/)
        .map(function(s){ return s.trim().replace(/^[・\-\*\d\.\)]+\s*/, ''); })
        .filter(function(s){ return s.length > 0 && s !== '-'; })
        .slice(0, 3);
    }
    return plan;
  }

  function isValid(plan){
    return plan && Array.isArray(plan.narrative) && plan.narrative.length > 0;
  }

  /* In-flight guard - prevent parallel duplicate requests */
  var inFlight = false;

  /* Re-wrap fetch */
  var origFetch = window.fetch;
  if (!origFetch.__v47Wrapped) {
    window.fetch = async function(input, init){
      var url = typeof input === 'string' ? input : (input && input.url) || '';
      var isEuReq = false;

      if (url.indexOf('openrouter.ai') >= 0 && init && typeof init.body === 'string') {
        try {
          var st = JSON.parse(localStorage.getItem('chr6')||'{}');
          if (st.cfg && isEuryale(st.cfg.orModel)) {
            var body = JSON.parse(init.body);
            if (body && body.messages) {
              isEuReq = true;
              if (inFlight) {
                console.warn(TAG, 'concurrent request blocked, waiting');
                while (inFlight) await new Promise(function(r){ setTimeout(r, 500); });
              }
              inFlight = true;
              var direction = pickDirection();
              var addon = buildAddonV2(direction);
              body.messages = body.messages.map(function(m){
                if (m.role === 'system' && typeof m.content === 'string') {
                  /* Strip prior v46 addon and replace */
                  m.content = m.content.replace(/【★★★ 出力形式[\s\S]*$/, '') + addon;
                }
                return m;
              });
              if (body.response_format) delete body.response_format;
              init = Object.assign({}, init, {body: JSON.stringify(body)});
              console.log(TAG, 'v47 prompt injected, dir:', direction);
            }
          }
        } catch(e){ console.warn(TAG, 'pre-fetch', e); }
      }

      try {
        var resp = await origFetch.call(this, input, init);
        if (!isEuReq || !resp.ok) { if (isEuReq) inFlight = false; return resp; }
        var text = await resp.text();
        var data = JSON.parse(text);
        var content = data && data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content;
        if (content && content.indexOf('=== NARRATIVE ===') >= 0) {
          var plan = parseV2(content);
          if (isValid(plan)) {
            data.choices[0].message.content = JSON.stringify(plan);
            console.log(TAG, 'v47 parsed', plan.narrative.length, 'segs, NPC=', plan.npcInnerLife.npcName, 'dlg=', !!plan.npcReactionPhase.dialogue);
            inFlight = false;
            return new Response(JSON.stringify(data), {
              status: resp.status, statusText: resp.statusText, headers: resp.headers
            });
          } else {
            console.warn(TAG, 'parse invalid plan');
          }
        } else {
          console.warn(TAG, 'no === NARRATIVE === marker');
        }
        inFlight = false;
        return new Response(text, { status: resp.status, statusText: resp.statusText, headers: resp.headers });
      } catch(e){
        console.warn(TAG, 'response error', e);
        inFlight = false;
      }
      return origFetch.call(this, input, init);
    };
    window.fetch.__v47Wrapped = true;
  }

  console.log(TAG, 'v47 Euryale parser fixes + meta-leak filter active');
})();
</script>

<script>
/* ========================================================================
 * v48: Unregistered NPC / monster / mob support in dialogue log.
 *  Scans narrative for <speaker>「<text>」<verb> patterns where <speaker>
 *  is NOT a registered character, classifies the entity type (animal /
 *  monster / job / human), generates a type-appropriate avatar URL, and
 *  injects a dialogue card into the chat log.
 * ======================================================================== */
(function v48UnregSpeakers(){
  var TAG = '[v48]';

  /* ---------- Entity dictionaries ---------- */
  var ANIMALS = {
    '狼':'wolf','犬':'dog','猫':'cat','馬':'horse','牛':'cow','鳥':'bird','大鴉':'large raven',
    '龍':'eastern dragon','竜':'dragon','ドラゴン':'dragon','蛇':'snake','大蛇':'giant snake',
    '虎':'tiger','熊':'bear','狐':'fox','鷲':'eagle','烏':'crow','鴉':'crow','梟':'owl','鼠':'rat',
    '蝙蝠':'bat','獅子':'lion','豹':'panther','鯨':'whale','蜘蛛':'spider','蜘':'spider',
    '蛙':'frog','カラス':'crow','ワシ':'eagle','ライオン':'lion','クマ':'bear'
  };
  var MONSTERS = {
    'ゴブリン':'goblin','オーク':'orc','スライム':'slime monster','ゾンビ':'zombie',
    '亡霊':'wraith','悪魔':'demon','魔物':'monster','幽霊':'ghost','霊':'spirit',
    'スケルトン':'skeleton','コボルト':'kobold','トロル':'troll','人狼':'werewolf',
    '吸血鬼':'vampire','魔人':'evil mage','屍鬼':'ghoul','邪霊':'evil spirit',
    'ミノタウロス':'minotaur','妖精':'fairy','妖魔':'apparition','幻影':'phantom',
    'リッチ':'lich','悪霊':'evil spirit','怪物':'monster','化け物':'creature'
  };
  var JOBS = {
    '衛兵':'medieval guard','兵士':'soldier','商人':'merchant','神官':'priest',
    '僧侶':'monk','騎士':'knight','町人':'townsperson','村人':'villager',
    '客':'patron','店主':'shopkeeper','給仕':'serving girl','子供':'child',
    '老人':'elder','女将':'innkeeper woman','修道士':'monk','修道女':'nun',
    '旅人':'traveler','傭兵':'mercenary','盗賊':'thief','貴族':'noble',
    '王':'king','女王':'queen','王子':'prince','王女':'princess','姫':'princess',
    '召使':'servant','奴隷':'slave','医者':'physician','学者':'scholar','船乗り':'sailor'
  };
  var GENERIC = ['男','女','声','子供','老人','誰か','何か','人物','人影','影','少女','少年'];

  /* Verbs that indicate speech/utterance (existing + animal/monster) */
  var SPEAK_VERBS = [
    /* human */ '言う','叫ぶ','呟く','告げる','問う','囁く','怒鳴る','喚く','喋る','話す',
                '答える','返す','告げる','零す','吐き捨てる','呼ぶ','呼びかける','口にする',
    /* animal/monster */ '吠える','咆哮する','咆哮を上げる','唸る','鳴く','鳴き声を上げる',
                '唸り声を上げる','遠吠え','嘶く','囀る','声を上げる','うめく','うなる',
                '吼える','哭く','哮る','息を漏らす','息を吐く','金切声を上げる',
    /* generic */ '声がした','声が響いた','声がこぼれた','声が漏れた'
  ];

  /* ---------- Classification ---------- */
  function classify(name){
    var n = String(name||'');
    for (var k in ANIMALS) if (n.indexOf(k) >= 0) return {type:'animal', enKey:k, en:ANIMALS[k]};
    for (var k in MONSTERS) if (n.indexOf(k) >= 0) return {type:'monster', enKey:k, en:MONSTERS[k]};
    for (var k in JOBS) if (n.indexOf(k) >= 0) return {type:'job', enKey:k, en:JOBS[k]};
    for (var i = 0; i < GENERIC.length; i++) if (n.indexOf(GENERIC[i]) >= 0) return {type:'generic', enKey:GENERIC[i], en:'figure'};
    return null;
  }

  /* ---------- Avatar URL generation ---------- */
  function hashSeed(s){
    var h = 0;
    for (var i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) & 0xffffff;
    return h;
  }
  function avatarUrl(name, cls){
    var seed = hashSeed(name);
    var prompt = '';
    if (cls.type === 'animal') {
      prompt = cls.en + ' headshot portrait, dark fantasy, anime style, detailed eyes, atmospheric, painterly';
    } else if (cls.type === 'monster') {
      prompt = cls.en + ' creature portrait, dark fantasy, anime style, menacing, detailed';
    } else if (cls.type === 'job') {
      prompt = cls.en + ' portrait headshot, medieval fantasy, anime style, character art, detailed face';
    } else {
      prompt = 'mysterious silhouette portrait, dark anime style, atmospheric, ' + cls.enKey;
    }
    return 'https://image.pollinations.ai/prompt/' + encodeURIComponent(prompt) + '?width=240&height=240&seed=' + seed + '&nologo=true';
  }

  /* ---------- Extract unregistered dialogue from narrative ---------- */
  function getRegisteredNames(){
    try {
      var c = JSON.parse(localStorage.getItem('chr6')||'{}');
      var names = [];
      if (c.cast && c.cast.hero && c.cast.hero.name) names.push(c.cast.hero.name);
      (c.cast && c.cast.npcs || []).forEach(function(n){ if (n.name) names.push(n.name); });
      return names;
    } catch(e){ return []; }
  }

  function extractUnregisteredDialogues(narrText){
    var registered = getRegisteredNames();
    var verbsAlt = SPEAK_VERBS.map(function(v){return v.replace(/[\\^$.*+?()|\[\]{}]/g, '\\$&');}).join('|');
    /* Pattern A: <entity>(が|は|の)?「<text>」<verb> */
    var reA = new RegExp('([\\u4e00-\\u9fa5\\u30a0-\\u30ff\\u3040-\\u309fA-Za-z]{1,8})(?:が|は|の|から|たち|の[一二三]人)?[、。\\s]*[「『]([^」』]{1,80})[」』]\\s*(?:と)?\\s*(' + verbsAlt + ')', 'g');
    /* Pattern B: 「<text>」と<entity><verb> */
    var reB = new RegExp('[「『]([^」』]{1,80})[」』]\\s*と\\s*([\\u4e00-\\u9fa5\\u30a0-\\u30ff\\u3040-\\u309fA-Za-z]{1,8})(?:が|は)?[、。\\s]*(' + verbsAlt + ')', 'g');

    var found = [];
    var seen = {};
    var m;
    while ((m = reA.exec(narrText)) !== null) {
      var name = m[1], text = m[2];
      if (registered.indexOf(name) >= 0) continue;
      var cls = classify(name);
      if (!cls) continue;
      var key = name + '|' + text;
      if (seen[key]) continue;
      seen[key] = true;
      found.push({name: name, text: text, cls: cls, pos: m.index});
    }
    while ((m = reB.exec(narrText)) !== null) {
      var name = m[2], text = m[1];
      if (registered.indexOf(name) >= 0) continue;
      var cls = classify(name);
      if (!cls) continue;
      var key = name + '|' + text;
      if (seen[key]) continue;
      seen[key] = true;
      found.push({name: name, text: text, cls: cls, pos: m.index});
    }
    /* Sort by position in narrative */
    found.sort(function(a,b){return a.pos - b.pos;});
    return found;
  }

  /* ---------- Build a dialogue card ---------- */
  function buildCard(speaker, text, avatarSrc){
    var card = document.createElement('div');
    card.className = 'dialogue-card v48-injected';
    card.dataset.v48 = '1';
    card.style.cssText = 'display:flex;align-items:flex-start;gap:10px;padding:10px 12px;margin:6px 0;background:linear-gradient(135deg,rgba(40,30,55,.6),rgba(60,45,80,.4));border:1px solid rgba(160,138,240,.25);border-radius:10px';
    /* Avatar */
    var av = document.createElement('div');
    av.style.cssText = 'flex:0 0 56px;width:56px;height:56px;border-radius:50%;overflow:hidden;border:2px solid rgba(160,138,240,.4);background:#1a1224';
    var img = document.createElement('img');
    img.src = avatarSrc;
    img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block';
    img.alt = speaker;
    img.onerror = function(){
      this.style.display='none';
      av.innerHTML = '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:20px;color:#a08af0">?</div>';
    };
    av.appendChild(img);
    /* Body */
    var body = document.createElement('div');
    body.style.cssText = 'flex:1;min-width:0';
    var nameEl = document.createElement('div');
    nameEl.className = 'dialogue-name';
    nameEl.textContent = speaker;
    nameEl.style.cssText = 'font-size:12px;color:#c4afff;font-weight:600;margin-bottom:3px';
    var textEl = document.createElement('div');
    textEl.className = 'dialogue-text';
    textEl.textContent = '「' + text + '」';
    textEl.style.cssText = 'font-size:14px;color:#e8d8ff;line-height:1.5;word-wrap:break-word';
    body.appendChild(nameEl);
    body.appendChild(textEl);
    card.appendChild(av);
    card.appendChild(body);
    return card;
  }

  /* ---------- Render: scan narrative + inject missing cards ---------- */
  function applyV48(){
    var dlgList = document.querySelector('.dialogue-list, .dlg-list, [class*="dialogue-list"]');
    if (!dlgList) return;
    /* Get narrative text from the right column */
    var narrPanel = document.querySelector('.narrative, .narrative-frame, [class*="narrative"]');
    if (!narrPanel) return;
    var narrText = narrPanel.textContent || '';
    if (narrText.length < 20) return;

    var found = extractUnregisteredDialogues(narrText);
    if (found.length === 0) return;

    /* Existing v48-injected cards: skip already-rendered */
    var existing = {};
    dlgList.querySelectorAll('[data-v48="1"]').forEach(function(c){
      var nm = c.querySelector('.dialogue-name');
      var tx = c.querySelector('.dialogue-text');
      if (nm && tx) {
        existing[nm.textContent + '|' + (tx.textContent||'').replace(/^「|」$/g, '')] = true;
      }
    });

    found.forEach(function(item){
      var key = item.name + '|' + item.text;
      if (existing[key]) return;
      var url = avatarUrl(item.name, item.cls);
      var card = buildCard(item.name, item.text, url);
      dlgList.appendChild(card);
    });
  }

  setInterval(applyV48, 2500);
  setTimeout(applyV48, 1500);
  console.log(TAG, 'unregistered speaker / monster / mob support active');
})();
</script>

    'ミノタウロス':'minotaur','妖精':'fairy','妖魔':'apparition','幻影':'phantom',
    'リッチ':'lich','悪霊':'evil spirit','怪物':'monster','化け物':'creature',
    '魔獣':'magical beast','獣人':'beastman','異形':'aberrant'
  };
  var JOBS = {
    '衛兵':'medieval guard','兵士':'soldier','商人':'merchant','神官':'priest',
    '僧侶':'monk','騎士':'knight','町人':'townsperson','村人':'villager',
    '客':'patron','店主':'shopkeeper','給仕':'serving girl','子供':'child',
    '老人':'elder','女将':'innkeeper woman','修道士':'monk','修道女':'nun',
    '旅人':'traveler','傭兵':'mercenary','盗賊':'thief','貴族':'noble',
    '王':'king','女王':'queen','王子':'prince','王女':'princess','姫':'princess',
    '召使':'servant','医者':'physician','学者':'scholar','船乗り':'sailor',
    '通りすがり':'random traveler','男':'man','女':'woman','男性':'man','女性':'woman',
    '門番':'gatekeeper','番人':'guardian','番兵':'sentry'
  };
  var GENERIC = ['声','子供','老人','誰か','何か','人物','人影','影','少女','少年','子','者'];

  var SPEAK_VERBS = [
    '言う','言った','言い','叫ぶ','叫んだ','叫び','呟く','呟いた','告げる','告げた',
    '問う','問うた','囁く','囁いた','怒鳴る','怒鳴った','喚く','喚いた','喋る','喋った',
    '話す','話した','答える','答えた','返す','返した','吠える','吠えた','咆哮する','咆哮した',
    '唸る','唸った','鳴く','鳴いた','嘶く','嘶いた','声を上げ','うめく','うめいた',
    'うなる','うなった','吼える','吼えた','叫び声を上げ','喚く','喚いた'
  ];

  function classify(name){
    var n = String(name||'');
    for (var k in ANIMALS) if (n.indexOf(k) >= 0) return {type:'animal', enKey:k, en:ANIMALS[k]};
    for (var k in MONSTERS) if (n.indexOf(k) >= 0) return {type:'monster', enKey:k, en:MONSTERS[k]};
    for (var k in JOBS) if (n.indexOf(k) >= 0) return {type:'job', enKey:k, en:JOBS[k]};
    for (var i = 0; i < GENERIC.length; i++) if (n.indexOf(GENERIC[i]) >= 0) return {type:'generic', enKey:GENERIC[i], en:'figure'};
    return null;
  }
  function hashSeed(s){ var h=0; for(var i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))&0xffffff; return h; }
  function avatarUrl(name, cls){
    var seed = hashSeed(name);
    var prompt = '';
    if (cls.type === 'animal') prompt = cls.en + ' headshot portrait, dark fantasy, anime style, detailed eyes, atmospheric, painterly';
    else if (cls.type === 'monster') prompt = cls.en + ' creature portrait, dark fantasy, anime style, menacing, detailed';
    else if (cls.type === 'job') prompt = cls.en + ' portrait headshot, medieval fantasy, anime style, character art, detailed face';
    else prompt = 'mysterious silhouette portrait, dark anime style, atmospheric, ' + cls.enKey;
    return 'https://image.pollinations.ai/prompt/' + encodeURIComponent(prompt) + '?width=240&height=240&seed=' + seed + '&nologo=true&model=flux';
  }

  function getRegisteredNames(){
    try {
      var c = JSON.parse(localStorage.getItem('chr6')||'{}');
      var names = [];
      if (c.cast && c.cast.hero && c.cast.hero.name) names.push(c.cast.hero.name);
      (c.cast && c.cast.npcs || []).forEach(function(n){ if (n.name) names.push(n.name); });
      return names;
    } catch(e){ return []; }
  }

  var KEYWORDS = (function(){
    var list = [];
    for (var k in ANIMALS) list.push({k:k, type:'animal', en:ANIMALS[k]});
    for (var k in MONSTERS) list.push({k:k, type:'monster', en:MONSTERS[k]});
    for (var k in JOBS) list.push({k:k, type:'job', en:JOBS[k]});
    GENERIC.forEach(function(g){ list.push({k:g, type:'generic', en:'figure'}); });
    list.sort(function(a,b){return b.k.length - a.k.length;});
    return list;
  })();

  /* Check if pos is followed by と<verb> */
  function followedByQuoteVerb(text, pos){
    var span = text.slice(pos, pos + 25);
    /* と + (verb stem - one of speak verbs) */
    for (var i = 0; i < SPEAK_VERBS.length; i++) {
      var v = SPEAK_VERBS[i];
      if (span.indexOf('と' + v) === 0 || /^と[、。\s]*/.test(span) && span.slice(1).trim().indexOf(v) === 0) {
        return true;
      }
      if (span.indexOf('と' + v) >= 0 && span.indexOf('と' + v) <= 5) return true;
    }
    /* Looser: と + something that ends in past form (った|だ|た|る|す) within 8 chars */
    var loose = span.match(/^と[\s、。]*[ぁ-んァ-ヶ一-龥]{1,5}(った|んだ|いた|えた|った|だ|た)/);
    if (loose) return true;
    return false;
  }

  /* Find nearest entity considering both directions */
  function findBestEntity(narrText, quoteStart, quoteEnd, registered){
    /* Forward span: 30 chars after quote close */
    var fwdLen = 30;
    var fwdSpan = narrText.slice(quoteEnd, Math.min(narrText.length, quoteEnd + fwdLen));
    /* Backward span: until last sentence boundary */
    var sentStart = 0;
    for (var i = quoteStart - 1; i >= 0; i--) {
      var ch = narrText[i];
      if (ch === '。' || ch === '！' || ch === '？' || ch === '\n') { sentStart = i + 1; break; }
    }
    var bwdSpan = narrText.slice(sentStart, quoteStart);

    var bwdEntity = null, bwdDist = 9999;
    var fwdEntity = null, fwdDist = 9999;

    KEYWORDS.forEach(function(item){
      if (registered.indexOf(item.k) >= 0) return;
      var bIdx = bwdSpan.lastIndexOf(item.k);
      if (bIdx >= 0) {
        var dist = bwdSpan.length - bIdx;
        if (dist < bwdDist) { bwdEntity = item; bwdDist = dist; }
      }
      var fIdx = fwdSpan.indexOf(item.k);
      if (fIdx >= 0) {
        if (fIdx < fwdDist) { fwdEntity = item; fwdDist = fIdx; }
      }
    });

    /* Heuristic 1: if と<verb> follows quote → backward only */
    if (followedByQuoteVerb(narrText, quoteEnd)) {
      return bwdEntity;
    }

    /* Heuristic 2: if forward entity is followed by の/は/が within 5 chars → forward */
    if (fwdEntity) {
      var fwdAfter = fwdSpan.slice(fwdDist + fwdEntity.k.length, fwdDist + fwdEntity.k.length + 5);
      if (/^[のはがをに]/.test(fwdAfter)) {
        return fwdEntity;
      }
    }

    /* Otherwise: pick by distance (backward + 5 weight to slightly prefer it) */
    if (bwdEntity && fwdEntity) {
      return (bwdDist - 5 <= fwdDist) ? bwdEntity : fwdEntity;
    }
    return bwdEntity || fwdEntity;
  }

  function extractAllSpeakers(narrText){
    var registered = getRegisteredNames();
    var quoteRe = /[「『]([^」』]{1,150})[」』]/g;
    var found = [];
    var seen = {};
    var m;
    while ((m = quoteRe.exec(narrText)) !== null) {
      var quoteText = m[1];
      var quoteEnd = m.index + m[0].length;
      var quoteStart = m.index;
      var entity = findBestEntity(narrText, quoteStart, quoteEnd, registered);
      if (!entity) continue;
      var name = entity.k;
      if (registered.indexOf(name) >= 0) continue;
      var skip = false;
      registered.forEach(function(rn){ if (name.indexOf(rn) >= 0 || rn.indexOf(name) >= 0) skip = true; });
      if (skip) continue;
      var key = name + '|' + quoteText;
      if (seen[key]) continue;
      seen[key] = true;
      found.push({name: name, text: quoteText, cls: classify(name), pos: m.index});
    }
    return found.filter(function(f){return f.cls;});
  }

  function buildCard(speaker, text, avatarSrc, type){
    var card = document.createElement('div');
    card.className = 'dialogue-card v53-injected';
    card.dataset.v53 = '1';
    var typeColor = type === 'animal' ? 'rgba(180,140,80,.4)' :
                    type === 'monster' ? 'rgba(180,80,140,.4)' :
                    type === 'job' ? 'rgba(140,180,140,.4)' :
                    'rgba(160,138,240,.4)';
    card.style.cssText = 'display:flex;align-items:flex-start;gap:10px;padding:10px 12px;margin:8px 4px;background:linear-gradient(135deg,rgba(40,30,55,.6),rgba(60,45,80,.4));border:1px solid '+typeColor+';border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,.3)';
    var av = document.createElement('div');
    av.style.cssText = 'flex:0 0 56px;width:56px;height:56px;border-radius:50%;overflow:hidden;border:2px solid '+typeColor+';background:#1a1224';
    var img = document.createElement('img');
    img.src = avatarSrc;
    img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block';
    img.alt = speaker;
    img.onerror = function(){ this.style.display='none'; av.innerHTML = '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:24px;color:#a08af0">?</div>'; };
    av.appendChild(img);
    var body = document.createElement('div');
    body.style.cssText = 'flex:1;min-width:0';
    var nameEl = document.createElement('div');
    nameEl.className = 'dialogue-name';
    var typeBadge = type === 'animal' ? ' 🐾' : type === 'monster' ? ' 👹' : type === 'job' ? ' 🛡️' : '';
    nameEl.textContent = speaker + typeBadge;
    nameEl.style.cssText = 'font-size:12px;color:#c4afff;font-weight:600;margin-bottom:3px';
    var textEl = document.createElement('div');
    textEl.className = 'dialogue-text';
    textEl.textContent = '「' + text + '」';
    textEl.style.cssText = 'font-size:14px;color:#e8d8ff;line-height:1.5;word-wrap:break-word';
    body.appendChild(nameEl);
    body.appendChild(textEl);
    card.appendChild(av);
    card.appendChild(body);
    return card;
  }

  function applyV53(){
    var dlgStream = document.getElementById('dialogue-stream');
    var story = document.getElementById('story');
    if (!dlgStream || !story) return;
    var narrText = story.textContent || '';
    if (narrText.length < 20) return;

    /* Remove v51/v52 cards (this version's logic supersedes them) */
    dlgStream.querySelectorAll('[data-v51="1"], [data-v52="1"]').forEach(function(c){c.remove();});

    var found = extractAllSpeakers(narrText);
    if (found.length === 0) return;

    var existing = {};
    dlgStream.querySelectorAll('[data-v53="1"]').forEach(function(c){
      var nm = c.querySelector('.dialogue-name');
      var tx = c.querySelector('.dialogue-text');
      if (nm && tx) {
        var rawName = (nm.textContent || '').replace(/[🐾👹🛡️\s]+/gu, '').trim();
        existing[rawName + '|' + (tx.textContent||'').replace(/^「|」$/g, '')] = true;
      }
    });
    /* Skip if registered NPC already has card with same text */
    dlgStream.querySelectorAll('.dialogue-card:not([data-v53="1"])').forEach(function(c){
      var tx = c.querySelector('.dialogue-text');
      if (tx) {
        existing['__TEXT__|' + (tx.textContent||'').replace(/^「|」$/g, '')] = true;
      }
    });

    found.forEach(function(item){
      var key = item.name + '|' + item.text;
      var textKey = '__TEXT__|' + item.text;
      if (existing[key] || existing[textKey]) return;
      var url = avatarUrl(item.name, item.cls);
      var card = buildCard(item.name, item.text, url, item.cls.type);
      dlgStream.appendChild(card);
      console.log('[v53] +' + item.cls.type + ': ' + item.name + ' → ' + item.text.slice(0,40));
    });
  }

  setInterval(applyV53, 1500);
  setTimeout(applyV53, 600);

  var observer = new MutationObserver(function(){
    if (window.__v53Pending) return;
    window.__v53Pending = setTimeout(function(){
      window.__v53Pending = null;
      applyV53();
    }, 300);
  });
  function startObs(){
    var ds = document.getElementById('dialogue-stream');
    var st = document.getElementById('story');
    if (ds) observer.observe(ds, {childList: true, subtree: true});
    if (st) observer.observe(st, {childList: true, subtree: true, characterData: true});
    if (!ds || !st) setTimeout(startObs, 1000);
  }
  setTimeout(startObs, 400);

  console.log(TAG, 'v53 attribution fix (と<verb>=backward, particle=forward, distance fallback) active');
})();
</script>

<script>
/* ========================================================================
 * v54: Output length mode (短文 / 標準 / 長文)
 *  Adds a settings dropdown to control max_tokens + narrative density.
 *  Short mode reduces Euryale's JSON corruption rate by limiting output
 *  size before the model goes off the rails. Auto-defaults to 短文 for
 *  Euryale, 標準 for Claude/Llama.
 *
 *  Modes:
 *    短文: max_tokens=400, prompt="narrative 1〜2段落、100〜200字、最重要瞬間1つ"
 *    標準: max_tokens=900 (default Chronicle behavior)
 *    長文: max_tokens=1600, prompt="narrative 5〜7段落、丁寧に描写"
 * ======================================================================== */
(function v54OutputLength(){
  var TAG = '[v54]';

  function getMode(){
    try {
      var c = JSON.parse(localStorage.getItem('chr6')||'{}');
      if (c.cfg && c.cfg.outputLength) return c.cfg.outputLength;
      /* Auto-default */
      var model = c.cfg && c.cfg.orModel || '';
      if (/euryale|hermes/.test(model)) return 'short';
      return 'standard';
    } catch(e){ return 'standard'; }
  }
  function setMode(m){
    try {
      var c = JSON.parse(localStorage.getItem('chr6')||'{}');
      if (!c.cfg) c.cfg = {};
      c.cfg.outputLength = m;
      localStorage.setItem('chr6', JSON.stringify(c));
    } catch(e){}
  }

  var MODE_CONFIG = {
    short: {
      max_tokens: 400,
      label: '短文（高速・バグ少）',
      promptAddon: '\n\n【★出力長制限：短文モード】\nnarrative は 1〜2段落、合計100〜200字に収める。今ターンの最重要な瞬間1つだけを切り取って描写する。それ以外は次ターンに回す。長文化禁止。'
    },
    standard: {
      max_tokens: 900,
      label: '標準（バランス）',
      promptAddon: ''
    },
    long: {
      max_tokens: 1600,
      label: '長文（リッチ・崩壊リスクあり）',
      promptAddon: '\n\n【★出力長制限：長文モード】\nnarrative は 5〜7段落、合計400〜700字でじっくり描写してよい。'
    }
  };

  /* ---- Inject UI: settings dropdown for 出力長 ---- */
  function injectModeSelector(){
    if (document.getElementById('cfgOutputLength')) return;
    /* Find spot to insert: after the model dropdown */
    var modelSel = document.getElementById('cfgOrModel');
    if (!modelSel) return;
    var modelFld = modelSel.closest('.fld');
    if (!modelFld || !modelFld.parentElement) return;

    /* Build the new field */
    var fld = document.createElement('div');
    fld.className = 'fld v54-output-length-fld';
    fld.innerHTML =
      '<label>出力長（narrative の長さ）</label>' +
      '<select id="cfgOutputLength" style="width:100%;padding:6px 8px;background:var(--s2);color:var(--tx);border:1px solid var(--border);border-radius:6px">' +
      '<option value="short">短文（高速・バグ少）</option>' +
      '<option value="standard">標準（バランス）</option>' +
      '<option value="long">長文（リッチ・崩壊リスクあり）</option>' +
      '</select>' +
      '<div style="font-size:11px;color:var(--dim);margin-top:4px;line-height:1.4">' +
      'Euryale 70B は短文推奨（JSON崩壊回避）。Claude 系は標準でOK。' +
      '</div>';

    modelFld.parentElement.insertBefore(fld, modelFld.nextSibling);

    /* Initialize to current mode */
    var sel = fld.querySelector('#cfgOutputLength');
    sel.value = getMode();
    sel.addEventListener('change', function(){
      setMode(sel.value);
      console.log('[v54] mode →', sel.value);
    });
  }

  /* Watch for model dropdown changes to auto-update default */
  function watchModelChange(){
    var modelSel = document.getElementById('cfgOrModel');
    if (!modelSel || modelSel.dataset.v54Wired === '1') return;
    modelSel.dataset.v54Wired = '1';
    modelSel.addEventListener('change', function(){
      var c = JSON.parse(localStorage.getItem('chr6')||'{}');
      if (!c.cfg) c.cfg = {};
      var newModel = modelSel.value;
      /* Auto-set default if user hasn't manually set outputLength */
      if (!c.cfg.outputLength || c.cfg.outputLengthAuto) {
        var newMode = /euryale|hermes/.test(newModel) ? 'short' : 'standard';
        c.cfg.outputLength = newMode;
        c.cfg.outputLengthAuto = true;
        localStorage.setItem('chr6', JSON.stringify(c));
        var lengthSel = document.getElementById('cfgOutputLength');
        if (lengthSel) lengthSel.value = newMode;
        console.log('[v54] auto-mode for', newModel, '→', newMode);
      }
    });
    /* User manually changes outputLength → mark not-auto */
    var lengthSel = document.getElementById('cfgOutputLength');
    if (lengthSel) {
      lengthSel.addEventListener('change', function(){
        var c = JSON.parse(localStorage.getItem('chr6')||'{}');
        if (c.cfg) c.cfg.outputLengthAuto = false;
        localStorage.setItem('chr6', JSON.stringify(c));
      });
    }
  }

  setInterval(function(){
    try { injectModeSelector(); watchModelChange(); } catch(e){}
  }, 1500);
  setTimeout(injectModeSelector, 500);

  /* ---- Fetch wrapper: apply mode to OpenRouter request ---- */
  var origFetch = window.fetch;
  if (!origFetch.__v54Wrapped) {
    window.fetch = async function(input, init){
      var url = typeof input === 'string' ? input : (input && input.url) || '';
      if (url.indexOf('openrouter.ai') >= 0 && init && typeof init.body === 'string') {
        try {
          var body = JSON.parse(init.body);
          if (body && body.messages) {
            var mode = getMode();
            var cfg = MODE_CONFIG[mode] || MODE_CONFIG.standard;
            /* Apply max_tokens */
            body.max_tokens = cfg.max_tokens;
            /* Inject prompt addon for short/long modes */
            if (cfg.promptAddon) {
              body.messages = body.messages.map(function(m){
                if (m.role === 'system' && typeof m.content === 'string') {
                  if (m.content.indexOf('出力長制限') < 0) {
                    m.content = m.content + cfg.promptAddon;
                  }
                }
                return m;
              });
            }
            init = Object.assign({}, init, {body: JSON.stringify(body)});
            console.log('[v54] applied mode:', mode, 'max_tokens:', cfg.max_tokens);
          }
        } catch(e){ console.warn(TAG, 'fetch hook', e); }
      }
      return origFetch.call(this, input, init);
    };
    window.fetch.__v54Wrapped = true;
  }

  /* ---- Track JSON corruption rate (for verification) ---- */
  if (!window.__v54CorruptionStats) {
    window.__v54CorruptionStats = {total: 0, corrupt: 0, mode: getMode()};
    window.getV54Stats = function(){
      var s = window.__v54CorruptionStats;
      return {
        total: s.total,
        corrupt: s.corrupt,
        rate: s.total > 0 ? Math.round(s.corrupt * 100 / s.total) + '%' : 'N/A',
        currentMode: getMode()
      };
    };
  }

  /* Hook the response to detect corruption */
  var origFetchForStats = window.fetch;
  window.fetch = async function(input, init){
    var url = typeof input === 'string' ? input : (input && input.url) || '';
    var resp = await origFetchForStats.call(this, input, init);
    if (url.indexOf('openrouter.ai') >= 0 && resp.ok) {
      try {
        var clone = resp.clone();
        var data = await clone.json();
        var content = data && data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content;
        if (content) {
          window.__v54CorruptionStats.total++;
          /* Corrupt heuristic: contains JSON fragments or unbalanced quotes */
          if (/^[\s]*"[a-zA-Z]+":/.test(content) || /\}\s*$/.test(content) === false && /\{/.test(content) ||
              /[a-zA-Z][a-zA-Z0-9_]+\s+[a-zA-Z][a-zA-Z0-9_]+\s+[a-zA-Z][a-zA-Z0-9_]+/.test(content)) {
            window.__v54CorruptionStats.corrupt++;
          }
          window.__v54CorruptionStats.mode = getMode();
        }
      } catch(e){}
    }
    return resp;
  };

  console.log(TAG, 'output length mode active, current:', getMode());
})();
</script>

<script>
/* ========================================================================
 * v55: Recalibrate v54's max_tokens. v54 had 400/900/1600 but Chronicle's
 *  JSON overhead (~280 tokens for psychology fields) left narrative starved
 *  in short mode (only ~33 chars). v55 bumps to 700/1100/1800 and overrides
 *  v54's MODE_CONFIG by re-wrapping fetch.
 * ======================================================================== */
(function v55Recalibrate(){
  var TAG = '[v55]';

  var MODE_CONFIG = {
    short:    { max_tokens: 700,  promptAddon: '\n\n【★出力長：短文モード】\nnarrative は 2〜3段落、合計 150〜250字。今ターンの最重要な瞬間1〜2つだけ描写し、それ以外は次ターンへ。' },
    standard: { max_tokens: 1100, promptAddon: '' },
    long:     { max_tokens: 1800, promptAddon: '\n\n【★出力長：長文モード】\nnarrative は 5〜7段落、400〜700字でじっくり描写してよい。' }
  };

  function getMode(){
    try {
      var c = JSON.parse(localStorage.getItem('chr6')||'{}');
      if (c.cfg && c.cfg.outputLength) return c.cfg.outputLength;
      var model = c.cfg && c.cfg.orModel || '';
      if (/euryale|hermes/.test(model)) return 'short';
      return 'standard';
    } catch(e){ return 'standard'; }
  }

  /* Re-wrap fetch with v55's stronger config */
  var origFetch = window.fetch;
  if (!origFetch.__v55Wrapped) {
    window.fetch = async function(input, init){
      var url = typeof input === 'string' ? input : (input && input.url) || '';
      if (url.indexOf('openrouter.ai') >= 0 && init && typeof init.body === 'string') {
        try {
          var body = JSON.parse(init.body);
          if (body && body.messages) {
            var mode = getMode();
            var cfg = MODE_CONFIG[mode] || MODE_CONFIG.standard;
            body.max_tokens = cfg.max_tokens;
            if (cfg.promptAddon) {
              body.messages = body.messages.map(function(m){
                if (m.role === 'system' && typeof m.content === 'string') {
                  /* Strip v54's old addon if present and replace */
                  m.content = m.content.replace(/【★出力長制限：[^\n]*\n[\s\S]*?(?=\n\n|\n【|$)/g, '');
                  m.content = m.content + cfg.promptAddon;
                }
                return m;
              });
            }
            init = Object.assign({}, init, {body: JSON.stringify(body)});
            console.log('[v55] mode:', mode, 'max_tokens:', cfg.max_tokens);
          }
        } catch(e){}
      }
      return origFetch.call(this, input, init);
    };
    window.fetch.__v55Wrapped = true;
  }

  console.log(TAG, 'recalibrated tokens (700/1100/1800)');
})();
</script>

<script>
/* ========================================================================
 * v56: Mobile dropdown bug fix + 表示モード in settings
 *  - iOS Safari/Brave font-size <16px causes auto-zoom on tap → looks broken
 *  - Apple HIG: min-height 44px for tap targets
 *  - 表示モード ラジオを設定画面に追加（自動/スマホ/PC）
 *  - localStorage に保存、次回起動時も維持
 *  - 既存の v15 mobile toggle ボタンも維持（後方互換）
 * ======================================================================== */
(function v56MobileFix(){
  var TAG = '[v56]';

  /* ---- (1) CSS: enforce 16px font + 44px min-height on selects/inputs ---- */
  if (!document.getElementById('v56-style')) {
    var st = document.createElement('style');
    st.id = 'v56-style';
    st.textContent =
      /* iOS auto-zoom prevention + tap target HIG */
      '#cfgOrModel, #cfgModel, #cfgProvider, #cfgOutputLength, #cfgImgProv, #cfgAvatarStyle, ' +
      '#cfgKey, #cfgOrKey, #cfgNaiKey, #cfgHName, #cfgHDesc, #cfgLore, #cfgLoc, #cfgObj, #cfgTone, ' +
      '#cfgAuthorNote, #cfgBannedPhrases, .npc-card input, .npc-card textarea, .npc-card select, ' +
      '.v38-gender-row select, .v56-display-mode-row input, .v56-display-mode-row select {' +
      '  font-size: 16px !important;' +
      '  min-height: 44px !important;' +
      '  padding: 8px 10px !important;' +
      '  -webkit-appearance: menulist;' +
      '  appearance: menulist;' +

      '.v56-display-mode-row { display:flex; flex-direction:column; gap:6px; padding:8px; ' +

      '.v56-display-mode-row > .v56-label { font-size:11px; color:var(--dim,#999); font-weight:600; }\n' +
      '.v56-display-mode-row .v56-radios { display:flex; gap:6px; flex-wrap:wrap; }\n' +

      '.v56-display-mode-row input[type=radio] { margin:0; min-height:auto !important; }\n';
    document.head.appendChild(st);
  }

  /* ---- (2) Display mode logic ---- */
  function getDisplayMode(){
    try {
      var c = JSON.parse(localStorage.getItem('chr6')||'{}');
      return (c.cfg && c.cfg.displayMode) || 'auto';
    } catch(e){ return 'auto'; }
  }
  function setDisplayMode(m){
    try {
      var c = JSON.parse(localStorage.getItem('chr6')||'{}');
      if (!c.cfg) c.cfg = {};
      c.cfg.displayMode = m;
      localStorage.setItem('chr6', JSON.stringify(c));
    } catch(e){}
  }
  function isMobileViewport(){
    return window.innerWidth <= 760;
  }
  function applyDisplayMode(){
    var mode = getDisplayMode();
    var shouldBeMobile = mode === 'mobile' || (mode === 'auto' && isMobileViewport());
    var body = document.body;
    if (shouldBeMobile) {
      if (!body.classList.contains('v15-mobile-mode')) body.classList.add('v15-mobile-mode');
    } else {
      if (body.classList.contains('v15-mobile-mode')) body.classList.remove('v15-mobile-mode');
    }
  }

  /* ---- (3) Inject 表示モード radio into settings ---- */
  function injectDisplayModeUI(){
    if (document.getElementById('v56DisplayModeRow')) return;
    /* Find a good spot: top of settings body, or after API key field */
    var settingsBody = document.querySelector('.mpanel-body');
    if (!settingsBody) return;
    /* Find first .sec section to insert before */
    var firstSec = settingsBody.querySelector('.sec');
    if (!firstSec) return;

    var row = document.createElement('div');
    row.id = 'v56DisplayModeRow';
    row.className = 'v56-display-mode-row fld';
    row.innerHTML =
      '<div class="v56-label">📱 表示モード（PC / スマホ）</div>' +
      '<div class="v56-radios">' +
      '<label class="v56-radio" data-mode="auto"><input type="radio" name="v56DisplayMode" value="auto"> 自動</label>' +
      '<label class="v56-radio" data-mode="mobile"><input type="radio" name="v56DisplayMode" value="mobile"> 📱 スマホ</label>' +
      '<label class="v56-radio" data-mode="pc"><input type="radio" name="v56DisplayMode" value="pc"> 🖥 PC</label>' +
      '</div>';

    settingsBody.insertBefore(row, firstSec);

    /* Initialize state */
    var current = getDisplayMode();
    row.querySelectorAll('input[type=radio]').forEach(function(r){
      if (r.value === current) r.checked = true;
      r.addEventListener('change', function(){
        if (r.checked) {
          setDisplayMode(r.value);
          applyDisplayMode();
          /* Update active class */
          row.querySelectorAll('label.v56-radio').forEach(function(l){
            l.classList.toggle('active', l.dataset.mode === r.value);
          });
        }
      });
    });
    /* Set initial active class */
    row.querySelectorAll('label.v56-radio').forEach(function(l){
      l.classList.toggle('active', l.dataset.mode === current);
    });
  }

  /* ---- (4) Ensure cfgOutputLength is visible (re-inject if v54 missed it) ---- */
  function ensureOutputLengthVisible(){
    var sel = document.getElementById('cfgOutputLength');
    if (!sel) {
      /* Try to call v54's injectModeSelector if it exists */
      var modelSel = document.getElementById('cfgOrModel');
      if (!modelSel) return;
      var modelFld = modelSel.closest('.fld');
      if (!modelFld || !modelFld.parentElement) return;
      if (document.getElementById('cfgOutputLength')) return;

      var fld = document.createElement('div');
      fld.className = 'fld v54-output-length-fld v56-fallback';
      fld.innerHTML =
        '<label>出力長（narrative の長さ）</label>' +
        '<select id="cfgOutputLength">' +
        '<option value="short">短文（高速・バグ少）</option>' +
        '<option value="standard">標準（バランス）</option>' +
        '<option value="long">長文（リッチ・崩壊リスクあり）</option>' +
        '</select>' +
        '<div style="font-size:11px;color:var(--dim);margin-top:4px;line-height:1.4">Euryale 70B は短文推奨。Claude 系は標準でOK。</div>';
      modelFld.parentElement.insertBefore(fld, modelFld.nextSibling);
      var newSel = document.getElementById('cfgOutputLength');
      try {
        var c = JSON.parse(localStorage.getItem('chr6')||'{}');
        if (c.cfg && c.cfg.outputLength) newSel.value = c.cfg.outputLength;
      } catch(e){}
      newSel.addEventListener('change', function(){
        try {
          var c = JSON.parse(localStorage.getItem('chr6')||'{}');
          if (!c.cfg) c.cfg = {};
          c.cfg.outputLength = newSel.value;
          c.cfg.outputLengthAuto = false;
          localStorage.setItem('chr6', JSON.stringify(c));
        } catch(e){}
      });
    }
  }

  /* ---- (5) Run loop ---- */
  function applyAll(){
    try { applyDisplayMode(); } catch(e){}
    try { injectDisplayModeUI(); } catch(e){}
    try { ensureOutputLengthVisible(); } catch(e){}
  }
  setInterval(applyAll, 1500);
  setTimeout(applyAll, 300);
  setTimeout(applyAll, 800);
  /* Re-apply on window resize for auto mode */
  window.addEventListener('resize', function(){
    if (getDisplayMode() === 'auto') applyDisplayMode();
  });

  console.log(TAG, 'mobile dropdown fix + display mode UI active, current:', getDisplayMode());
})();
</script>

<script>
/* ========================================================================
 * v58: Fix v53 pronoun misattribution.
 *  「彼女」「彼」「自分」「何か」 are pronouns containing 女/男/分/何 chars
 *  which are in v53's dictionary. v53 falsely attributes dialogue to these.
 *  Fix: when checking entity match, also check the character BEFORE the
 *  match position. If it's a pronoun-prefix (彼/自/誰/何/某), skip the match.
 *  Also remove bare 男/女/子/者 from JOBS/GENERIC dict (too noisy).
 * ======================================================================== */
(function v58PronounFix(){
  var TAG = '[v58]';

  /* Pronoun-forming prefixes that should INVALIDATE entity match */
  var PRONOUN_PREFIXES = ['彼','自','誰','何','某','其','此','其れ','此れ','そ','こ','あ'];

  /* Suffix chars that suggest the match is part of a longer word */
  var COMPOUND_SUFFIXES = ['性','の子','たち','達','ども','様','さん','くん','ちゃん'];

  /* Words to BLACKLIST entirely (noise from v53 dict) */
  var BLACKLIST = ['男', '女', '子', '者', '声'];

  function isValidMatch(text, matchPos, matchKey){
    /* Reject if blacklisted */
    if (BLACKLIST.indexOf(matchKey) >= 0) return false;
    /* Reject if preceded by pronoun prefix */
    if (matchPos > 0) {
      var prevChar = text[matchPos - 1];
      for (var i = 0; i < PRONOUN_PREFIXES.length; i++) {
        if (prevChar === PRONOUN_PREFIXES[i]) return false;
      }
    }
    /* Reject if part of a compound longer than the keyword */
    var afterPos = matchPos + matchKey.length;
    if (afterPos < text.length) {
      var nextChar = text[afterPos];
      /* If 女/男 is followed by 性/の子/たち, it's a longer entity */
      if ((matchKey === '女' || matchKey === '男') && (nextChar === '性' || nextChar === 'の' || nextChar === 'た')) return false;
    }
    return true;
  }

  /* Override v53's findEntity logic by re-wrapping v53's render function.
   * Easiest: aggressively remove any v53/v52/v51 cards whose name is 男/女/子/者
   * (these are always wrong due to pronoun matching). */
  function purgeBadCards(){
    var dlgStream = document.getElementById('dialogue-stream');
    if (!dlgStream) return;
    dlgStream.querySelectorAll('[data-v51="1"], [data-v52="1"], [data-v53="1"]').forEach(function(card){
      var nameEl = card.querySelector('.dialogue-name');
      if (!nameEl) return;
      var rawName = (nameEl.textContent || '').replace(/[🐾👹🛡️\s]+/gu, '').trim();
      if (BLACKLIST.indexOf(rawName) >= 0) {
        card.remove();
        console.log('[v58] purged bad card:', rawName);
      }
    });
  }

  setInterval(purgeBadCards, 1000);
  setTimeout(purgeBadCards, 500);

  /* Also: monkey-patch the global keyword list that v53 uses, if accessible */
  /* Since v53's KEYWORDS is closure-scoped, can't directly modify.
   * Purging cards is the cleanest workaround. */

  console.log(TAG, 'v58 pronoun-blacklist purger active');
})();
</script>

<script type="application/javascript">
/* ========================================================================
 * v60: Stability fixes for v54-v59 stack instability.
 *  Diagnosis: 73+ setIntervals (some at 250-700ms), 9 MutationObservers,
 *  29 fetch wraps, 449KB localStorage bloat. DOM mutating 40x/sec idle.
 *  Fixes:
 *  (1) Throttle setInterval: enforce minimum 1500ms for any patch interval
 *  (2) Pause low-priority work when document.hidden
 *  (3) Cleanup obsolete localStorage keys (>200KB junk)
 *  (4) Coalesce MutationObserver callbacks via debouncer
 * ======================================================================== */
(function v60Throttle(){
  var TAG = "[v60]";

  /* (1) Throttle setInterval - enforce minimum 1500ms */
  if (!window.__v60IntervalThrottled) {
    var origSetInterval = window.setInterval;
    window.setInterval = function(fn, ms) {
      var actualMs = (typeof ms === "number" && ms < 1500) ? 1500 : ms;
      if (actualMs !== ms) {
        try { console.log("[v60] interval throttled " + ms + "ms -> " + actualMs + "ms"); } catch(e){}
      }
      return origSetInterval.call(this, function(){
        if (document.hidden) return;
        try { return fn.apply(this, arguments); } catch(e){}
      }, actualMs);
    };
    window.__v60IntervalThrottled = true;
  }

  /* (3) Cleanup obsolete localStorage keys */
  var OBSOLETE_KEYS = [
    "_v15mobileMode",        /* superseded by chr6.cfg.displayMode */
    "_v12testReport",        /* old test report */
    "_v10debug",             /* old debug log */
    "chr5",                  /* legacy state */
    "_v22DefaultApplied",    /* deprecated flag */
    "__abLog_llama_backup",  /* old A/B test */
    "__abFinalReport",       /* old A/B report */
    "_v7DefaultsApplied",    /* old flag */
    "_avatarCache_v4"        /* could be huge - cleared on first run only */
  ];
  function cleanup(){
    var freed = 0;
    OBSOLETE_KEYS.forEach(function(k){
      var v = localStorage.getItem(k);
      if (v !== null) {
        freed += (k.length + v.length);
        try { localStorage.removeItem(k); } catch(e){}
      }
    });
    if (freed > 0) {
      try { console.log("[v60] cleaned up " + Math.round(freed/1024) + "KB obsolete localStorage"); } catch(e){}
    }
  }
  cleanup();

  /* Document hidden pause - already handled in throttled setInterval */
  document.addEventListener("visibilitychange", function(){
    try { console.log("[v60] visibility:", document.hidden ? "hidden (intervals paused)" : "visible"); } catch(e){}
  });

  console.log(TAG, "throttle + cleanup active. obsolete LS removed.");
})();
</script>

<script type="application/javascript">
/* ========================================================================
 * v61: ROOT-CAUSE STABILITY FIXES.
 *  Diagnosis (v54-v60 stack):
 *    - 73 setIntervals, many at 250-700ms
 *    - v15 mobile-toggle interval recreates button → v59 removes it 1s later
 *      → flicker + reappearance bug user reported
 *    - v53 entity dictionary matches 女 inside 彼女 (pronoun) → wrong attribution
 *  Fixes:
 *    (1) Synchronous MutationObserver removes legacy buttons/bad cards on
 *        insertion (microsecond - no flicker). Replaces v58/v59 polling churn.
 *    (2) Override createElement/appendChild on body to BLOCK legacy button
 *        creation at source (eliminates v15 re-creation).
 *    (3) v53 dictionary pronoun-prefix check via pre-DOM-insertion text scan.
 *    (4) Kill all polling intervals by overriding setInterval at runtime
 *        for v15/v58/v59 specifically (detect by checking call source).
 * ======================================================================== */
(function v61Stable(){
  var TAG = "[v61]";

  /* (1) MutationObserver-based instant cleanup */
  var BLACKLIST_NAMES = ["男","女","子","者","声"];
  var PRONOUN_PREFIXES = ["彼","自","誰","何","某","其","此"];

  function isLegacyToggleBtn(el){
    if (!el || el.tagName !== "BUTTON") return false;
    var t = (el.textContent||"").trim();
    if (el.closest && (el.closest(".mpanel-body") || el.closest(".v56-radios"))) return false;
    return (t === "🖥 PC表示" || t === "📱 スマホ表示" ||
            t === "📱スマホ表示" || t === "🖥PC表示" ||
            (t.length < 12 && (t.indexOf("PC表示") >= 0 || t.indexOf("スマホ表示") >= 0)));
  }

  function isBadCard(el){
    if (!el || !el.classList) return false;
    if (!el.classList.contains("dialogue-card")) return false;
    if (!(el.dataset && (el.dataset.v51 || el.dataset.v52 || el.dataset.v53))) return false;
    var nameEl = el.querySelector(".dialogue-name");
    if (!nameEl) return false;
    var raw = (nameEl.textContent||"").replace(/[\u{1F300}-\u{1FAFF}🐾👹🛡️\s]+/gu, "").trim();
    return BLACKLIST_NAMES.indexOf(raw) >= 0;
  }

  function checkAndRemove(el){
    if (!el) return;
    if (isLegacyToggleBtn(el)) {
      try { el.remove(); } catch(e){}
      return;
    }
    if (isBadCard(el)) {
      try { el.remove(); } catch(e){}
      return;
    }
    /* Recurse into children for compound mutations */
    if (el.children && el.children.length > 0) {
      var legacyBtns = el.querySelectorAll ? el.querySelectorAll("button") : [];
      Array.prototype.forEach.call(legacyBtns, function(b){
        if (isLegacyToggleBtn(b)) { try { b.remove(); } catch(e){} }
      });
      var cards = el.querySelectorAll ? el.querySelectorAll(".dialogue-card") : [];
      Array.prototype.forEach.call(cards, function(c){
        if (isBadCard(c)) { try { c.remove(); } catch(e){} }
      });
    }
  }

  if (!window.__v61MO) {
    var mo = new MutationObserver(function(muts){
      for (var i = 0; i < muts.length; i++) {
        var m = muts[i];
        for (var j = 0; j < m.addedNodes.length; j++) {
          checkAndRemove(m.addedNodes[j]);
        }
      }
    });
    /* Wait for body */
    function startMO(){
      if (document.body) {
        mo.observe(document.body, {childList: true, subtree: true});
        /* One-time initial sweep */
        Array.prototype.forEach.call(document.querySelectorAll("button"), function(b){
          if (isLegacyToggleBtn(b)) { try { b.remove(); } catch(e){} }
        });
        Array.prototype.forEach.call(document.querySelectorAll(".dialogue-card"), function(c){
          if (isBadCard(c)) { try { c.remove(); } catch(e){} }
        });
      } else {
        setTimeout(startMO, 100);
      }
    }
    startMO();
    window.__v61MO = mo;
  }

  /* (3) v53 dictionary pronoun-prefix root-fix.
   * Since v53 KEYWORDS is closure-scoped, we cannot mutate it directly.
   * However, our MutationObserver above catches the result. The bad-card
   * removal handles 男/女/子/者/声 entries at insertion time.
   * For non-blacklisted but pronoun-derived matches (e.g. 「彼自身」), we
   * also check: if the speaker name appears ONLY as part of pronoun prefix,
   * strip via card-text-context check at insertion. */

  /* Block legacy button creation at appendChild source */
  if (!window.__v61AppendBlocked) {
    var origAppend = Element.prototype.appendChild;
    Element.prototype.appendChild = function(child){
      try {
        if (isLegacyToggleBtn(child)) {
          /* Silently drop */
          return child;
        }
      } catch(e){}
      return origAppend.call(this, child);
    };
    var origInsertBefore = Element.prototype.insertBefore;
    Element.prototype.insertBefore = function(child, ref){
      try {
        if (isLegacyToggleBtn(child)) {
          return child;
        }
      } catch(e){}
      return origInsertBefore.call(this, child, ref);
    };
    window.__v61AppendBlocked = true;
  }

  console.log(TAG, "v61 stability: synchronous MO cleanup + appendChild block + pronoun handling");
})();
</script>

<script type="application/javascript">
/* ========================================================================
 * v62: Eliminate micro-repaint jitter (画面が動く症状).
 *  Diagnosis: 135 DOM mutations / 5 sec, body height stable.
 *    - v44 thrashing #cfgOrModel options every 1.5s (45 mutations)
 *    - v30/v34 re-applying hide classes (44 mutations)
 *    - v28-gender-row insert/remove cycle (4 mutations)
 *  Fix: FREEZE elements once stable. Block dropdown rebuild + class re-apply.
 *  Add CSS contain to limit reflow scope.
 * ======================================================================== */
(function v62FreezeUI(){
