<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Chronicle — AI RPG</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700&family=Cormorant+Garamond:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ================================================================
   DESIGN: Aged parchment meets darkness
   Typography: Shippori Mincho (body) + Cormorant Garamond (headings)
   ================================================================ */
:root {
  --bg:    #0b0a0d;
  --bg2:   #13121a;
  --bg3:   #1b1a24;
  --srf:   #1e1d28;
  --bdr:   #2a2835;
  --gold:  #c9a84c;
  --gd:    #806830;
  --gg:    rgba(201,168,76,.15);
  --tx:    #cdc0a0;
  --txd:   #6e6555;
  --txb:   #e8dcc0;
  --err:   #cc4444;
  --r:     6px;
  --fb:    'Shippori Mincho', serif;
  --fh:    'Cormorant Garamond', serif;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { font-size: 15px; }
body { font-family:var(--fb); background:var(--bg); color:var(--tx); min-height:100dvh; overflow:hidden; }
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-thumb { background:var(--bdr); border-radius:2px; }
a { color:var(--gd); }

/* ================================================================
   LAYOUT
   ================================================================ */
/* -- App Shell -- */
#app { display:flex; height:100dvh; width:100vw; display:none; }

/* -- Side Panel -- */
.side { width:0; overflow:hidden; background:var(--bg2); border-right:1px solid var(--bdr); transition:width .25s; flex-shrink:0; }
.side.open { width:min(320px,85vw); }
.side-inner { width:min(320px,85vw); height:100%; display:flex; flex-direction:column; }
.side-head { padding:14px 16px; border-bottom:1px solid var(--bdr); display:flex; justify-content:space-between; align-items:center; }
.side-head h2 { font-family:var(--fh); color:var(--gold); font-size:1.05rem; }
.side-tabs { display:flex; border-bottom:1px solid var(--bdr); }
.side-tab { flex:1; padding:9px 6px; background:none; border:none; color:var(--txd); font-family:var(--fb); font-size:.72rem; cursor:pointer; border-bottom:2px solid transparent; }
.side-tab.on { color:var(--gold); border-bottom-color:var(--gold); }
.side-body { flex:1; overflow-y:auto; padding:12px; }

/* -- Main Area -- */
.main { flex:1; display:flex; flex-direction:column; min-width:0; }

/* -- Top Bar -- */
.topbar { display:flex; align-items:center; padding:8px 12px; background:var(--bg2); border-bottom:1px solid var(--bdr); gap:8px; flex-shrink:0; }
.topbtn { background:none; border:1px solid var(--bdr); color:var(--txd); width:34px; height:34px; border-radius:var(--r); cursor:pointer; font-size:.9rem; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.topbtn:hover { border-color:var(--gd); color:var(--tx); }
.scene-bar { flex:1; font-size:.7rem; color:var(--txd); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

/* -- Story Area -- */
.story { flex:1; overflow-y:auto; padding:20px 16px 150px; scroll-behavior:smooth; }

/* -- Turn Blocks -- */
.turn { margin-bottom:18px; animation:fadeUp .3s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1} }
.turn-act { color:var(--gold); font-size:.82rem; padding:5px 0 3px 12px; border-left:2px solid var(--gd); margin-bottom:5px; }
.turn-nar { line-height:1.95; font-size:.95rem; }
.turn-nar p { margin-bottom:7px; text-indent:1em; }
.turn-sys { text-align:center; color:var(--txd); font-size:.78rem; padding:8px; }
.turn-err { color:var(--err); font-size:.8rem; padding:6px 10px; background:rgba(200,60,60,.08); border-radius:var(--r); }

/* -- Loading -- */
.dots { display:flex; gap:5px; padding:10px 0; }
.dots span { width:5px; height:5px; background:var(--gd); border-radius:50%; animation:dot 1.2s infinite; }
.dots span:nth-child(2) { animation-delay:.15s; }
.dots span:nth-child(3) { animation-delay:.3s; }
@keyframes dot { 0%,80%,100%{opacity:.3;transform:scale(.8)} 40%{opacity:1;transform:scale(1.2)} }

/* -- Input Area -- */
.input-area { position:fixed; bottom:0; left:0; right:0; background:linear-gradient(transparent,var(--bg2) 12px); padding:12px 12px max(12px,env(safe-area-inset-bottom)); z-index:10; }
.modes { display:flex; gap:2px; margin-bottom:6px; }
.mode-btn { flex:1; padding:5px; background:var(--bg3); border:1px solid transparent; color:var(--txd); font-family:var(--fb); font-size:.68rem; cursor:pointer; border-radius:3px; text-align:center; }
.mode-btn.on { border-color:var(--gd); color:var(--gold); background:var(--bg); }
.input-row { display:flex; gap:6px; align-items:flex-end; }
.input-row textarea { flex:1; background:var(--srf); border:1px solid var(--bdr); color:var(--tx); padding:10px 12px; border-radius:var(--r); font-family:var(--fb); font-size:.9rem; resize:none; height:42px; max-height:100px; outline:none; line-height:1.4; }
.input-row textarea:focus { border-color:var(--gd); }
.send-btn { width:42px; height:42px; background:var(--gold); border:none; border-radius:var(--r); color:var(--bg); font-size:1.1rem; cursor:pointer; flex-shrink:0; }
.send-btn:disabled { opacity:.25; cursor:not-allowed; }
.sub-btns { display:flex; gap:6px; margin-top:5px; }
.sub-btn { padding:4px 12px; background:none; border:1px solid var(--bdr); color:var(--txd); font-family:var(--fb); font-size:.68rem; cursor:pointer; border-radius:3px; }
.sub-btn:hover { border-color:var(--gd); color:var(--tx); }

/* ================================================================
   SETUP SCREEN
   ================================================================ */
#setup { position:fixed; inset:0; background:var(--bg); z-index:50; overflow-y:auto; display:flex; flex-direction:column; align-items:center; padding:40px 20px 80px; }
#setup.hide { display:none; }
#setup h1 { font-family:var(--fh); font-size:clamp(2.2rem,7vw,3.5rem); color:var(--gold); letter-spacing:.12em; font-weight:700; text-shadow:0 0 40px var(--gg); }
.setup-sub { font-size:.72rem; color:var(--txd); letter-spacing:.25em; margin-bottom:36px; }
.sec { width:100%; max-width:520px; margin-bottom:16px; }
.sec summary { cursor:pointer; color:var(--gold); font-size:.88rem; padding:8px 0; list-style:none; display:flex; align-items:center; gap:6px; }
.sec summary::before { content:'▸'; font-size:.7rem; transition:transform .2s; }
.sec[open] summary::before { transform:rotate(90deg); }
.sec .inner { padding:8px 0 8px 12px; }
.fd { margin-bottom:12px; }
.fd label { display:block; font-size:.75rem; color:var(--gd); margin-bottom:3px; }
.fd .hint { font-size:.65rem; color:var(--txd); margin-bottom:4px; line-height:1.4; }
.fd input, .fd textarea, .fd select { width:100%; background:var(--bg2); border:1px solid var(--bdr); color:var(--tx); padding:8px 10px; border-radius:var(--r); font-family:var(--fb); font-size:.85rem; outline:none; }
.fd input:focus, .fd textarea:focus { border-color:var(--gd); }
.fd textarea { resize:vertical; min-height:50px; }
.npc-card { background:var(--srf); border:1px solid var(--bdr); border-radius:var(--r); padding:10px; margin-bottom:6px; }
.add-btn { width:100%; padding:8px; background:none; border:1px dashed var(--bdr); color:var(--txd); border-radius:var(--r); font-family:var(--fb); font-size:.78rem; cursor:pointer; margin-top:4px; }
.go-btn { font-family:var(--fh); font-size:1.05rem; font-weight:700; background:linear-gradient(135deg,var(--gd),var(--gold)); color:var(--bg); border:none; padding:14px 52px; border-radius:var(--r); cursor:pointer; letter-spacing:.08em; margin-top:20px; }
.go-btn:hover { transform:translateY(-1px); box-shadow:0 4px 20px var(--gg); }

/* ================================================================
   MODAL
   ================================================================ */
.modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:40; align-items:center; justify-content:center; padding:16px; }
.modal-bg.show { display:flex; }
.modal { background:var(--bg2); border:1px solid var(--bdr); border-radius:8px; padding:20px; max-width:500px; width:100%; max-height:80vh; overflow-y:auto; }
.modal h3 { font-family:var(--fh); color:var(--gold); font-size:1rem; margin-bottom:14px; }
.modal-x { float:right; background:none; border:none; color:var(--txd); font-size:1.2rem; cursor:pointer; }
.modal-ok { margin-top:14px; padding:8px 28px; background:var(--gold); color:var(--bg); border:none; border-radius:var(--r); font-family:var(--fb); cursor:pointer; }
</style>
</head>
<body>

<!-- ================================================================
     SETUP SCREEN
     ================================================================ -->
<div id="setup">
  <h1>CHRONICLE</h1>
  <div class="setup-sub">AI DUNGEON · REBUILT</div>

  <!-- Plot Essentials: Protagonist -->
  <details class="sec" open>
    <summary>主人公（Plot Essentials）</summary>
    <div class="inner">
      <div class="fd"><label>名前</label><input id="s-name" placeholder="リン、魔王、旅人…"></div>
      <div class="fd"><label>説明</label>
        <div class="hint">外見・性格・能力・背景。具体的なほどAIが安定する。</div>
        <textarea id="s-desc" rows="2" placeholder="中性的で美しい見た目の魔王。退屈しのぎに人間界を歩いている。"></textarea>
      </div>
    </div>
  </details>

  <!-- Plot Essentials: World -->
  <details class="sec" open>
    <summary>世界設定（Plot Essentials）</summary>
    <div class="inner">
      <div class="fd"><label>世界観の根幹（1-2文）</label>
        <textarea id="s-world" rows="2" placeholder="日本の大阪。現代だが魔法が密かに存在する世界。"></textarea>
      </div>
      <div class="fd"><label>物語の前提</label>
        <div class="hint">何が起きていて、何が目的か。空欄でもOK。</div>
        <textarea id="s-premise" rows="2" placeholder="魔王は退屈を紛らわすため、人間の街に降りてきた。"></textarea>
      </div>
      <div class="fd"><label>最初のシーン</label>
        <div class="hint">物語の始まりの状況。</div>
        <textarea id="s-scene" rows="2" placeholder="夜の繁華街。ネオンの光が路面を照らしている。"></textarea>
      </div>
    </div>
  </details>

  <!-- Story Cards: NPCs -->
  <details class="sec">
    <summary>Story Cards（NPC登録）</summary>
    <div class="inner">
      <div class="hint">NPCの名前がプレイヤー入力に出たら、自動でAIに設定が注入されます。</div>
      <div id="npc-list"></div>
      <button class="add-btn" onclick="UI.addNpcSetup()">＋ NPCを追加</button>
    </div>
  </details>

  <!-- Author's Note -->
  <details class="sec">
    <summary>Author's Note（文体・雰囲気）</summary>
    <div class="inner">
      <div class="fd"><label>文体</label>
        <select id="s-tone">
          <option value="literary">純文学（五感描写・心理描写・リアリティ重視）</option>
          <option value="dark">ダーク（残酷・生々しい・制限なし）</option>
          <option value="light">ラノベ（軽快・テンポ重視・会話多め）</option>
        </select>
      </div>
      <div class="fd"><label>追加の指示（Author's Note）</label>
        <div class="hint">文体・雰囲気・テンポの細かい指示。空欄OK。Kayraでは効果が限定的。</div>
        <textarea id="s-anote" rows="2" placeholder="会話多め、官能に寄りすぎない、情景描写は丁寧に"></textarea>
      </div>
    </div>
  </details>

  <!-- API -->
  <details class="sec" open>
    <summary>APIキー</summary>
    <div class="inner">
      <div class="fd"><label>NovelAI APIキー</label>
        <input type="password" id="s-key" placeholder="pst-...">
        <div class="hint" style="margin-top:3px"><a href="https://novelai.net/account" target="_blank">novelai.net</a> → 永続的APIトークン</div>
      </div>
    </div>
  </details>

  <button class="go-btn" onclick="Game.start()">物語を始める</button>
</div>

<!-- ================================================================
     GAME SCREEN
     ================================================================ -->
<div id="app">
  <!-- Side Panel -->
  <div class="side" id="side-panel">
    <div class="side-inner">
      <div class="side-head">
        <h2>Chronicle</h2>
        <button class="topbtn" onclick="UI.toggleSide()" style="border:none">✕</button>
      </div>
      <div class="side-tabs">
        <button class="side-tab on" onclick="UI.sideTab('history',this)">履歴</button>
        <button class="side-tab" onclick="UI.sideTab('cards',this)">人物</button>
        <button class="side-tab" onclick="UI.sideTab('world',this)">世界</button>
        <button class="side-tab" onclick="UI.sideTab('memory',this)">記憶</button>
      </div>
      <div class="side-body" id="side-body"></div>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <button class="topbtn" onclick="UI.toggleSide()">☰</button>
      <div class="scene-bar" id="scene-bar">―</div>
      <button class="topbtn" onclick="UI.modal('scene')">✎</button>
      <button class="topbtn" onclick="UI.modal('config')">⚙</button>
    </div>
    <div class="story" id="story"></div>
    <div class="input-area">
      <div class="modes">
        <button class="mode-btn on" onclick="Game.setMode('do',this)">⚔ 行動</button>
        <button class="mode-btn" onclick="Game.setMode('say',this)">💬 発言</button>
        <button class="mode-btn" onclick="Game.setMode('story',this)">📖 描写</button>
      </div>
      <div class="input-row">
        <textarea id="input" placeholder="行動を入力…" rows="1"></textarea>
        <button class="send-btn" id="send-btn" onclick="Game.submit()">▶</button>
      </div>
      <div class="sub-btns">
        <button class="sub-btn" onclick="Game.cont()">続きを書く</button>
        <button class="sub-btn" onclick="Game.retry()">やり直す</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <button class="modal-x" onclick="UI.closeModal()">✕</button>
    <div id="modal-inner"></div>
  </div>
</div>

<!-- ================================================================
     JAVASCRIPT
     ================================================================ -->
<script>
'use strict';

/* ================================================================
   HELPER
   ================================================================ */
const $ = id => document.getElementById(id);
const esc = t => { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; };


/* ================================================================
   MODULE 1: State — 設計書のデータ構造をそのまま実装
   
   AIには渡さない。アプリだけが持つ。
   AIに渡す情報は PromptBuilder が毎回組み立てる。
   ================================================================ */
const State = {
  // --- Plot Essentials（常時AIに渡す最重要情報） ---
  plotEssentials: {
    protagonist: { name: '', desc: '' },
    worldCore: '',      // 世界観の根幹（1-2文）
    storyPremise: '',   // 物語の前提
    rules: []           // 守るべきルール（将来用）
  },

  // --- Story Cards（必要な時だけ注入） ---
  storyCards: [
    // { type:'person', name:'ユカ', aliases:['女の子'],
    //   desc:'怯えた少女', personality:'おどおど', relationship:'魔王を恐れている',
    //   active:false }
  ],

  // --- Memory Summary（中長期記憶） ---
  memorySummary: {
    summary: '',        // 全体の流れの要約
    keyEvents: []       // 重要イベント一覧
  },

  // --- Recent History（直近ターンのみ保持） ---
  recentHistory: [
    // { playerAction:'女の子に声をかける', mode:'do',
    //   narrative:'女の子は振り向いた。', sceneSummary:'女の子と対面' }
  ],

  // --- Author's Note（文体・雰囲気） ---
  authorNote: {
    tone: 'literary',   // literary / dark / light
    customNote: '',     // 自由記述
    pacing: 'normal'    // slow / normal / fast
  },

  // --- Current Scene（今この瞬間の状況） ---
  currentScene: {
    location: '',
    time: '',
    present: [],        // 今いるNPC名
    mood: '',
    summary: ''         // 1-2文の状況要約
  },

  // --- Meta ---
  apiKey: '',
  engine: 'kayra',
  mode: 'do',
  busy: false,
  turnCount: 0,

  // --- 永続化 ---
  save() {
    localStorage.setItem('chr3', JSON.stringify({
      pe: this.plotEssentials,
      sc: this.storyCards,
      ms: this.memorySummary,
      rh: this.recentHistory.slice(-10),
      an: this.authorNote,
      cs: this.currentScene,
      key: this.apiKey,
      eng: this.engine,
      tc: this.turnCount
    }));
  },

  load() {
    try {
      const d = JSON.parse(localStorage.getItem('chr3'));
      if (!d) return false;
      if (d.pe) this.plotEssentials = d.pe;
      if (d.sc) this.storyCards = d.sc;
      if (d.ms) this.memorySummary = d.ms;
      if (d.rh) this.recentHistory = d.rh;
      if (d.an) this.authorNote = d.an;
      if (d.cs) this.currentScene = d.cs;
      this.apiKey = d.key || '';
      this.engine = d.eng || 'kayra';
      this.turnCount = d.tc || 0;
      return this.recentHistory.length > 0;
    } catch { return false; }
  }
};


/* ================================================================
   MODULE 2: PromptBuilder — AIに渡す情報を毎回組み立てる
   
   設計書の「1ターンの処理フロー」③④に対応。
   
   Kayra向けルール：
   - 純粋な日本語散文のみ（英語タグ・メタ指示禁止）
   - 全角字下げで段落開始
   - 主人公名を行動文に必ず含める
   - 「すると、」で終わらせる
   - 合計400-600文字以内
   ================================================================ */
const PromptBuilder = {

  // --- 文体プライミング（authorNote → Kayraが文体を真似る元テキスト） ---
  primer() {
    const name = State.plotEssentials.protagonist.name;
    const desc = State.plotEssentials.protagonist.desc;
    const world = State.plotEssentials.worldCore;

    const tones = {
      literary: [
        `　${world}。空気は重く湿り気を帯びていた。光が揺れ、影が長く伸びる。`,
        `　${name}――${desc}。`,
        `　${name}は足を止め、息を整えた。周囲の気配に意識を向ける。`
      ],
      dark: [
        `　${world}。淀んだ空気が喉に纏わりつく。嫌な臭いが漂っている。`,
        `　${name}――${desc}。`,
        `　${name}は薄暗い空間に目を凝らした。何かが蠢いている。`
      ],
      light: [
        `　${world}。`,
        `　${name}は${desc}。`,
        `　「さて、と」${name}は軽く伸びをした。今日も何かが起きそうだ。`
      ]
    };
    return (tones[State.authorNote.tone] || tones.literary).join('\n');
  },

  // --- Story Card抽出（設計書②：キーワードマッチ） ---
  findRelevantCards(text) {
    if (!text || State.storyCards.length === 0) return [];

    const matched = [];
    for (const card of State.storyCards) {
      // 名前 or エイリアスがテキスト中にあれば抽出
      const keywords = [card.name, ...(card.aliases || [])];
      for (const kw of keywords) {
        if (kw && text.includes(kw)) {
          matched.push(card);
          break;
        }
      }
    }
    // 最大2枚まで（多いとKayraが混乱）
    return matched.slice(0, 2);
  },

  // --- Story Cardを散文に変換（箇条書きにしない！） ---
  cardToText(card) {
    let t = `${card.name}。${card.desc || ''}`;
    if (card.personality) t += `。${card.personality}`;
    // 50文字以内に収める
    return t.length > 50 ? t.slice(0, 50) : t;
  },

  // --- Recent Historyから文脈を組み立て（直近2ターンの最終文だけ） ---
  recentContext() {
    const recent = State.recentHistory.slice(-2);
    let ctx = '';
    for (const turn of recent) {
      if (turn.playerAction) {
        ctx += `${State.plotEssentials.protagonist.name}は${turn.playerAction}した。`;
      }
      if (turn.narrative) {
        // 最終文だけ抽出（全文は渡さない = 汚染防止）
        ctx += this.lastSentence(turn.narrative);
      }
    }
    return ctx;
  },

  // --- ユーザー入力を行動文に変換 + 「すると、」 ---
  formatAction(action, mode) {
    const name = State.plotEssentials.protagonist.name;
    const act = action.trim();

    if (mode === 'say') {
      return `${name}は「${act}」と言った。すると、`;
    }

    // 行動・描写モード共通
    const last = act.slice(-1);
    const dictForm = 'るすくぐむぶつぬ';
    if (dictForm.includes(last))
      return `　${name}は${act}ことにした。すると、`;
    if (act.endsWith('した') || act.endsWith('った') || act.endsWith('いた') || act.endsWith('んだ'))
      return `　${name}は${act}。すると、`;
    if (act.endsWith('て') || act.endsWith('で'))
      return `　${name}は${act}みた。すると、`;
    return `　${name}は${act}した。すると、`;
  },

  // --- メイン：プロンプト組み立て ---
  build(action, mode) {
    let parts = [];

    if (State.turnCount === 0) {
      // ===== 初回：文体プライミング =====
      parts.push(this.primer());
    } else {
      // ===== 2回目以降 =====

      // plotEssentials（世界＋主人公、1行ずつ）
      parts.push(`　${State.plotEssentials.worldCore}。${State.plotEssentials.protagonist.name}は${State.plotEssentials.protagonist.desc}。`);

      // currentScene
      if (State.currentScene.summary) {
        parts.push(State.currentScene.summary);
      }

      // memorySummary（あれば）
      if (State.memorySummary.summary) {
        const mem = State.memorySummary.summary;
        parts.push(mem.length > 80 ? mem.slice(-80) : mem);
      }

      // recentHistory（直近2ターンの最終文）
      const ctx = this.recentContext();
      if (ctx) parts.push(ctx);
    }

    // Story Cards（アクションテキストからキーワードマッチ）
    if (action) {
      const cards = this.findRelevantCards(action);
      // currentScene.presentにいるNPCも追加
      for (const name of State.currentScene.present || []) {
        const card = State.storyCards.find(c => c.name === name);
        if (card && !cards.includes(card)) cards.push(card);
      }
      for (const card of cards.slice(0, 2)) {
        parts.push(this.cardToText(card));
      }
    }

    // ユーザーの行動
    if (action) {
      parts.push(this.formatAction(action, mode));
    }

    // 結合
    let prompt = parts.join('\n');

    // ===== トークン予算チェック（600文字以内） =====
    if (prompt.length > 600) {
      // 古い部分から削る
      prompt = prompt.slice(-600);
      // 文頭を文末で切りそろえる
      const cut = prompt.search(/[。！？」]/);
      if (cut > 0 && cut < 100) prompt = prompt.slice(cut + 1);
    }

    console.log('=== PROMPT ===\n', prompt);
    console.log(`=== PROMPT LENGTH: ${prompt.length} chars ===`);
    return prompt;
  },

  // --- ヘルパー：テキストの最後の完全な文を取得 ---
  lastSentence(text) {
    const parts = text.split(/(?<=[。！？…」』])/);
    const valid = parts.filter(s => s.trim().length > 3);
    return valid.length ? valid[valid.length - 1].trim() : text.slice(-50);
  }
};


/* ================================================================
   MODULE 3: AIEngine — API呼び出し
   
   Kayra / Claude を差し替え可能な構造。
   Phase 1 では Kayra のみ実装。
   ================================================================ */
const AIEngine = {
  PROXY: 'https://novel-proxy.sansan2103.workers.dev',

  async generate(prompt) {
    if (State.engine === 'kayra') return this.kayra(prompt);
    throw new Error('未対応エンジン: ' + State.engine);
  },

  async kayra(prompt) {
    const res = await fetch(this.PROXY, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + State.apiKey
      },
      body: JSON.stringify({
        input: prompt,
        model: 'kayra-v1',
        parameters: {
          max_length: 100,      // 短く＝ループ前に止める
          min_length: 1,
          use_string: true,
          temperature: 0.72,
          top_k: 50,
          top_p: 0.95,
          tail_free_sampling: 0.975,
          repetition_penalty: 1.5,
          repetition_penalty_range: 2048,
          repetition_penalty_slope: 3.33,
          repetition_penalty_frequency: 0.1,
          repetition_penalty_presence: 0.05,
          ban_bracket_generation: true
        }
      })
    });
    if (!res.ok) throw new Error(`API ${res.status}: ${await res.text()}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    console.log('=== RAW OUTPUT ===\n', data.output);
    return data.output || '';
  }
};


/* ================================================================
   MODULE 4: OutputCleaner — AI出力のクリーニング
   
   設計書の「出力の安全策」をすべて実装。
   - HTMLタグ、ルビタグ除去
   - メタテキスト除去
   - フレーズループ検出・除去
   - 文レベル重複除去
   - 文末整形
   ================================================================ */
const Cleaner = {
  clean(raw) {
    let t = raw;

    // HTMLタグ（ルビ含む）
    t = t.replace(/<rubycover>([^<]*)<rubystart>[^<]*<rubyend>/g, '$1');
    t = t.replace(/<[^>]{1,60}>/g, '');

    // メタタグ
    t = t.replace(/\[[^\]]{0,200}\]/g, '');
    t = t.replace(/【[^】]{0,100}】/g, '');
    t = t.replace(/\*{2,}/g, '');

    // Web小説メタ
    t = t.replace(/と、思って(くれた|もらえた)なら.*/gs, '');
    t = t.replace(/(ブクマ|ブックマーク|お気に入り|ポイント|☆|★).*(嬉しい|ください|お願い).*/g, '');
    t = t.replace(/(作者|筆者)から.*/g, '');
    t = t.replace(/.*を選択[。．.]*/g, '');
    t = t.replace(/^.*→.*「.*」.*$/gm, '');

    // 章番号・構造
    t = t.replace(/^\s*\d{1,3}\s*$/gm, '');
    t = t.replace(/^[\s　]*(第\d+|Chapter|Episode|Scene|END|続く|つづく).*$/gim, '');

    // リスト・キャラシート
    t = t.replace(/^[\s　]*(武器|防具|アイテム|スキル|ステータス|HP|MP|名前|年齢|性別|種族|職業|所持|装備)[\s　]*[：:].*/gm, '');
    t = t.replace(/^[\s　]*[-・●▸▹►◆◇★☆※→⇒]+\s*.*/gm, '');
    t = t.replace(/^[\s　]*\d+[\.)）]\s*.*/gm, '');

    // 整理
    t = t.replace(/\n{3,}/g, '\n\n').trim();

    // フレーズループ検出（8文字が3回→2回目で切る）
    t = this.cutLoop(t);

    // 文レベル重複除去
    t = this.dedup(t);

    // 文末で切る
    t = this.cutEnd(t);

    console.log('=== CLEAN OUTPUT ===\n', t);
    return t;
  },

  cutLoop(t) {
    const flat = t.replace(/[\s　\n]/g, '');
    for (let len = 10; len >= 8; len--) {
      for (let i = 0; i <= flat.length - len; i++) {
        const ph = flat.slice(i, i + len);
        const esc = ph.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const m = flat.match(new RegExp(esc, 'g'));
        if (m && m.length >= 3) {
          const pos2 = flat.indexOf(ph, flat.indexOf(ph) + len);
          if (pos2 > 0) {
            let cnt = 0, cp = 0;
            for (let j = 0; j < t.length && cnt < pos2; j++) {
              if (!/[\s　\n]/.test(t[j])) cnt++;
              cp = j;
            }
            t = t.slice(0, cp);
            t = this.cutEnd(t) || t;
          }
          return t;
        }
      }
    }
    return t;
  },

  dedup(t) {
    const parts = t.split(/(?<=[。！？…」』])/);
    const result = [];
    for (const s of parts) {
      const k = s.trim().replace(/[\s　]/g, '');
      if (k.length < 3) continue;
      let dup = false;
      for (const prev of result) {
        const pk = prev.trim().replace(/[\s　]/g, '');
        if (pk.length < 5) continue;
        let common = 0;
        for (let i = 0; i < k.length - 3; i++) {
          if (pk.includes(k.slice(i, i + 4))) common++;
        }
        if (common / Math.max(Math.min(k.length, pk.length) - 3, 1) > 0.5) {
          dup = true; break;
        }
      }
      if (!dup) result.push(s);
    }
    return result.join('');
  },

  cutEnd(t) {
    const i = Math.max(
      t.lastIndexOf('。'), t.lastIndexOf('！'), t.lastIndexOf('？'),
      t.lastIndexOf('…'), t.lastIndexOf('」'), t.lastIndexOf('』')
    );
    if (i > 0 && i < t.length - 1) return t.slice(0, i + 1);
    return t;
  }
};

        UI.addTurn('act', `${label}：${turn.playerAction}`);
      }
      if (turn.narrative) UI.addTurn('nar', 'すると、' + turn.narrative);
    }
    UI.updateScene();
  },

  // --- モード切り替え ---
  setMode(mode, btn) {
    State.mode = mode;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    $('input').placeholder = { do: '行動を入力…', say: '台詞を入力…', story: '展開を描写…' }[mode];
  },

  // --- メイン処理：送信（設計書の①〜⑧） ---
  async submit() {
    if (State.busy) return;
    const inp = $('input');
    const action = inp.value.trim();
    if (!action) return;

    UI.setBusy(true);
    inp.value = '';
    const mode = State.mode;

    // ① 表示
    const label = { do: '行動', say: '発言', story: '描写' }[mode];
    UI.addTurn('act', `${label}：${action}`);
    UI.showLoad();

    try {
      // ②③④ プロンプト組み立て（PromptBuilderが全部やる）
      const prompt = PromptBuilder.build(action, mode);

      // ⑤ AI呼び出し
      const raw = await AIEngine.generate(prompt);

      // ⑥ 出力クリーニング
      let text = Cleaner.clean(raw);
      if (!text || text.length < 5) {
        text = '（生成できませんでした。やり直しを試してください。）';
      }

      UI.hideLoad();

      // ⑧ 表示
      UI.addTurn('nar', 'すると、' + text);

      // ⑦ 状態更新
      const sceneSummary = Cleaner.cutEnd(text).slice(-60);
      State.recentHistory.push({
        playerAction: action, mode, narrative: text, sceneSummary
      });

      // 直近10ターン以上は削除（設計書：recentHistoryは直近のみ保持）
      if (State.recentHistory.length > 10) {
        State.recentHistory = State.recentHistory.slice(-10);
      }

      State.currentScene.summary = sceneSummary;

      // NPCのactive状態を更新（テキストに名前が含まれていたら）
      for (const card of State.storyCards) {
        card.active = text.includes(card.name);
        if (card.active && !State.currentScene.present.includes(card.name)) {
          State.currentScene.present.push(card.name);
        }
      }

      State.turnCount++;
      UI.updateScene();
      State.save();

    } catch (err) {
      UI.hideLoad();
      UI.addTurn('err', 'エラー: ' + err.message);
      console.error(err);
    }

    UI.setBusy(false);
  },

  // --- 続きを書く ---
  async cont() {
    if (State.busy || State.recentHistory.length === 0) return;
    UI.setBusy(true);
    UI.showLoad();
    try {
      const prompt = PromptBuilder.build(null, 'story');
      const raw = await AIEngine.generate(prompt);
      let text = Cleaner.clean(raw);
      if (!text || text.length < 5) text = '（続きを生成できませんでした。）';
      UI.hideLoad();
      UI.addTurn('nar', text);
      State.recentHistory.push({ playerAction: null, mode: 'story', narrative: text, sceneSummary: Cleaner.cutEnd(text).slice(-60) });
      State.currentScene.summary = Cleaner.cutEnd(text).slice(-60);
      State.turnCount++;
      UI.updateScene();
      State.save();
    } catch (err) {
      UI.hideLoad();
      UI.addTurn('err', 'エラー: ' + err.message);
    }
    UI.setBusy(false);
  },

  // --- やり直し ---
  async retry() {
    if (State.busy || State.recentHistory.length === 0) return;
    const area = $('story');
    const turns = area.querySelectorAll('.turn');
    if (turns.length >= 2) {
      turns[turns.length - 1].remove();
      turns[turns.length - 2].remove();
    }
    const last = State.recentHistory.pop();
    State.turnCount = Math.max(0, State.turnCount - 1);
    if (last?.playerAction) {
      $('input').value = last.playerAction;
      State.mode = last.mode || 'do';
      await this.submit();
    }
  }
};


/* ================================================================
   KEYBOARD & AUTO-RESIZE
   ================================================================ */
$('input')?.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); Game.submit(); }
});
$('input')?.addEventListener('input', function () {
  this.style.height = '42px';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});


/* ================================================================
   INIT
   ================================================================ */
(function init() {
  const hasData = State.load();

  if (hasData && State.apiKey) {
    Game.resume();
  } else {
    // 保存済みの設定をフォームに復元
    const pe = State.plotEssentials;
    if (pe.protagonist.name) $('s-name').value = pe.protagonist.name;
    if (pe.protagonist.desc) $('s-desc').value = pe.protagonist.desc;
    if (pe.worldCore) $('s-world').value = pe.worldCore;
    if (pe.storyPremise) $('s-premise').value = pe.storyPremise;
    if (State.currentScene.summary) $('s-scene').value = State.currentScene.summary;
    if (State.authorNote.tone) $('s-tone').value = State.authorNote.tone;
    if (State.authorNote.customNote) $('s-anote').value = State.authorNote.customNote;
    if (State.apiKey) $('s-key').value = State.apiKey;
    for (const card of State.storyCards) {
      UI.addNpcSetup(card.name, card.desc);
    }
  }
})();
</script>
</body>
