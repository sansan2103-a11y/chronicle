<script>
/* === PATCH: quality-fixes-v5 === */
(function(){
  console.log("[Patch v5] loading native-card cleanup + onomatopoeia + serial pollinations");
  /* ===== Helper: hero/npc detection (re-derived since v4 funcs are inner-scope) ===== */
  function getHero(){
    var inp = document.getElementById("cfgHeroName");
    if (inp && inp.value) return inp.value.trim();
    var heroCard = document.querySelector(".hero-card .name, .hero-card [class*=name], [class*=hero] [class*=name]");
    if (heroCard && heroCard.textContent) return heroCard.textContent.trim();
    try {
      for (var i=0; i<localStorage.length; i++){
        var v = localStorage.getItem(localStorage.key(i));
        if (v && v.indexOf(\"hero\") >= 0) {
          var m = v.match(/\"hero\"\s*:\s*\{[^}]*\"name\"\s*:\s*\"([^\"]+)\"/);
          if (m) return m[1];
        }
      }
    } catch(e){}
    return null;
  }
  function getNpcs(){
    var names = [];
    document.querySelectorAll(".npc-card .name, .npc-card [class*=name], [id*=npc][id*=name]").forEach(function(el){
      var v = el.value || el.textContent;
      if (v && v.length > 1 && v.length < 30 && names.indexOf(v.trim()) < 0) names.push(v.trim());
    });
    try {
      for (var i=0; i<localStorage.length; i++){
        var v = localStorage.getItem(localStorage.key(i));
        if (v && v.indexOf(\"npcs\") >= 0) {
          var rx = /\"name\"\s*:\s*\"([^\"]+)\"/g, m;
          while ((m = rx.exec(v)) !== null){
            if (m[1].length > 1 && m[1].length < 30 && names.indexOf(m[1]) < 0) names.push(m[1]);
          }
        }
      }
    } catch(e){}
    return names;
  }
  function findNarrPanel(){
    var hdrs = Array.from(document.querySelectorAll("h1,h2,h3,h4,div,span"));
    var lp = null;
    for (var i=0;i<hdrs.length;i++){
      if (hdrs[i].textContent && hdrs[i].textContent.indexOf("会話ログ") >= 0 && hdrs[i].children.length === 0) {
        lp = hdrs[i].closest("section,aside,div,article");
        break;
      }
    }
    var sections = Array.from(document.querySelectorAll("section,aside,div,article"));
    for (var j=0;j<sections.length;j++){
      if (sections[j] !== lp && sections[j].textContent.length > 200 && sections[j].textContent.indexOf("会話ログ") < 0 && sections[j].textContent.indexOf("設定") < 0) return sections[j];
    }
    return null;
  }
  /* ===== 1. NATIVE CARD CLEANUP ===== */
  function findCorrectSpeaker(quote, npcs){
    var np = findNarrPanel();
    if (!np) return null;
    var nt = np.innerText || "";
    var qIdx = nt.indexOf(quote.slice(0,Math.min(30,quote.length)));
    if (qIdx === -1) return null;
    /* Search narrative around the quote for a clear attribution */
    var afterWindow = nt.slice(qIdx, Math.min(nt.length, qIdx+200));
    /* Pattern: NAME(の声|は|が|と|...) right after the quote */
    var rxAfter = /」\s*([^\s「」、。\n]{2,15})(?:の声|の言葉|は|が|と)/;
    var m = afterWindow.match(rxAfter);
    if (m) {
      for (var i=0;i<npcs.length;i++) if (m[1].indexOf(npcs[i].split(/[\s・]/)[0]) >=0 || npcs[i].indexOf(m[1]) >=0) return npcs[i];
      if (npcs.indexOf(m[1]) < 0) return m[1];
    }
    /* Fallback: last NPC mentioned in 200 chars before quote */
    var beforeWindow = nt.slice(Math.max(0, qIdx-300), qIdx);
    var lastPos = -1, lastName = null;
    for (var k=0;k<npcs.length;k++){
      var p = beforeWindow.lastIndexOf(npcs[k]);
      if (p > lastPos) { lastPos = p; lastName = npcs[k]; }
    }
    return lastName;
  }
  function isOnomatopoeia(text){
    /* screams / cries / non-verbal */
    if (/^[あいうえおっーァィゥェォッーaeiouギャキャウァひぃ!！　\s\?？]+$/i.test(text.trim())) return true;
    if (/^[ぐだグダ]ぁ?ぁ*[ーぁ]*[っぁ]?$/.test(text.trim())) return true;
    /* Allow if many same-char repeated (scream) */
    var clean = text.replace(/[ーァぁ\s]/g, "");
    if (clean.length >= 2 && /^(.)\1{2,}$/.test(clean)) return true;
    return false;
  }
  function fixNativeCards(){
    var hero = getHero();
    var npcs = getNpcs();
    if (!hero) return;
    var heroFirst = hero.split(/[\s・]/)[0];
    var heroVoc = new RegExp("^\\s*" + heroFirst + "[、。・!！\\?？\\s]|" + heroFirst + "[、\\s「」]");
    document.querySelectorAll(".dialogue-row").forEach(function(row){
      if (row.dataset._v5done === "1") return;
      var nameEl = row.querySelector(".dialogue-name");
      var textEl = row.querySelector(".dialogue-text");
      if (!nameEl || !textEl) return;
      var speaker = (nameEl.textContent||"").trim();
      var dialogue = (textEl.textContent||"").trim().replace(/^[「『《」』》]+|[「『《」』》]+$/g, "");
      var attribIsHero = (speaker === hero) || (speaker.split(/[\s・]/)[0] === heroFirst);
      if (!attribIsHero) return;
      /* Bad if hero name appears as vocative inside dialogue */
      var isVocative = heroVoc.test(dialogue) || dialogue.indexOf(heroFirst) >= 0 && !dialogue.startsWith(heroFirst+"は") && !dialogue.startsWith(heroFirst+"が");
      var isScream = isOnomatopoeia(dialogue);
      if (isVocative || isScream) {
        var correct = findCorrectSpeaker(dialogue, npcs) || (npcs.length > 0 ? npcs[0] : null);
        if (correct && correct !== hero) {
          nameEl.textContent = correct;
          row.style.borderLeft = "3px solid #d4b375";
          row.dataset._v5done = "1";
          row.title = "v5: " + hero + " → " + correct;
          /* Update avatar to horror SVG for the corrected speaker */
          var img = row.querySelector("img");
          if (img && window._horrorSvg) {
            img.src = window._horrorSvg(correct);
          }
          console.log("[Patch v5] re-attributed:", hero, "→", correct, "|", dialogue.slice(0,30));
        } else {
          /* Can\u0027t determine - mark uncertain */
          nameEl.textContent = "(話者不明)";
          nameEl.style.color = "#888";
          row.dataset._v5done = "1";
          console.log("[Patch v5] could not re-attribute:", dialogue.slice(0,30));
        }
      } else {
        row.dataset._v5done = "1";
      }
    });
  }
  /* ===== 2. EXTRACT MISSING SCREAMS/ONOMATOPOEIA from narrative ===== */
  function extractScreams(){
    var np = findNarrPanel();
    var lp = null;
    var hdrs = Array.from(document.querySelectorAll("h1,h2,h3,h4,div,span"));
    for (var i=0;i<hdrs.length;i++){
      if (hdrs[i].textContent && hdrs[i].textContent.indexOf("会話ログ") >= 0 && hdrs[i].children.length === 0) {
        lp = hdrs[i].closest("section,aside,div,article");
        break;
      }
    }
    if (!np || !lp) return;
    var nt = np.innerText || "";
    var npcs = getNpcs();
    /* Find scream patterns: ああ+, ぎゃあ+, きゃー+, etc. */
    var screamRx = /([あいうえァィゥェギャキャぐぁグァ][あいうえーァィゥェぁグぐだダ]{3,})/g;
    var lp_dl = lp.querySelector(".dialogue-list") || lp;
    var added = 0;
    var m;
    while ((m = screamRx.exec(nt)) !== null && added < 5) {
      var scream = m[1];
      var pos = m.index;
      /* Find closest NPC */
      var lastPos = -1, lastNpc = null;
      for (var k=0;k<npcs.length;k++){
        var p = nt.lastIndexOf(npcs[k], pos);
        if (p > lastPos && pos - p < 400) { lastPos = p; lastNpc = npcs[k]; }
      }
      if (!lastNpc) continue;
      /* Check if already in log */
      var key = lastNpc + "::" + scream.slice(0,20);
      if (lp.querySelector('[data-v5scream="'+key.replace(/"/g,'\\"')+'"]')) continue;
      var existingTexts = Array.from(lp.querySelectorAll(".dialogue-text, .dial-card-v4")).map(function(el){return el.textContent;});
      if (existingTexts.some(function(t){return t.indexOf(scream.slice(0,15)) >= 0;})) continue;
      /* Inject card */
      var card = document.createElement("div");
      card.className = "dialogue-row v5-scream";
      card.dataset.v5scream = key;
      card.style.cssText = "display:flex;gap:10px;padding:10px 12px;margin:8px 6px;background:rgba(80,30,30,0.45);border:1px solid rgba(229,115,115,0.4);border-radius:6px;align-items:flex-start;";
      var avatar = document.createElement("img");
      avatar.src = window._horrorSvg(lastNpc);
      avatar.style.cssText = "width:44px;height:44px;border-radius:50%;flex-shrink:0;";
      avatar.alt = lastNpc;
      var body = document.createElement("div");
      body.style.cssText = "flex:1;color:#f2eef9;";
      var nameEl = document.createElement("div");
      nameEl.style.cssText = "font-weight:bold;color:#e57373;font-size:13px;margin-bottom:3px;";
      nameEl.textContent = lastNpc + " （悲鳴）";
      var textEl = document.createElement("div");
      textEl.style.cssText = "font-size:14px;line-height:1.55;font-style:italic;";
      textEl.textContent = scream;
      body.appendChild(nameEl);
      body.appendChild(textEl);
      card.appendChild(avatar);
      card.appendChild(body);
      lp_dl.appendChild(card);
      added++;
    }
  }
  /* ===== 3. SERIALIZE POLLINATIONS REQUESTS WITH SEED ===== */
  var _origFetch5 = window.fetch;
  var _pollQueue = [];
  var _pollProcessing = false;
  function processQueue(){
    if (_pollQueue.length === 0) { _pollProcessing = false; return; }
    _pollProcessing = true;
    var task = _pollQueue.shift();
    _origFetch5(task.url, task.opts).then(function(r){ task.resolve(r); }).catch(function(e){ task.reject(e); });
    setTimeout(processQueue, 2500);  /* 2.5s delay between requests */
  }
  window.fetch = function(u, o){
    var url = String(u||"");
    if (url.indexOf("pollinations.ai") >= 0) {
      /* Add seed for stable cache */
      var seedUrl = url;
      if (url.indexOf("seed=") < 0 && url.indexOf("?") < 0) {
        var hashSeed = 0;
        for (var i=0;i<url.length;i++) hashSeed = (hashSeed*31 + url.charCodeAt(i)) & 0xfffffff;
        seedUrl = url + "?seed=" + (hashSeed % 100000);
      }
      return new Promise(function(resolve, reject){
        _pollQueue.push({url: seedUrl, opts: o, resolve: resolve, reject: reject});
        if (!_pollProcessing) processQueue();
      });
    }
    return _origFetch5.apply(this, arguments);
  };
  console.log("[Patch v5] pollinations serialized with seed");
  /* ===== Run loops ===== */
  setInterval(function(){
    try { fixNativeCards(); } catch(e){ console.warn("v5 fix err", e); }
    try { extractScreams(); } catch(e){ console.warn("v5 scream err", e); }
  }, 2000);
  setTimeout(fixNativeCards, 500);
  setTimeout(extractScreams, 700);
  console.log("[Patch v5] all loaded");
})();
</script>
<script>
/* === PATCH: quality-fixes-v6 === */
(function(){
  console.log("[Patch v6] loading FLUX image gen + inner-thought log + refusal recovery");
  /* ===== Helpers (recreate getHero/getNpcs since v5 are inner scope) ===== */
  function getApiKey(){
    var inp = document.getElementById("cfgOrKey") || document.getElementById("cfgApiKey");
    if (inp && inp.value) return inp.value.trim();
    try {
      for (var i=0; i<localStorage.length; i++){
        var v = localStorage.getItem(localStorage.key(i));
        if (v && /sk-or-[a-zA-Z0-9-]{20,}/.test(v)) {
          var m = v.match(/sk-or-[a-zA-Z0-9-]{20,}/);
          if (m) return m[0];
        }
      }
    } catch(e){}
    return null;
  }
  function getImgProvider(){
    var stored = localStorage.getItem("_imgProvider_v6");
    return stored || "pollinations";
  }
  function setImgProvider(v){
    localStorage.setItem("_imgProvider_v6", v);
  }
  /* ===== 1. Settings UI: image provider toggle ===== */
  function injectImgProviderUI(){
    if (document.getElementById("v6-img-provider")) return;
    /* Find a place inside settings modal to inject */
    var modal = document.getElementById("settingsModal") || document.querySelector(".settings-modal, [class*=settings-modal]");
    if (!modal) {
      /* Maybe settings is a panel */
      var hdr = Array.from(document.querySelectorAll("h2, h3, h4")).find(function(e){return e.textContent && e.textContent.indexOf("設定") >= 0;});
      if (hdr) modal = hdr.closest("div,section");
    }
    if (!modal) return;
    /* Find a logical anchor: model dropdown */
    var anchor = document.getElementById("cfgOrModel");
    if (!anchor) return;
    var anchorRow = anchor.closest("div, label, fieldset") || anchor.parentElement;
    if (!anchorRow) return;
    var wrap = document.createElement("div");
    wrap.id = "v6-img-provider";
    wrap.style.cssText = "margin:14px 0;padding:12px;background:rgba(40,28,68,0.4);border-radius:6px;border-left:3px solid #d4b375;";
    wrap.innerHTML = 
      '<div style="font-weight:bold;color:#d4b375;margin-bottom:8px;font-size:13px;">アバター画像生成プロバイダ</div>' +
      '<label style="display:block;margin:6px 0;cursor:pointer;color:#f2eef9;font-size:13px;"><input type="radio" name="v6img" value="pollinations" style="margin-right:8px;"> Pollinations（無料・不安定・429頻発）</label>' +
      '<label style="display:block;margin:6px 0;cursor:pointer;color:#f2eef9;font-size:13px;"><input type="radio" name="v6img" value="flux-klein" style="margin-right:8px;"> <strong style="color:#a08af0;">FLUX.2 Klein（推奨・約1〜2円/枚・安定）</strong></label>' +
      '<label style="display:block;margin:6px 0;cursor:pointer;color:#f2eef9;font-size:13px;"><input type="radio" name="v6img" value="svg-only" style="margin-right:8px;"> ホラーSVGのみ（完全無料・絵柄シンプル）</label>' +
      '<div style="font-size:11px;color:#888;margin-top:8px;">FLUX選択時は OpenRouter のクレジットを使用します。$1で約100枚生成可能。キャッシュ機能で同じキャラは初回のみ課金。</div>';
    anchorRow.parentElement.insertBefore(wrap, anchorRow.nextSibling);
    /* Set current value */
    var current = getImgProvider();
    var radios = wrap.querySelectorAll('input[name="v6img"]');
    radios.forEach(function(r){
      if (r.value === current) r.checked = true;
      r.addEventListener("change", function(){ if (this.checked) setImgProvider(this.value); });
    });
  }
  setTimeout(injectImgProviderUI, 800);
  setInterval(injectImgProviderUI, 3000);  /* re-inject if settings re-renders */
  /* ===== 2. FLUX Klein fetcher ===== */
  function callFlux(prompt, apiKey){
    return fetch("https://openrouter.ai/api/v1/chat/completions", {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + apiKey,
        "Content-Type": "application/json",
        "HTTP-Referer": location.origin,
        "X-Title": "Chronicle TRPG"
      },
      body: JSON.stringify({
        model: "black-forest-labs/flux.2-klein-4b",
        modalities: ["image", "text"],
        messages: [{ role: "user", content: prompt }]
      })
    }).then(function(r){
      if (!r.ok) throw new Error("FLUX HTTP " + r.status);
      return r.json();
    }).then(function(data){
      /* Parse base64 image from response */
      var img = null;
      if (data.choices && data.choices[0]) {
        var msg = data.choices[0].message;
        if (msg.images && msg.images.length > 0) {
          img = msg.images[0].image_url ? msg.images[0].image_url.url : msg.images[0];
        } else if (msg.content) {
          /* sometimes content has data:image URL embedded */
          var m = String(msg.content).match(/data:image\/[a-z]+;base64,[A-Za-z0-9+\/=]+/);
          if (m) img = m[0];
        }
      }
      if (!img) throw new Error("FLUX response had no image");
      /* Convert data URL to blob to Response */
      var match = img.match(/^data:(image\/[a-z]+);base64,(.+)$/);
      if (!match) throw new Error("Bad image format");
      var bin = atob(match[2]);
      var arr = new Uint8Array(bin.length);
      for (var i=0; i<bin.length; i++) arr[i] = bin.charCodeAt(i);
      var blob = new Blob([arr], {type: match[1]});
      return new Response(blob, {status: 200, headers: {"Content-Type": match[1]}});
    });
  }
  /* ===== 3. Hook fetch to redirect Pollinations -> FLUX when selected ===== */
  var _origFetch6 = window.fetch;
  window.fetch = function(u, o){
    var url = String(u||"");
    if (url.indexOf("pollinations.ai") >= 0) {
      var provider = getImgProvider();
      if (provider === "svg-only") {
        var seed = url.split("/prompt/")[1] || url;
        var svg = window._horrorSvg(decodeURIComponent(String(seed).slice(0,30)));
        var rawSvg = decodeURIComponent(svg.replace("data:image/svg+xml;utf8,", ""));
        var blob = new Blob([rawSvg], {type: "image/svg+xml"});
        return Promise.resolve(new Response(blob, {status: 200, headers: {"Content-Type": "image/svg+xml"}}));
      }
      if (provider === "flux-klein") {
        var apiKey = getApiKey();
        if (!apiKey) {
          console.warn("[Patch v6] FLUX selected but no API key - falling back to Pollinations");
          return _origFetch6.apply(this, arguments);
        }
        /* Extract prompt from Pollinations URL */
        var promptMatch = url.match(/\/prompt\/([^?]+)/);
        if (!promptMatch) return _origFetch6.apply(this, arguments);
        var rawPrompt = decodeURIComponent(promptMatch[1]);
        /* Augment prompt for FLUX (it needs more explicit instruction) */
        var fluxPrompt = "Generate an anime-style ornate frame portrait. " + rawPrompt + ". Output: a single high-quality image.";
        console.log("[Patch v6] FLUX request:", fluxPrompt.slice(0,80));
        return callFlux(fluxPrompt, apiKey).catch(function(err){
          console.warn("[Patch v6] FLUX failed, falling back to Pollinations:", err.message);
          return _origFetch6.apply(window, [u, o]);
        });
      }
      /* default: pollinations */
    }
    return _origFetch6.apply(this, arguments);
  };
  console.log("[Patch v6] image-provider router installed");
  /* ===== 4. NPC inner thoughts -> conversation log ===== */
  function findLogPanelV6(){
    var hdrs = Array.from(document.querySelectorAll("h1,h2,h3,h4,div,span"));
    for (var i=0;i<hdrs.length;i++){
      if (hdrs[i].textContent && hdrs[i].textContent.indexOf("会話ログ") >= 0 && hdrs[i].children.length === 0) {
        var p = hdrs[i].closest("section,aside,div,article");
        if (p && p.querySelectorAll("img").length >= 0) return p;
      }
    }
    return null;
  }
  function findNarrPanelV6(){
    var lp = findLogPanelV6();
    var sections = Array.from(document.querySelectorAll("section,aside,div,article"));
    for (var j=0;j<sections.length;j++){
      if (sections[j] !== lp && sections[j].textContent.length > 200 && sections[j].textContent.indexOf("会話ログ") < 0 && sections[j].textContent.indexOf("設定") < 0) return sections[j];
    }
    return null;
  }
  function syncInnerThoughts(){
    var lp = findLogPanelV6();
    var np = findNarrPanelV6();
    if (!lp || !np) return;
    /* Find inner thought elements (cards with class containing inner-thought) */
    var innerCards = np.querySelectorAll(".inner-thought-card, [class*=inner-thought], [class*=innerthought]");
    var lp_dl = lp.querySelector(".dialogue-list") || lp;
    innerCards.forEach(function(card){
      if (card.dataset._v6synced === "1") return;
      var text = card.innerText || card.textContent || "";
      if (!text || text.length < 3) return;
      /* Try to identify speaker - look for NAME: prefix or get last NPC */
      var speaker = "(内心)";
      var m = text.match(/^([^:：\s]{1,15})[:：]/);
      if (m) {
        speaker = m[1];
        text = text.slice(m[0].length).trim();
      }
      var key = speaker + "::内心::" + text.slice(0,40);
      if (lp.querySelector('[data-v6inner="' + key.replace(/"/g, '\\"').slice(0,200) + '"]')) { card.dataset._v6synced = "1"; return; }
      var newCard = document.createElement("div");

(function(){

  function extractPhrases(text, minLen, maxPhrases){
    /* Split into Japanese sentence-like chunks and pick distinctive 5-12 char phrases */
    var chunks = String(text||"").split(/[。、！？!?\s「」『』《》]/g);
    var phrases = [];
    chunks.forEach(function(c){
      c = c.trim();
      if (c.length >= minLen && c.length <= 30) phrases.push(c);
    });
    /* Dedup */
    var uniq = [];
    var seen = {};
    phrases.forEach(function(p){ if (!seen[p]) { seen[p]=1; uniq.push(p); } });
    return uniq.slice(0, maxPhrases);
  }
  var _origFetch16 = window.fetch;
  window.fetch = function(u, o){
    var url = String(u||"");
    if (url.indexOf("openrouter.ai") >= 0 && url.indexOf("/chat/completions") >= 0 && o && o.body) {

      }
      if (!np) return;
      var text = np.innerText || "";

    var c = JSON.parse(localStorage.getItem("chr6") || "{}");
    var ch = isHero ? (c.cast && c.cast.hero) : null;
    if (!isHero) {
      /* Find NPC by name match */
      var nm = nameInp.value;
      if (c.cast && c.cast.npcs) ch = c.cast.npcs.find(function(n){return n.name === nm;});
    }
    var current = (ch && ch.gender) || (ch && detectGender(ch.desc)) || (ch && pickByHash(ch.name||"x")) || "男性";
    sel.value = current;
    /* Save on change */
    sel.addEventListener("change", function(){
      try {
        var cc = JSON.parse(localStorage.getItem("chr6") || "{}");
        if (isHero && cc.cast && cc.cast.hero) {
          cc.cast.hero.gender = sel.value;
          /* Clear avatar so it regens with new gender */
          cc.cast.hero.avatar = "";
        } else if (!isHero && cc.cast && cc.cast.npcs) {
          var nm = nameInp.value;
          var n = cc.cast.npcs.find(function(x){return x.name === nm;});
          if (n) { n.gender = sel.value; n.avatar = ""; }
        }
        localStorage.setItem("chr6", JSON.stringify(cc));
        console.log("[Patch v28] gender set:", isHero ? "hero" : nameInp.value, "→", sel.value);
      } catch(e){}
    });
    row.appendChild(lbl);
    row.appendChild(sel);
    /* Insert after name input wrapper */
    if (anchor.nextSibling) anchor.parentNode.insertBefore(row, anchor.nextSibling);
    else anchor.parentNode.appendChild(row);
  }
  function injectAll(){
    /* Hero card */
    var heroCard = document.querySelector(".hero-card, [class*=hero-card]");
    if (!heroCard) {
      var heroNameInp = document.getElementById("cfgHName");
      if (heroNameInp) heroCard = heroNameInp.closest("div") || heroNameInp.parentElement;
    }
    if (heroCard) injectGenderSelect(heroCard, true);
    /* NPC cards */
    document.querySelectorAll(".npc-card, [class*=npc-card]").forEach(function(card){
      injectGenderSelect(card, false);
    });
  }
  setInterval(injectAll, 2500);
  setTimeout(injectAll, 1000);
  /* Sync explicit gender into desc on save (so prompts can use it) */
  function syncGenderToDesc(){
    try {
      var c = JSON.parse(localStorage.getItem("chr6") || "{}");
      var changed = false;
      function ensure(ch){
        if (!ch || !ch.gender || !ch.desc) return false;
        var hasField = /性別[:：]\s*(男性|女性)/.test(ch.desc);
        if (!hasField) {
          ch.desc = "性別: " + ch.gender + "。 " + ch.desc;
          return true;
        }
        /* If gender field exists but disagrees, fix it */
        var declared = ch.desc.match(/性別[:：]\s*(男性|女性)/);
        if (declared && declared[1] !== ch.gender) {
          ch.desc = ch.desc.replace(/性別[:：]\s*(男性|女性)。?\s*/, "性別: " + ch.gender + "。 ");
          ch.avatar = "";  /* regen avatar */
          return true;
        }
        return false;
      }
      if (c.cast && c.cast.hero && ensure(c.cast.hero)) changed = true;
      (c.cast && c.cast.npcs ? c.cast.npcs : []).forEach(function(n){if (ensure(n)) changed = true;});
      if (changed) localStorage.setItem("chr6", JSON.stringify(c));
    } catch(e){}
  }
  setInterval(syncGenderToDesc, 2000);
  /* Inject gender directive to OpenRouter system prompt */
  var _origFetch28 = window.fetch;
  window.fetch = function(u, o){
    var url = String(u||"");
    if (url.indexOf("openrouter.ai") >= 0 && url.indexOf("/chat/completions") >= 0 && o && o.body) {
      try {
        var body = typeof o.body === "string" ? JSON.parse(o.body) : null;
        if (body && body.messages && !body._v28Inj) {
          var c = JSON.parse(localStorage.getItem("chr6") || "{}");
          var directives = [];
          if (c.cast && c.cast.hero && c.cast.hero.gender) {
            directives.push(c.cast.hero.name + " (主人公) は明確に「" + c.cast.hero.gender + "」。性別を曖昧にしない。");
          }
          (c.cast && c.cast.npcs ? c.cast.npcs : []).forEach(function(n){
            if (n.gender) directives.push(n.name + " (NPC) は明確に「" + n.gender + "」。性別を曖昧にしない。");
          });
          if (directives.length > 0) {
            body.messages.push({
              role: "system",
              content: "【★キャラクター性別固定★】各キャラの性別は以下に固定。文中で性別を曖昧化・両性化・取り違える表現を絶対禁止：\n" + directives.map(function(d){return "・" + d;}).join("\n")
            });
          }
          /* Also add NPC name fixed-list directive */
          var allNames = [];
          if (c.cast && c.cast.hero) allNames.push(c.cast.hero.name);
          (c.cast && c.cast.npcs ? c.cast.npcs : []).forEach(function(n){if(n.name)allNames.push(n.name);});
          if (allNames.length > 0) {
            body.messages.push({
              role: "system",
              content: "【★キャラクター名固定★】登場キャラの名前は以下のリストから動かさない。表記ゆれ（ミラ→ミリア等の音変化、文字差し替え）絶対禁止：\n" + allNames.map(function(n){return "・" + n;}).join("\n")
            });
          }
          body._v28Inj = true;
          o.body = JSON.stringify(body);
        }
      } catch(e){}
    }
    return _origFetch28.apply(this, arguments);
  };
  console.log("[Patch v28] all loaded");
})();
</script>
<script>
/* PATCH: quality-fixes-v29 (fix v28 misplaced gender selects) */
(function(){
  console.log("[Patch v29] loading: rebuild gender selects with proper DOM targeting");
  var SELECT_STYLE = "background:rgba(40,28,68,0.6);color:#f2eef9;border:1px solid rgba(160,138,240,0.4);border-radius:4px;padding:4px 8px;font-size:13px;margin-left:6px;cursor:pointer;";
  var LABEL_STYLE = "color:#a08af0;font-size:13px;font-weight:bold;margin-right:4px;";
  /* (1) Clean up all v28 rows first */
  function cleanupV28(){
    document.querySelectorAll(".v28-gender-row").forEach(function(r){r.remove();});
  }
  setInterval(cleanupV28, 1500);
  setTimeout(cleanupV28, 200);
  /* (2) Detect gender from desc */
  function detectGender(desc){
    if (!desc) return null;
    if (/性別[:：]?\s*男性|少年|男子|男の子/.test(desc)) return "男性";
    if (/性別[:：]?\s*女性|少女|女子|女の子/.test(desc)) return "女性";
    return null;
  }
  function pickByHash(name){
    var h = 0;
    for (var i=0; i<name.length; i++) h = (h*31 + name.charCodeAt(i)) & 0xffff;
    return (h % 2 === 0) ? "女性" : "男性";
  }
  /* (3) Inject gender select with EXACT DOM targeting */
  function buildSelect(currentValue, onChange){
    var row = document.createElement("div");
    row.className = "v29-gender-row";
    row.style.cssText = "margin:8px 0;display:flex;align-items:center;gap:6px;";
    var lbl = document.createElement("span");
    lbl.style.cssText = LABEL_STYLE;
    lbl.textContent = "性別:";
    var sel = document.createElement("select");
    sel.style.cssText = SELECT_STYLE;
    sel.innerHTML = '<option value="男性">男性</option><option value="女性">女性</option>';
    sel.value = currentValue;
    sel.addEventListener("change", function(){onChange(sel.value);});
    row.appendChild(lbl);
    row.appendChild(sel);
    return row;
  }
  function injectHeroGender(){
    var heroNameInp = document.getElementById("cfgHName");
    if (!heroNameInp) return;
    /* Check if already injected nearby */
    var heroSection = heroNameInp.closest('[class*="hero"], section, fieldset') || heroNameInp.parentElement.parentElement;
    if (!heroSection) return;
    if (heroSection.querySelector(".v29-gender-row")) return;
    /* Get current gender */
    var c = JSON.parse(localStorage.getItem("chr6") || "{}");
    var hero = c.cast && c.cast.hero;
    var current = (hero && hero.gender) || (hero && detectGender(hero.desc)) || (hero && pickByHash(hero.name||"x")) || "男性";
    var row = buildSelect(current, function(val){
      try {
        var cc = JSON.parse(localStorage.getItem("chr6") || "{}");
        if (!cc.cast) cc.cast = {};
        if (!cc.cast.hero) cc.cast.hero = {};
        cc.cast.hero.gender = val;
        cc.cast.hero.avatar = "";
        localStorage.setItem("chr6", JSON.stringify(cc));
        console.log("[Patch v29] hero gender:", val);
      } catch(e){}
    });
    /* Insert directly after the name input wrapper */
    var nameWrap = heroNameInp.closest("div, label") || heroNameInp.parentElement;
    if (nameWrap && nameWrap.parentElement) {
      nameWrap.parentElement.insertBefore(row, nameWrap.nextSibling);
    }
  }
  function injectNpcGender(card){
    if (!card || card.querySelector(".v29-gender-row")) return;
    /* NPC card has a name input as first input */
    var nameInp = card.querySelector('input[type=text], input:not([type])');
    if (!nameInp) return;
    var c = JSON.parse(localStorage.getItem("chr6") || "{}");
    var nm = nameInp.value;
    var npc = (c.cast && c.cast.npcs) ? c.cast.npcs.find(function(n){return n.name === nm;}) : null;
    var current = (npc && npc.gender) || (npc && detectGender(npc.desc)) || (npc && pickByHash(npc.name||"x")) || (nm && pickByHash(nm)) || "男性";
    var row = buildSelect(current, function(val){
      try {
        var cc = JSON.parse(localStorage.getItem("chr6") || "{}");
        var nm2 = nameInp.value;
        var n = (cc.cast && cc.cast.npcs) ? cc.cast.npcs.find(function(x){return x.name === nm2;}) : null;
        if (n) { n.gender = val; n.avatar = ""; }
        localStorage.setItem("chr6", JSON.stringify(cc));
        console.log("[Patch v29] npc " + nm2 + " gender:", val);
      } catch(e){}
    });
    /* Insert directly after name input wrapper, INSIDE the card */
    var nameWrap = nameInp.closest("div, label") || nameInp.parentElement;
    if (nameWrap && nameWrap.parentElement && card.contains(nameWrap.parentElement)) {
      nameWrap.parentElement.insertBefore(row, nameWrap.nextSibling);
    } else {
      card.insertBefore(row, card.firstChild);
    }
  }
  function injectAll(){
    /* Clean stale v29 rows that lost their context (parent removed/changed) */
    document.querySelectorAll(".v29-gender-row").forEach(function(r){
      var sel = r.querySelector("select");
      if (!sel) { r.remove(); return; }
      /* Verify still valid context: name input nearby */
      var parent = r.parentElement;
      if (!parent || !parent.querySelector('input[type=text], input:not([type])')) {
        r.remove();
      }
    });
    injectHeroGender();
    /* Only target proper .npc-card class, NOT [class*=npc-card] which is too broad */
    document.querySelectorAll(".npc-card").forEach(function(card){
      injectNpcGender(card);
    });
  }
  setInterval(injectAll, 2000);
  setTimeout(injectAll, 600);
  setTimeout(injectAll, 1500);
  console.log("[Patch v29] all loaded");
})();
</script>

<script>
/* ========================================================================
 * v30: Big settings UI cleanup (7-item simplification)
 * Hide rarely-used / overlapping fields to reduce bug surface.
 * ======================================================================== */
(function v30Cleanup(){
  var TAG = '[v30]';

  if (!document.getElementById('v30-style')) {
    var st = document.createElement('style');
    st.id = 'v30-style';
    st.textContent =
      '.v30-hide{display:none !important}\n' +
      '.v30-debug-bar{display:flex;flex-direction:column;gap:6px;padding:8px;background:rgba(160,138,240,.06);border:1px solid var(--border);border-radius:8px;margin-top:6px}\n' +
      '.v30-debug-bar button{font-size:12px;padding:6px 8px}\n';
    document.head.appendChild(st);
  }

  function hideFldOf(el){
    if (!el) return;
    var p = el.closest ? el.closest('.fld, .chk-row') : null;
    if (!p && el.parentElement) p = el.parentElement;
    if (p) p.classList.add('v30-hide');
  }
  function hideById(id){ hideFldOf(document.getElementById(id)); }

  function hideProvider(){ hideById('cfgProvider'); }
  function hideUnusedToggles(){
    hideById('cfgSimpleMode');
    hideById('cfgDynAvatar');
    hideById('cfgEmotionAvatar');
  }

  function trimModelDropdown(){
    var sel = document.getElementById('cfgOrModel');
    if (!sel || sel.dataset.v30 === '1') return;
    var keep = {
      'meta-llama/llama-3.3-70b-instruct': true,
      'sao10k/l3.3-euryale-70b': true,
      'nousresearch/hermes-3-llama-3.1-405b': true
    };
    Array.from(sel.options).forEach(function(opt){
      if (!keep[opt.value]) opt.remove();
    });
    Array.from(sel.options).forEach(function(opt){
      if (opt.value === 'meta-llama/llama-3.3-70b-instruct')
        opt.textContent = 'LLaMA 3.3 70B（推奨：標準）';
      else if (opt.value === 'sao10k/l3.3-euryale-70b')
        opt.textContent = 'Euryale 70B（成人描写）';
      else if (opt.value === 'nousresearch/hermes-3-llama-3.1-405b')
        opt.textContent = 'Hermes 3 405B（最高品質）';
    });
    sel.dataset.v30 = '1';
  }

  function consolidateWorldFields(){
    hideById('cfgLoc');
    hideById('cfgObj');
    hideById('cfgTone');
    var lore = document.getElementById('cfgLore');
    if (lore && !lore.dataset.v30){
      var lbl = lore.parentElement && lore.parentElement.querySelector('label');
      if (lbl) lbl.textContent = '世界観・シーン設定（場所・雰囲気・目的・文体をまとめて記述）';
      lore.placeholder = '例: 記憶が結晶化した灯片が通貨の都市。路地裏、夕暮れ。心理描写重視。\nここに世界観・場所・目的・文体すべてを書いてOK。';
      lore.style.minHeight = '120px';
      lore.dataset.v30 = '1';
    }
  }

  function consolidateAiFields(){
    hideById('cfgBannedPhrases');
    var an = document.getElementById('cfgAuthorNote');
    if (an && !an.dataset.v30){
      var lbl = an.parentElement && an.parentElement.querySelector('label');
      if (lbl) lbl.textContent = 'AI指示（文体・進行ルール・禁止表現を自由記述）';
      an.placeholder = '例: 心理描写重視。比喩を控えめに。\n禁止: 光に包まれた、不思議な力\n進行: ハッピーエンドにしないで';
      an.style.minHeight = '120px';
      an.dataset.v30 = '1';
    }
  }

  function consolidateNpcFields(){
    document.querySelectorAll('.npc-card').forEach(function(card){
      ['coreDesire','coreFear','wound'].forEach(function(f){
        var inp = card.querySelector('[data-f="'+f+'"]');
        if (inp){
          var p = inp.closest('.fld');
          if (p) p.classList.add('v30-hide');
        }
      });
      var pers = card.querySelector('[data-f="personality"]');
      if (pers && !pers.dataset.v30){
        var lbl = pers.parentElement && pers.parentElement.querySelector('label');
        if (lbl) lbl.textContent = 'キャラ深掘り（性格・欲求・恐怖・過去をまとめて）';
        pers.placeholder = '例: 臆病、過去に家族を失った、認められたいが裏切りを恐れる';
        pers.dataset.v30 = '1';
      }
      var div = card.querySelector('.psych-divider');
      if (div) div.classList.add('v30-hide');
    });
  }

  function consolidateDebugUI(){
    var dbg = document.getElementById('cfgDbg');
    if (!dbg) return;
    var dbgWrap = dbg.closest('.fld') || dbg.parentElement;
    if (!dbgWrap || dbgWrap.dataset.v30Debug === '1') return;
    var bar = document.createElement('div');
    bar.className = 'v30-debug-bar';
    bar.innerHTML =
      '<div style="font-size:11px;color:var(--dim);font-weight:600">デバッグ</div>' +
      '<label class="chk-row" style="font-size:12px"><input type="checkbox" id="v30DbgCheck"> ログ出力を有効化</label>' +
      '<div style="display:flex;gap:6px;flex-wrap:wrap">' +
      '<button class="btn-s" id="v30DbgCopy" style="flex:1;font-size:12px">📋 状態をコピー</button>' +
      '<button class="btn-s" id="v30DbgConsole" style="flex:1;font-size:12px">🖥 コンソール表示</button>' +
      '</div>';
    dbgWrap.parentNode.insertBefore(bar, dbgWrap);
    dbgWrap.classList.add('v30-hide');
    dbgWrap.dataset.v30Debug = '1';
    var newCb = document.getElementById('v30DbgCheck');
    if (newCb){
      newCb.checked = !!dbg.checked;
      newCb.addEventListener('change', function(){
        dbg.checked = newCb.checked;
        dbg.dispatchEvent(new Event('change', {bubbles:true}));
      });
    }
    var copyBtn = document.getElementById('v30DbgCopy');
    if (copyBtn){
      copyBtn.addEventListener('click', function(){
        var report = {
          state: JSON.parse(localStorage.getItem('chr6')||'{}'),

          recentDebug: JSON.parse(localStorage.getItem('_debugLog_v11')||'[]').slice(-15),
          ts: new Date().toISOString()

        var json = JSON.stringify(report, null, 2);
        if (navigator.clipboard) navigator.clipboard.writeText(json).then(function(){
          copyBtn.textContent = '✓ コピー完了';
          setTimeout(function(){ copyBtn.textContent = '📋 状態をコピー'; }, 1500);
        });
        console.log('[v30 debug snapshot]', report);
      });
    }
    var conBtn = document.getElementById('v30DbgConsole');
    if (conBtn){
      conBtn.addEventListener('click', function(){
        var s = JSON.parse(localStorage.getItem('chr6')||'{}');
        console.group('[v30] Chronicle state');
        console.log('hero:', s.cast && s.cast.hero);
        console.log('npcs:', s.cast && s.cast.npcs);
        console.log('cfg:', s.cfg);
        console.log('scene:', s.scene);
        console.log('turns:', (s.turns||[]).length);
        console.log('last turn:', (s.turns||[]).slice(-1)[0]);
        console.groupEnd();
        conBtn.textContent = '✓ コンソール表示';
        setTimeout(function(){ conBtn.textContent = '🖥 コンソール表示'; }, 1500);
      });
    }
  }

  function applyAll(){
    try { hideProvider(); } catch(e){ console.warn(TAG,'provider',e); }
    try { hideUnusedToggles(); } catch(e){ console.warn(TAG,'toggles',e); }
    try { trimModelDropdown(); } catch(e){ console.warn(TAG,'model',e); }
    try { consolidateWorldFields(); } catch(e){ console.warn(TAG,'world',e); }
    try { consolidateAiFields(); } catch(e){ console.warn(TAG,'ai',e); }
    try { consolidateNpcFields(); } catch(e){ console.warn(TAG,'npc',e); }
    try { consolidateDebugUI(); } catch(e){ console.warn(TAG,'debug',e); }
  }

  applyAll();
  setInterval(applyAll, 1500);
  console.log(TAG,'v30 settings cleanup active');
})();
</script>

<script>
/* ========================================================================
 * v32: Fix provider panel mismatch when v30 hid the cfgProvider dropdown.
 * Also force form fields to refresh from state on settings open.
 * ======================================================================== */
(function v32Fix(){
  var TAG = '[v32]';

  function loadStorageState(){
    try { return JSON.parse(localStorage.getItem('chr6')||'{}'); }
    catch(e){ return {}; }
  }

  function syncProviderPanel(){
    var st = loadStorageState();
    var prov = (st.cfg && st.cfg.provider) || 'anthropic';
    /* Override key by detecting which key looks more valid */
    var orKey = st.cfg && st.cfg.orKey || '';
    var antKey = st.cfg && st.cfg.key || '';
    if (/^sk-or-/.test(orKey)) prov = 'openrouter';
    else if (/^sk-ant-/.test(antKey)) prov = 'anthropic';
    else if (/^pst-/.test(st.cfg && st.cfg.naiKey || '')) prov = 'novelai';

    var pa = document.getElementById('provAnthropic');
    var po = document.getElementById('provOpenRouter');
    var pn = document.getElementById('provNovelAI');
    if (pa) pa.style.display = (prov === 'anthropic') ? '' : 'none';
    if (po) po.style.display = (prov === 'openrouter') ? '' : 'none';
    if (pn) pn.style.display = (prov === 'novelai') ? '' : 'none';
    /* Sync hidden cfgProvider value too */
    var cp = document.getElementById('cfgProvider');
    if (cp && cp.value !== prov) cp.value = prov;
  }

  function syncHeroFields(){
    var st = loadStorageState();
    var hero = (st.cast && st.cast.hero) || {};
    var hName = document.getElementById('cfgHName');
    var hDesc = document.getElementById('cfgHDesc');
    if (hName && !hName.value && hero.name) hName.value = hero.name;
    if (hDesc && !hDesc.value && hero.desc) hDesc.value = hero.desc;
    /* Lore + AuthorNote */
    var st2 = st;
    var lore = document.getElementById('cfgLore');
    var an   = document.getElementById('cfgAuthorNote');
    if (lore && !lore.value && st2.scene && st2.scene.lore) lore.value = st2.scene.lore;
    if (an && !an.value && st2.cfg && st2.cfg.authorNote) an.value = st2.cfg.authorNote;
  }

  function applyV32(){
    /* Run only when settings panel is open (visible) */
    var panel = document.querySelector('#settingsOv, .mpanel');
    if (!panel) return;
    var rect = panel.getBoundingClientRect();
    if (rect.width === 0 || rect.height === 0) return;
    syncProviderPanel();
    syncHeroFields();
  }
  setInterval(applyV32, 800);
  /* Initial run shortly after load */
  setTimeout(applyV32, 500);
  setTimeout(applyV32, 1500);
  console.log(TAG, 'provider+form sync active');
})();
</script>

<script>
/* ========================================================================
 * v33: Eradicate non-binary gender artifacts that confuse the model.
 *  - Strip "両性具有", "中性的", "不明", "両性" from any descriptions.
 *  - Force binary (男 / 女) for hero & NPCs in state on every load + save.
 *  - Deduplicate 性別 dropdowns when v28+v29 both render one.
 * ======================================================================== */
(function v33Binarize(){
  var TAG = '[v33]';

  function pickBinaryFromName(name){
    var n = String(name||'');
    var h = 0;
    for (var i=0; i<n.length; i++) h = (h*31 + n.charCodeAt(i)) & 0xffff;
    return (h % 2 === 0) ? '女' : '男';
  }

  function detectBinary(text, name){
    var t = String(text||'');
    /* Explicit female markers */
    if (/性別[:：]?\s*女|少女|女子|女の子|姉|妹|姫|淑女|彼女|女の|令嬢|王女|お嬢/.test(t)) return '女';
    /* Explicit male markers */
    if (/性別[:：]?\s*男|少年|男子|男の子|兄|弟|王子|彼\s|彼は|青年/.test(t)) return '男';
    /* Fall back: use name hash */
    return pickBinaryFromName(name);
  }

  function rewriteDescription(desc, decided){
    var d = String(desc||'');
    /* Remove "両性具有" + variants */
    d = d.replace(/性別[:：]?\s*(両性具有|両性|中性的|中性|不明|どちらでもない|無性|曖昧)/g, '性別: ' + (decided==='男'?'男性':'女性'));
    /* Cleanup leftover bare "両性具有" tokens */
    d = d.replace(/(両性具有|中性的|無性|どちらでもない)/g, '');
    /* Collapse extra whitespace */
    d = d.replace(/\s{2,}/g, ' ').trim();
    return d;
  }

  function fixState(){
    var raw;
    try { raw = JSON.parse(localStorage.getItem('chr6')||'{}'); } catch(e){ return; }
    if (!raw.cast) return;
    var changed = false;
    /* Hero */
    if (raw.cast.hero) {
      var oldDesc = raw.cast.hero.desc || '';
      var hg = detectBinary(oldDesc, raw.cast.hero.name);
      if (raw.cast.hero.gender !== (hg==='男'?'男性':'女性')) {
        raw.cast.hero.gender = (hg==='男'?'男性':'女性');
        changed = true;
      }
      var newDesc = rewriteDescription(oldDesc, hg);
      if (newDesc !== oldDesc) {
        raw.cast.hero.desc = newDesc;
        changed = true;
      }
    }
    /* NPCs */
    (raw.cast.npcs||[]).forEach(function(n){
      var oldDesc = n.desc || '';
      var ng = detectBinary(oldDesc, n.name);
      if (n.gender !== (ng==='男'?'男性':'女性')) {
        n.gender = (ng==='男'?'男性':'女性');
        changed = true;
      }
      var newDesc = rewriteDescription(oldDesc, ng);
      if (newDesc !== oldDesc) {
        n.desc = newDesc;
        changed = true;
      }
    });
    if (changed) {
      try { localStorage.setItem('chr6', JSON.stringify(raw)); } catch(e){}
    }
  }

  function dedupeDropdowns(){
    /* Hero card */
    var heroSec = null;
    Array.from(document.querySelectorAll('.sec')).forEach(function(s){
      if ((s.textContent||'').trim() === '主人公') heroSec = s;
    });
    function dedupeWithinScope(scope){
      if (!scope) return;
      var rows = scope.querySelectorAll('select');
      var seenGender = false;
      rows.forEach(function(sel){
        var hasGenderOpts = false;
        Array.from(sel.options||[]).forEach(function(o){
          if (o.value === '男性' || o.value === '女性') hasGenderOpts = true;
        });
        if (!hasGenderOpts) return;
        if (seenGender) {
          /* Hide the duplicate row */
          var row = sel.closest('.fld, .v28-gender-row, .v29-gender-row, [class*=gender-row]') || sel.parentElement;
          if (row) row.style.display = 'none';
        } else {
          seenGender = true;
        }
      });
    }
    /* Run for each .npc-card and the hero region */
    document.querySelectorAll('.npc-card').forEach(dedupeWithinScope);
    if (heroSec && heroSec.parentElement) {
      /* hero scope: the section between '主人公' and next '.sec' */
      var p = heroSec;
      var scope = document.createElement('div');
      var n = p.nextElementSibling;
      var nodes = [];
      while (n && !n.classList.contains('sec')) { nodes.push(n); n = n.nextElementSibling; }
      /* Just dedupe within ALL nodes by collecting their selects */
      var sels = [];
      nodes.forEach(function(nd){
        Array.from(nd.querySelectorAll('select')).forEach(function(s){sels.push(s);});
      });
      var seen = false;
      sels.forEach(function(sel){
        var hasGen = Array.from(sel.options||[]).some(function(o){return o.value==='男性'||o.value==='女性';});
        if (!hasGen) return;
        if (seen) {
          var row = sel.closest('.fld, [class*=gender-row]') || sel.parentElement;
          if (row) row.style.display = 'none';
        } else seen = true;
      });
    }
  }

  function fixVisibleDescTextarea(){
    /* Strip 両性具有 from any visible textarea field */
    document.querySelectorAll('textarea').forEach(function(ta){
      if (!ta.value) return;
      if (/両性具有|中性的|無性|どちらでもない|性別[:：]\s*不明/.test(ta.value)) {
        var name = '';
        var card = ta.closest('.npc-card');
        if (card) {
          var ni = card.querySelector('input[data-f="name"]');
          if (ni) name = ni.value;
        } else {
          var hn = document.getElementById('cfgHName');
          if (hn) name = hn.value;
        }
        var g = detectBinary(ta.value, name);
        var newV = rewriteDescription(ta.value, g);
        if (newV !== ta.value) {
          var setter = Object.getOwnPropertyDescriptor(window.HTMLTextAreaElement.prototype, 'value').set;
          setter.call(ta, newV);
          ta.dispatchEvent(new Event('input', {bubbles:true}));
        }
      }
    });
  }

  /* Patch random-fill output by intercepting + cleaning. The random-fill helper
   * inserts text into textarea via setter. We just re-clean after a delay. */
  function applyAll(){
    try { fixState(); } catch(e){ console.warn(TAG,'state',e); }
    try { dedupeDropdowns(); } catch(e){ console.warn(TAG,'dedupe',e); }
    try { fixVisibleDescTextarea(); } catch(e){ console.warn(TAG,'desc',e); }
  }

  setInterval(applyAll, 1500);
  setTimeout(applyAll, 400);
  setTimeout(applyAll, 1200);
  console.log(TAG, 'binary-only enforcer active');
})();
</script>

<script>

<script>
/* ========================================================================
 * v35: NPC card auto-render + Re-roll random button + Avatar prompt variety
 * ======================================================================== */
(function v35Suite(){
  var TAG = '[v35]';

  /* ---- (1) Force NPC card render when panel opens ---- */
  function ensureNpcRendered(){
    var panel = document.querySelector('#settingsOv');
    if (!panel || !panel.classList.contains('open')) return;
    var npcList = document.getElementById('npcList');
    if (!npcList) return;
    var raw;
    try { raw = JSON.parse(localStorage.getItem('chr6')||'{}'); } catch(e){ return; }
    var npcs = (raw.cast && raw.cast.npcs) || [];
    if (npcs.length === 0) return;
    if (npcList.children.length >= npcs.length) return;
    /* Trigger re-render via add+remove of a placeholder NPC */
    var addBtn = null;
    document.querySelectorAll('button').forEach(function(b){
      if ((b.textContent||'').indexOf('+ NPC を追加') >= 0) addBtn = b;
    });
    if (!addBtn) return;
    /* Click add */
    addBtn.click();
    /* Find the newly added (last) NPC and remove it */
    setTimeout(function(){
      var cards = document.querySelectorAll('.npc-card');
      if (!cards.length) return;
      var last = cards[cards.length-1];
      var del = last.querySelector('.npc-del, button[onclick*="delNpc"]');
      if (del) del.click();
    }, 100);
  }

  /* ---- (2) Add re-roll button next to existing random-fill ---- */
  function addRerollBtn(){
    if (document.getElementById('v35Reroll')) return;
    var randBtn = null;
    document.querySelectorAll('button').forEach(function(b){
      if ((b.textContent||'').indexOf('未入力をランダム生成') >= 0) randBtn = b;
    });
    if (!randBtn) return;
    /* Build new button */
    var btn = document.createElement('button');
    btn.id = 'v35Reroll';
    btn.className = randBtn.className || 'btn-s';
    btn.style.cssText = 'width:100%;font-size:13px;margin-top:4px;background:rgba(216,140,180,.15);border:1px solid rgba(216,140,180,.4);color:#d8a0c0';
    btn.textContent = '🎲 全部やり直し（強制再ランダム）';
    btn.addEventListener('click', function(){
      if (!confirm('主人公・NPCの名前と説明を全クリアしてランダム再生成します。よろしいですか？')) return;
      try {
        var raw = JSON.parse(localStorage.getItem('chr6')||'{}');
        if (raw.cast) {
          if (raw.cast.hero) {
            raw.cast.hero.name = '';
            raw.cast.hero.desc = '';
            raw.cast.hero.gender = '';
            raw.cast.hero.avatar = '';
          }
          (raw.cast.npcs||[]).forEach(function(n){
            n.name = '';
            n.desc = '';
            n.personality = '';
            n.coreDesire = '';
            n.coreFear = '';
            n.wound = '';
            n.gender = '';
            n.avatar = '';
          });
          localStorage.setItem('chr6', JSON.stringify(raw));
        }
        /* Clear visible inputs too */
        var hn = document.getElementById('cfgHName'); if (hn) hn.value='';
        var hd = document.getElementById('cfgHDesc'); if (hd) hd.value='';
        document.querySelectorAll('.npc-card').forEach(function(card){
          card.querySelectorAll('input,textarea').forEach(function(inp){
            if (inp.dataset && inp.dataset.f) inp.value='';
          });
        });
        /* Trigger original random-fill button */
        randBtn.click();
      } catch(e){ console.warn(TAG, 'reroll', e); }
    });
    /* Insert after the original random-fill button */
    if (randBtn.parentElement) randBtn.parentElement.appendChild(btn);
  }

  /* ---- (3) Avatar prompt variety - inject random style/composition ---- */
  var STYLE_VARIATIONS = [
    'soft cinematic lighting, three-quarter view',
    'dramatic side lighting, profile view',
    'warm rim light, looking at viewer',
    'cool moonlight, looking aside, melancholic',
    'candlelight glow, downcast eyes, contemplative',
    'sharp shadows, frontal portrait, intense gaze',
    'misty backlight, soft focus background',
    'dappled light, slight smile, mysterious',
    'golden hour, looking up, hopeful',
    'overcast diffuse light, neutral expression',
    'twilight purple gradient, distant gaze',
    'low-key chiaroscuro, brooding',
    'high-contrast monochrome accent, theatrical',
    'pastel color palette, ethereal mood',
    'desaturated muted tones, somber'
  ];
  var COMPOSITION_VARIATIONS = [
    'close-up portrait',
    'bust shot',
    'shoulder up, slight angle',
    'half body, looking back',
    'over-the-shoulder framing',
    'centered headshot',
    'asymmetric crop, dynamic',
    'cinematic letterbox framing'
  ];
  var DETAIL_VARIATIONS = [
    'intricate fabric texture, detailed iris',
    'wisps of hair, subtle skin imperfections',
    'metallic accessory glint, fabric folds',
    'subtle facial expression, lip detail',
    'hair-strand detail, eye reflection',
    'ornate clothing texture, jewelry sparkle',
    'fine pore detail, eyelash detail'
  ];
  function pickRand(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

  function injectVariety(prompt, characterName){
    if (!prompt || typeof prompt !== 'string') return prompt;
    /* Use character name as a stable seed for one re-gen */
    var st = pickRand(STYLE_VARIATIONS);
    var cm = pickRand(COMPOSITION_VARIATIONS);
    var dt = pickRand(DETAIL_VARIATIONS);
    /* Insert variety AFTER the main subject description */
    return prompt + ', ' + cm + ', ' + st + ', ' + dt;
  }

  /* Hook the fetch to add variety to FLUX/Pollinations prompts */
  var origFetch = window.fetch;
  if (!origFetch.__v35Wrapped) {
    window.fetch = function(input, init){
      try {
        var url = typeof input === 'string' ? input : (input && input.url) || '';
        if (/pollinations\.ai|fal\.run|black-forest|flux/.test(url)) {
          /* For Pollinations: prompt is in URL path. */
          if (url.indexOf('pollinations.ai/prompt/') >= 0) {
            var u = new URL(url, location.origin);
            var pathParts = u.pathname.split('/prompt/');
            if (pathParts[1]) {
              var p = decodeURIComponent(pathParts[1].split('?')[0]);
              if (p && p.indexOf('___v35') < 0) {
                var newP = injectVariety(p, '');
                u.pathname = pathParts[0] + '/prompt/' + encodeURIComponent(newP + '___v35');
                /* Also vary seed query */
                u.searchParams.set('seed', String(Math.floor(Math.random()*999999)));
                input = u.toString();
              }
            }
          }
          /* For JSON-body fetches (FLUX): inject in prompt field */
          if (init && typeof init.body === 'string' && init.body.indexOf('"prompt"') >= 0 && init.body.indexOf('___v35') < 0) {
            try {
              var body = JSON.parse(init.body);
              if (body.prompt) {
                body.prompt = injectVariety(body.prompt, '') + '___v35';
                /* Inject random seed if available */
                body.seed = Math.floor(Math.random()*999999);
                init = Object.assign({}, init, {body: JSON.stringify(body)});
              }
            } catch(e){}
          }
        }
      } catch(e){ console.warn(TAG, 'variety', e); }
      return origFetch.call(this, input, init);
    };
    window.fetch.__v35Wrapped = true;
  }

  /* ---- Run interval ---- */
  function applyAll(){
    try { ensureNpcRendered(); } catch(e){ console.warn(TAG,'render',e); }
    try { addRerollBtn(); } catch(e){ console.warn(TAG,'reroll',e); }
  }
  setInterval(applyAll, 1000);
  setTimeout(applyAll, 500);

  console.log(TAG, 'NPC render + reroll + avatar variety active');
})();
</script>

<script>
/* ========================================================================
 * v36: Stabilize v35 - replace thrashy NPC render trick with one-shot trigger
 * tied to settings-open event. Also hide psych fields on newly-created cards.
 * ======================================================================== */
(function v36Stable(){
  var TAG = '[v36]';

  /* Disable v35's interval-based ensureNpcRendered which caused thrash. */
  /* Instead: observe #settingsOv class change, fire ONE add+remove cycle. */

  var lastOpen = false;
  var renderTriggered = false;

  function isOpen(){
    var ov = document.getElementById('settingsOv');
    return !!(ov && ov.classList.contains('open'));
  }

  function getNpcCount(){
    try {
      var c = JSON.parse(localStorage.getItem('chr6')||'{}');
      return ((c.cast && c.cast.npcs) || []).length;
    } catch(e){ return 0; }
  }

  function triggerRenderOnce(){
    if (renderTriggered) return;
    var npcList = document.getElementById('npcList');
    if (!npcList) return;
    var stateNpcs = getNpcCount();
    if (stateNpcs === 0) return;
    if (npcList.children.length >= stateNpcs) {
      renderTriggered = true;
      return;
    }
    /* Render is missing. Click +Add then immediately delete the last card. */
    var addBtn = null;
    document.querySelectorAll('button').forEach(function(b){
      if ((b.textContent||'').indexOf('+ NPC を追加') >= 0) addBtn = b;
    });
    if (!addBtn) return;
    renderTriggered = true; /* mark before clicking to prevent re-entry */
    addBtn.click();
    setTimeout(function(){
      /* Wait for render. Find LAST card (the newly added one). */
      var cards = document.querySelectorAll('.npc-card');
      if (cards.length > stateNpcs) {
        var last = cards[cards.length-1];
        var del = last.querySelector('.npc-del, button[onclick*="delNpc"]');
        if (del) del.click();
      }
    }, 250);
  }

  function applyV30HidesNow(){
    /* For freshly-rendered NPC card, ensure psych fields hidden again */
    document.querySelectorAll('.npc-card').forEach(function(card){
      ['coreDesire','coreFear','wound'].forEach(function(f){
        var inp = card.querySelector('[data-f="'+f+'"]');
        if (inp){
          var p = inp.closest('.fld');
          if (p && !p.classList.contains('v30-hide')) p.classList.add('v30-hide');
        }
      });
      var div = card.querySelector('.psych-divider');
      if (div && !div.classList.contains('v30-hide')) div.classList.add('v30-hide');
    });
  }

  function watch(){
    var nowOpen = isOpen();
    if (nowOpen && !lastOpen) {
      /* Just opened - reset trigger and schedule render check */
      renderTriggered = false;
      setTimeout(function(){
        triggerRenderOnce();
        setTimeout(applyV30HidesNow, 400);
        setTimeout(applyV30HidesNow, 1000);
      }, 200);
    }
    lastOpen = nowOpen;
    /* Always reapply v30 hides if cards are in DOM */
    applyV30HidesNow();
  }
  setInterval(watch, 500);
  setTimeout(watch, 100);

  console.log(TAG, 'stable NPC-render trigger + psych-hide enforcer active');
})();
</script>

<script>
/* ========================================================================
 * v37: Sync NPC card inputs from localStorage state after render (since v36's
 * render-trick produces empty input values).
 * Also: capture input changes back to state via 'input' event so saveSettings
 * picks them up.
 * ======================================================================== */
(function v37NpcSync(){
  var TAG = '[v37]';

  function loadState(){
    try { return JSON.parse(localStorage.getItem('chr6')||'{}'); }
    catch(e){ return {}; }
  }
  function saveState(s){
    try { localStorage.setItem('chr6', JSON.stringify(s)); }
    catch(e){}
  }

  function syncNpcCards(){
    var panel = document.getElementById('settingsOv');
    if (!panel || !panel.classList.contains('open')) return;
    var c = loadState();
    var npcs = (c.cast && c.cast.npcs) || [];
    var cards = document.querySelectorAll('.npc-card');
    cards.forEach(function(card, i){
      if (i >= npcs.length) return;
      var n = npcs[i];
      var fields = ['name','desc','personality','coreDesire','coreFear','wound'];
      fields.forEach(function(f){
        var inp = card.querySelector('[data-f="'+f+'"]');
        if (!inp) return;
        if (!inp.value && n[f]) {
          var setter = inp.tagName === 'TEXTAREA'
            ? Object.getOwnPropertyDescriptor(window.HTMLTextAreaElement.prototype, 'value').set
            : Object.getOwnPropertyDescriptor(window.HTMLInputElement.prototype, 'value').set;
          setter.call(inp, n[f]);
          inp.dispatchEvent(new Event('input', {bubbles:true}));
        }
        /* Wire change handler if not already */
        if (!inp.dataset.v37Wired) {
          inp.dataset.v37Wired = '1';
          inp.addEventListener('input', function(){
            var st = loadState();
            if (!st.cast) st.cast = {};
            if (!st.cast.npcs) st.cast.npcs = [];
            while (st.cast.npcs.length <= i) st.cast.npcs.push({});
            st.cast.npcs[i][f] = inp.value;
            saveState(st);
          });
        }
      });
      /* Set NPC card heading to actual name if available */
      var heading = card.querySelector('.npc-head span, .npc-head, h4, h5');
      if (heading && n.name && !heading.dataset.v37Updated) {
        heading.textContent = n.name;
        heading.dataset.v37Updated = '1';
      }
    });
  }

  setInterval(syncNpcCards, 500);
  setTimeout(syncNpcCards, 200);
  setTimeout(syncNpcCards, 800);

  console.log(TAG, 'NPC card input syncer active');
})();
</script>

<script>
/* ========================================================================
 * v38: Take ownership of NPC + Hero gender dropdown to stop the v28 / v29 / v33
 *      race that makes the 性別 selector flicker on screen.
 *  - Hide ALL existing v28-/v29-injected gender rows permanently via CSS.
 *  - Insert exactly ONE v38-managed select per character card, stamped with
 *    data-v38="1" so it survives re-renders and won't be re-created.
 *  - Two-way sync: select.value <-> state.cast[*].gender ('男性'/'女性').
 * ======================================================================== */
(function v38GenderOwner(){
  var TAG = '[v38]';

  if (!document.getElementById('v38-style')) {
    var st = document.createElement('style');
    st.id = 'v38-style';
    st.textContent =
      '.v28-gender-row,.v29-gender-row,[data-v28-gender],[data-v29-gender]{display:none !important}\n' +
      '.v38-gender-row{display:flex;align-items:center;gap:8px;margin:6px 0 8px 0;font-size:13px}\n' +
      '.v38-gender-row label{margin:0 4px 0 0;color:var(--dim);font-weight:600;min-width:34px}\n' +
      '.v38-gender-row select{padding:4px 8px;background:var(--s2);color:var(--tx);border:1px solid var(--border);border-radius:6px}\n';
    document.head.appendChild(st);
  }

  function loadState(){
    try { return JSON.parse(localStorage.getItem('chr6')||'{}'); }
    catch(e){ return {}; }
  }
  function saveState(s){
    try { localStorage.setItem('chr6', JSON.stringify(s)); } catch(e){}
  }

  function detectFromDesc(text, name){
    var t = String(text||'');
    if (/性別[:：]?\s*女|少女|女子|女の子|姉|妹|姫|淑女|彼女|令嬢|王女/.test(t)) return '女性';
    if (/性別[:：]?\s*男|少年|男子|男の子|兄|弟|王子|青年/.test(t)) return '男性';
    var n = String(name||'');
    var h = 0;
    for (var i=0;i<n.length;i++) h = (h*31 + n.charCodeAt(i)) & 0xffff;
    return (h % 2 === 0) ? '女性' : '男性';
  }

  function buildSelect(initial){
    var wrap = document.createElement('div');
    wrap.className = 'v38-gender-row';
    wrap.dataset.v38 = '1';
    wrap.innerHTML = '<label>性別:</label>';
    var sel = document.createElement('select');
    sel.dataset.v38 = '1';
    sel.dataset.f = 'gender';
    [['男性','男性'],['女性','女性']].forEach(function(p){
      var o = document.createElement('option');
      o.value = p[0]; o.textContent = p[1];
      sel.appendChild(o);
    });
    sel.value = initial || '男性';
    wrap.appendChild(sel);
    return {wrap: wrap, sel: sel};
  }

  function ensureNpcCardsHaveOurDropdown(){
    var cards = document.querySelectorAll('.npc-card');
    var st = loadState();
    var npcs = (st.cast && st.cast.npcs) || [];
    cards.forEach(function(card, i){
      /* Hide all stale gender rows that are NOT v38 */
      Array.from(card.querySelectorAll('select')).forEach(function(s){
        if (s.dataset && s.dataset.v38 === '1') return;
        var hasGen = Array.from(s.options||[]).some(function(o){return o.value==='男性'||o.value==='女性';});
        if (hasGen) {
          var row = s.closest('.fld, .v28-gender-row, .v29-gender-row, .v38-gender-row, [class*=gender-row]') || s.parentElement;
          if (row && !row.classList.contains('v38-gender-row')) row.style.display = 'none';
        }
      });

      /* If our row already exists in this card, skip */
      if (card.querySelector('.v38-gender-row[data-v38="1"]')) return;

      /* Determine initial value */
      var n = npcs[i] || {};
      var nameInp = card.querySelector('input[data-f="name"]');
      var descTa  = card.querySelector('textarea[data-f="desc"]');
      var initial = n.gender || detectFromDesc((descTa && descTa.value) || (n.desc||''), (nameInp && nameInp.value) || (n.name||''));

      var b = buildSelect(initial);

      /* Wire change handler -> update state */
      b.sel.addEventListener('change', function(){
        var s2 = loadState();
        if (!s2.cast) s2.cast = {};
        if (!s2.cast.npcs) s2.cast.npcs = [];
        while (s2.cast.npcs.length <= i) s2.cast.npcs.push({});
        s2.cast.npcs[i].gender = b.sel.value;
        saveState(s2);
      });

      /* Insert right after the name field (before desc) */
      var nameFld = nameInp ? nameInp.closest('.fld') : null;
      if (nameFld && nameFld.parentElement) {
        nameFld.parentElement.insertBefore(b.wrap, nameFld.nextSibling);
      } else {
        /* Fallback: prepend to card */
        card.insertBefore(b.wrap, card.firstChild);
      }
    });
  }

  function ensureHeroHasOurDropdown(){
    var hName = document.getElementById('cfgHName');
    if (!hName) return;
    var heroSec = null;
    Array.from(document.querySelectorAll('.sec')).forEach(function(s){
      if ((s.textContent||'').trim() === '主人公') heroSec = s;
    });
    if (!heroSec) return;

    /* Walk siblings until next .sec; collect all elements */
    var node = heroSec.nextElementSibling;
    var heroRegion = [];
    while (node && !node.classList.contains('sec')) { heroRegion.push(node); node = node.nextElementSibling; }

    /* Hide stale gender rows in hero region */
    heroRegion.forEach(function(el){
      Array.from(el.querySelectorAll('select')).forEach(function(s){
        if (s.dataset && s.dataset.v38 === '1') return;
        var hasGen = Array.from(s.options||[]).some(function(o){return o.value==='男性'||o.value==='女性';});
        if (hasGen) {
          var row = s.closest('.fld, .v28-gender-row, .v29-gender-row, [class*=gender-row]') || s.parentElement;
          if (row && !row.classList.contains('v38-gender-row')) row.style.display = 'none';
        }
      });
    });

    /* If our hero row exists, skip */
    var existing = heroRegion.some(function(el){return el.querySelector && el.querySelector('.v38-gender-row[data-v38="1"][data-hero="1"]');});
    if (existing) return;

    /* Determine initial */
    var st = loadState();
    var hero = (st.cast && st.cast.hero) || {};
    var hDesc = document.getElementById('cfgHDesc');
    var initial = hero.gender || detectFromDesc((hDesc && hDesc.value) || (hero.desc||''), (hName && hName.value) || (hero.name||''));

    var b = buildSelect(initial);
    b.wrap.dataset.hero = '1';
    b.sel.addEventListener('change', function(){
      var s2 = loadState();
      if (!s2.cast) s2.cast = {};
      if (!s2.cast.hero) s2.cast.hero = {};
      s2.cast.hero.gender = b.sel.value;
      saveState(s2);
    });

    /* Insert right after name field */
    var nameFld = hName.closest('.fld');
    if (nameFld && nameFld.parentElement) {
      nameFld.parentElement.insertBefore(b.wrap, nameFld.nextSibling);
    }
  }

  function applyAll(){
    try { ensureNpcCardsHaveOurDropdown(); } catch(e){ console.warn(TAG,'npc',e); }
    try { ensureHeroHasOurDropdown(); } catch(e){ console.warn(TAG,'hero',e); }
  }

  setInterval(applyAll, 700);
  setTimeout(applyAll, 200);
  setTimeout(applyAll, 800);
  console.log(TAG, 'gender dropdown owner active');
})();
</script>

<script>
/* ========================================================================
 * v40: Fix v38 hero-region duplicate insertion + aggressive global dedupe.
 *  v38's hero check used el.querySelector which only matches descendants, so
 *  the inserted sibling row was never detected → infinite duplicates every
 *  700ms. v40 takes over and:
 *  - Keeps ONLY the first v38 row per logical character (hero / each NPC card)
 *  - Deletes all subsequent v38 rows in the same scope
 *  - Runs more frequently to clean up the existing pile fast
 * ======================================================================== */
(function v40GenderDedupe(){
  var TAG = '[v40]';

  function dedupe(){
    /* HERO scope: rows with data-hero="1" outside any .npc-card */
    var heroRows = Array.from(document.querySelectorAll('.v38-gender-row[data-v38="1"][data-hero="1"]'))
      .filter(function(r){ return !r.closest('.npc-card'); });
    if (heroRows.length > 1) {
      heroRows.slice(1).forEach(function(r){ r.remove(); });
    }
    /* NPC scope: per-card */
    document.querySelectorAll('.npc-card').forEach(function(card){
      var rows = Array.from(card.querySelectorAll('.v38-gender-row[data-v38="1"]'));
      if (rows.length > 1) {
        rows.slice(1).forEach(function(r){ r.remove(); });
      }
    });
    /* Stray v38 rows that don't belong to hero or any NPC card: also nuke */
    Array.from(document.querySelectorAll('.v38-gender-row[data-v38="1"]')).forEach(function(r){
      if (r.dataset.hero === '1') return;        /* hero row OK if first */
      if (r.closest('.npc-card')) return;        /* NPC row OK */
      /* Otherwise stray - remove */
      r.remove();
    });
  }

  /* Patch v38's insertion check by overriding hero check at runtime.
   * Easiest: just block v38's hero insertion globally by removing data-hero
   * stragglers. v38 still tries to insert, but we delete extras. */

  setInterval(dedupe, 300);
  setTimeout(dedupe, 100);
  setTimeout(dedupe, 600);
  console.log(TAG, 'gender dedupe active');
})();
</script>

<script>
/* ========================================================================
 * v41: Permanently stop v38 hero gender row re-insertion by relocating the
 *      existing first row to be a CHILD of cfgHName's .fld wrapper - which
 *      makes v38's heroRegion querySelector check finally detect it.
 * ======================================================================== */
(function v41GenderRelocate(){

      var strays = Array.from(document.querySelectorAll('.v38-gender-row[data-v38="1"][data-hero="1"]'))
        .filter(function(r){ return !r.closest('.npc-card') && !nameFld.contains(r); });
      strays.forEach(function(r){ r.remove(); });
