<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chronicle MVP</title>
<style>
:root{--bg:#0c0b10;--s:#161520;--b:#252335;--g:#c9a84c;--gd:#806830;--t:#cdc0a0;--td:#6e6555;--e:#c44;--r:6px;--f:'Georgia','Hiragino Mincho ProN',serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f);background:var(--bg);color:var(--t);min-height:100vh}

/* Setup */
#setup{max-width:500px;margin:0 auto;padding:40px 20px}
#setup h1{text-align:center;color:var(--g);font-size:2rem;margin-bottom:8px}
#setup .sub{text-align:center;color:var(--td);font-size:.7rem;margin-bottom:30px}
.fg{margin-bottom:14px}
.fg label{display:block;color:var(--gd);font-size:.78rem;margin-bottom:3px}
.fg .hint{font-size:.62rem;color:var(--td);margin-bottom:3px}
.fg input,.fg textarea,.fg select{width:100%;background:var(--s);border:1px solid var(--b);color:var(--t);padding:8px;border-radius:var(--r);font-family:var(--f);font-size:.85rem}
.fg textarea{resize:vertical;min-height:45px}
.start{display:block;margin:20px auto 0;padding:12px 40px;background:var(--g);color:var(--bg);border:none;border-radius:var(--r);font-size:1rem;font-family:var(--f);cursor:pointer}
.start:hover{opacity:.9}

/* Game */
#game{display:none;max-width:700px;margin:0 auto;padding:10px 16px 160px}
.bar{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--b);margin-bottom:12px}
.bar-text{flex:1;font-size:.72rem;color:var(--td);overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.bar button{background:none;border:1px solid var(--b);color:var(--td);padding:4px 10px;border-radius:var(--r);font-size:.7rem;cursor:pointer;font-family:var(--f)}
.bar button:hover{border-color:var(--gd);color:var(--t)}

/* Turns */
.turn{margin-bottom:16px;animation:fi .3s}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1}}
.t-act{color:var(--g);font-size:.8rem;padding:4px 0 2px 10px;border-left:2px solid var(--gd);margin-bottom:4px}
.t-nar{line-height:1.9;font-size:.92rem}
.t-nar p{margin-bottom:6px;text-indent:1em}
.t-sys{text-align:center;color:var(--td);font-size:.75rem;padding:6px}
.t-err{color:var(--e);font-size:.78rem;padding:6px 10px;background:rgba(200,60,60,.08);border-radius:var(--r)}
.t-dbg{color:var(--td);font-size:.6rem;padding:4px 8px;background:var(--s);border-radius:var(--r);margin-top:4px;word-break:break-all}
.dots{display:flex;gap:4px;padding:8px 0}
.dots span{width:5px;height:5px;background:var(--gd);border-radius:50%;animation:p 1.2s infinite}
.dots span:nth-child(2){animation-delay:.15s}
.dots span:nth-child(3){animation-delay:.3s}
@keyframes p{0%,80%,100%{opacity:.3}40%{opacity:1}}

/* Input */
.inp{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--b);padding:10px 16px max(10px,env(safe-area-inset-bottom))}
.inp-row{display:flex;gap:6px;max-width:700px;margin:0 auto}
.inp-row textarea{flex:1;background:var(--s);border:1px solid var(--b);color:var(--t);padding:9px;border-radius:var(--r);font-family:var(--f);font-size:.88rem;resize:none;height:40px;max-height:80px}
.inp-row textarea:focus{border-color:var(--gd);outline:none}
.inp-row button{width:40px;height:40px;background:var(--g);border:none;border-radius:var(--r);color:var(--bg);font-size:1rem;cursor:pointer;flex-shrink:0}
.inp-row button:disabled{opacity:.2}
.inp-sub{display:flex;gap:6px;max-width:700px;margin:4px auto 0}
.inp-sub button{padding:3px 10px;background:none;border:1px solid var(--b);color:var(--td);font-size:.65rem;border-radius:3px;cursor:pointer;font-family:var(--f)}
.inp-sub button:hover{border-color:var(--gd);color:var(--t)}
.modes{display:flex;gap:2px;max-width:700px;margin:0 auto 4px}
.mode{flex:1;padding:5px;background:var(--s);border:1px solid transparent;color:var(--td);font-size:.68rem;text-align:center;cursor:pointer;border-radius:3px;font-family:var(--f)}
.mode.on{border-color:var(--gd);color:var(--g);background:var(--bg)}
.t-edit{display:none;font-size:.65rem;color:var(--td);cursor:pointer;margin-top:3px}
.turn:hover .t-edit{display:inline-block}
.t-edit:hover{color:var(--g)}
.t-undo{font-size:.6rem;color:var(--td);cursor:pointer;float:right;margin-top:2px}
.t-undo:hover{color:var(--e)}

/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:50;overflow-y:auto;padding:20px}
.modal-bg.show{display:block}
.modal{max-width:450px;margin:40px auto;background:var(--s);border:1px solid var(--b);border-radius:8px;padding:20px}
.modal h3{color:var(--g);margin-bottom:12px}
.modal-ok{margin-top:12px;padding:7px 24px;background:var(--g);color:var(--bg);border:none;border-radius:var(--r);cursor:pointer;font-family:var(--f)}
.modal-x{float:right;background:none;border:none;color:var(--td);font-size:1.1rem;cursor:pointer}
</style>
</head>
<body>

<!-- ===== SETUP ===== -->
<div id="setup">
<h1>CHRONICLE</h1>
<div class="sub">MVP — まず動くものを</div>

<div class="fg"><label>主人公の名前</label>
<input id="s-name" placeholder="レン、魔王…"></div>

<div class="fg"><label>主人公の説明</label>
<textarea id="s-desc" rows="2" placeholder="中性的で美しい魔王。退屈している。"></textarea></div>

<div class="fg"><label>NPC（1人）の名前</label>
<input id="s-npc" placeholder="ミリア"></div>

<div class="fg"><label>NPCの説明</label>
<textarea id="s-npcd" rows="2" placeholder="16歳の少女。臆病だが好奇心旺盛。"></textarea></div>

<div class="fg"><label>世界観（1-2文）</label>
<textarea id="s-world" rows="2" placeholder="剣と魔法の異世界。"></textarea></div>

<div class="fg"><label>最初のシーン</label>
<textarea id="s-scene" rows="2" placeholder="森の中の小さな泉。静かで、鳥の声が聞こえる。"></textarea></div>

<div class="fg"><label>文体</label>
<select id="s-tone">
<option value="literary">純文学</option>
<option value="dark">ダーク</option>
<option value="light">ラノベ</option>
</select></div>

<div class="fg"><label>NovelAI APIキー</label>
<input type="password" id="s-key" placeholder="pst-...">
<div class="hint"><a href="https://novelai.net/account" target="_blank" style="color:var(--gd)">novelai.net</a> → 永続的APIトークン</div></div>

<label style="display:flex;align-items:center;gap:6px;font-size:.72rem;color:var(--td);margin-bottom:10px">
<input type="checkbox" id="s-debug"> デバッグ表示（プロンプト・生データを画面に表示）
</label>

<button class="start" onclick="startGame()">始める</button>
</div>

<!-- ===== GAME ===== -->
<div id="game">
<div class="bar">
  <span class="bar-text" id="bar">―</span>
  <button onclick="openSettings()">⚙設定</button>
  <button onclick="storyReset()">リセット</button>
</div>
<div id="story"></div>
<div class="inp">
  <div class="modes">
    <button class="mode on" onclick="setMode('do',this)">⚔ DO 行動</button>
    <button class="mode" onclick="setMode('say',this)">💬 SAY 話す</button>
    <button class="mode" onclick="setMode('story',this)">📖 STORY 描写</button>
  </div>
  <div class="inp-row">
    <textarea id="input" placeholder="行動を入力…" rows="1"></textarea>
    <button id="sendbtn" onclick="send()">▶</button>
  </div>
  <div class="inp-sub">
    <button onclick="cont()">続きを書く</button>
    <button onclick="retry()">やり直す</button>
    <button onclick="undo()">↩取消</button>
  </div>
</div>
</div>

<!-- ===== SETTINGS MODAL ===== -->
<div class="modal-bg" id="modal">
<div class="modal">
<button class="modal-x" onclick="closeModal()">✕</button>
<div id="modal-body"></div>
</div>
</div>

<script>
'use strict';

// ========================================
// STATE — 最小限のデータ
// ========================================
const S = {
  hero: '', heroDesc: '',
  npc: '', npcDesc: '', npcEmotion: '',
  world: '', scene: '', tone: 'literary',
  key: '', debug: false,
  mode: 'do',  // do / say / story
  turns: [],   // [{action, mode, text}]
  turnCount: 0,
  busy: false,

  save() {
    localStorage.setItem('chr4', JSON.stringify({
      hero:this.hero, heroDesc:this.heroDesc,
      npc:this.npc, npcDesc:this.npcDesc, npcEmotion:this.npcEmotion,
      world:this.world, scene:this.scene, tone:this.tone,
      key:this.key, debug:this.debug, mode:this.mode,
      turns:this.turns.slice(-20), turnCount:this.turnCount
    }));
  },
  load() {
    try {
      const d = JSON.parse(localStorage.getItem('chr4'));
      if (!d) return false;
      Object.keys(d).forEach(k => { if (k in this) this[k] = d[k]; });
      return this.turns.length > 0 && this.key;
    } catch { return false; }
  }
};

// ========================================
// PROMPT — シンプルに組み立てる
// ========================================
function buildPrompt(action, mode) {
  const parts = [];

  // === 設定は極限まで短く ===
  // 長い世界設定やキャラ説明はKayraが「それを語る」モードに入る原因。
  // 場所名＋名前だけにして、描写はKayraに任せる。

  // 世界は場所名だけ（「灯都市エルシア」→ OK、長い説明 → NG）
  const worldShort = S.world.slice(0, 15);

  if (S.turnCount === 0) {
    // 初回：文体プライミング（場所＋主人公名だけ）
    parts.push(`　${worldShort}。`);
    parts.push(`　${S.hero}はそこにいた。`);
    if (S.npc) parts.push(`　${S.npc}の姿が見えた。`);
  } else {
    // 2回目以降：最小限の状況だけ
    if (S.npc) {
      if (S.npcEmotion) {
        parts.push(`　${S.npc}は${S.npcEmotion}。`);
      } else {
        parts.push(`　${S.npc}がそばにいる。`);
      }
    }
  }

  // === 直近2ターンの行動（行動のみ、AI出力は入れない） ===
  for (const t of S.turns.slice(-2)) {
    if (t.action) {
      if (t.mode === 'say') parts.push(`　${S.hero}は「${t.action}」と言った。`);
      else parts.push(`　${S.hero}は${t.action}。`);
    }
  }

  // === プレイヤーの行動 ===
  if (action) {
    if (mode === 'say') {
      parts.push(`　${S.hero}は「${action}」と言った。`);
    } else if (mode === 'story') {
      // STORYモード制限：主人公の確定行動は書かない。
      // 環境や雰囲気の方向だけ。主人公名を含めない。
      const storyText = action.replace(new RegExp(S.hero, 'g'), '').trim();
      parts.push(`　${storyText}。`);
    } else {
      parts.push(`　${S.hero}は${action}。`);
    }
  }

  // === ★末尾を必ずNPC/環境で終わらせる ===
  // Kayraは末尾を続ける。末尾がNPCなら出力もNPC視点。
  if (S.npc && S.npc.length > 0) {
    const npcStarts = {
      '怯えている': [
        `　${S.npc}の肩が小さく震えた。`,
        `　${S.npc}は目をそらした。`
      ],
      '少し安心している': [
        `　${S.npc}は顔を上げた。`,
        `　${S.npc}は小さく息をついた。`
      ],
      '様子を見ている': [
        `　${S.npc}はじっとこちらを見ている。`,
        `　${S.npc}は黙っている。`
      ]
    };
    const options = npcStarts[S.npcEmotion] || [`　${S.npc}は`];
    parts.push(options[Math.floor(Math.random() * options.length)]);
  } else {
    parts.push('　辺りは静かだった。');
  }

  return parts.join('\n');
}

// ========================================
// API — 防弾仕様
// ========================================
async function callAPI(prompt) {
  const key = S.key.replace(/[^\x20-\x7E]/g, '').trim();
  if (!key) throw new Error('APIキーが空です');

  const body = {
    input: prompt,
    model: 'kayra-v1',
    parameters: {
      max_length: 60,
      min_length: 1,
      use_string: true,
      temperature: 0.65,
      top_k: 40,
      top_p: 0.92,
      tail_free_sampling: 0.95,
      repetition_penalty: 1.5,
      repetition_penalty_range: 2048,
      repetition_penalty_slope: 3.33,
      repetition_penalty_frequency: 0.1,
      repetition_penalty_presence: 0.05
    }
  };

  console.log('=== REQUEST BODY ===', JSON.stringify(body).slice(0, 200));

  const res = await fetch('https://novel-proxy.sansan2103.workers.dev', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + key
    },
    body: JSON.stringify(body)
  });

  // レスポンス全体をテキストで取得（JSONパース失敗に備えて）
  const rawText = await res.text();
  console.log('=== RAW RESPONSE ===', rawText.slice(0, 300));

  if (!res.ok) {
    throw new Error(`API ${res.status}: ${rawText.slice(0, 100)}`);
  }

  // JSONパース
  let data;
  try {
    data = JSON.parse(rawText);
  } catch {
    throw new Error('JSONパース失敗: ' + rawText.slice(0, 100));
  }

  // レスポンス形式を探索（output / text / choices など）
  const output = data.output || data.text || data.result ||
    (data.choices && data.choices[0]?.text) ||
    (data.content && data.content[0]?.text);

  if (!output && output !== '') {
    console.log('=== FULL RESPONSE DATA ===', JSON.stringify(data));
    throw new Error('レスポンスに出力テキストがありません: ' + JSON.stringify(data).slice(0, 100));
  }

  return output;
}

// ========================================
// CLEANER — 主人公の勝手な行動を除去
// ========================================
function clean(raw) {
  if (!raw || typeof raw !== 'string') return '';
  let t = raw;

  // タグ除去
  t = t.replace(/<[^>]{1,60}>/g, '');
  t = t.replace(/\[[^\]]{0,200}\]/g, '');
  t = t.replace(/【[^】]{0,100}】/g, '');
  t = t.replace(/\*{2,}/g, '');

  // メタ除去
  t = t.replace(/^\s*\d{1,3}\s*$/gm, '');
  t = t.replace(/^[\s　]*(第\d+|Chapter|Scene|END|続く).*$/gim, '');
  t = t.replace(/(ブクマ|作者|筆者|ポイント|☆|★).*/g, '');

  // リスト除去
  t = t.replace(/^[\s　]*(武器|防具|HP|MP|名前|年齢|性別|種族|職業)[\s　]*[：:].*/gm, '');
  t = t.replace(/^[\s　]*[-・●▸★→]+\s*.*/gm, '');

  // 整理
  t = t.replace(/\n{3,}/g, '\n').trim();

  // ★主人公の勝手な行動を除去★
  if (S.hero) {
    const heroName = S.hero;
    const sentences = t.split(/(?<=[。！？…」])/);
    const filtered = [];
    for (const s of sentences) {
      const trimmed = s.trim();
      if (trimmed.length < 2) continue;
      
      // (1) 主人公が行動/発言している文 → 除去
      const heroActing = new RegExp(`${heroName}は.*(した|する|ている|ていた|と思|と感じ|ことにし|を決め|に向か|と名乗|と答え)`, 'g');
      const heroSpeaking = new RegExp(`${heroName}は「[^」]+」と(言|呟|叫|答|尋|聞|名乗)`, 'g');
      
      if (heroActing.test(trimmed) || heroSpeaking.test(trimmed)) {
        console.log('=== STRIPPED (hero acting) ===', trimmed.slice(0, 40));
        continue;
      }

      // (2) 設定・概念説明文を除去（場面描写ではなく世界観解説）
      // 「〜とは」「〜と呼ばれる」「〜という」「〜の力は」等は解説文
      if (/とは[、。]|と呼ばれ|という(存在|もの|力|概念|制度)|の力は|の能力は|の契約は|システムは/.test(trimmed)) {
        console.log('=== STRIPPED (lore exposition) ===', trimmed.slice(0, 40));
        continue;
      }

      // (3) 名前混線の修正
      // 主人公名がNPC側で使われてたり、NPC名が主人公側で使われてたりする文を検出
      if (S.npc) {
        // 「NPC名は主人公名と名乗った」のような混線
        const confusion1 = new RegExp(`${S.npc}は.*${heroName}と(名乗|言)`, 'g');
        const confusion2 = new RegExp(`${heroName}は.*${S.npc}と(名乗|言)`, 'g');
        if (confusion1.test(trimmed) || confusion2.test(trimmed)) {
          console.log('=== STRIPPED (name confusion) ===', trimmed.slice(0, 40));
          continue;
        }
      }

      filtered.push(s);
    }
    t = filtered.join('');
    
    if (t.trim().length < 5) {
      // 全部除去されたら、NPC名を含む文だけ探す
      const npcSentences = sentences.filter(s => S.npc && s.includes(S.npc));
      t = npcSentences.length > 0 ? npcSentences.slice(0, 2).join('') : sentences.slice(0, 2).join('');
    }
  }

  // 重複文除去
  const sents = t.split(/(?<=[。！？…」])/);
  const seen = new Set();
  const unique = [];
  for (const s of sents) {
    const k = s.trim().replace(/\s/g, '');
    if (k.length < 2) continue;
    if (seen.has(k)) continue;
    seen.add(k);
    unique.push(s);
  }
  t = unique.join('');

  // 最大4文
  const final = t.split(/(?<=[。！？…」])/);
  t = final.filter(s => s.trim().length > 2).slice(0, 4).join('');

  // 文末で切る
  const last = Math.max(t.lastIndexOf('。'), t.lastIndexOf('！'), t.lastIndexOf('？'), t.lastIndexOf('」'));
  if (last > 0 && last < t.length - 1) t = t.slice(0, last + 1);

  return t.trim();
}

// ========================================
// NPC感情更新（シンプル版）
// ========================================
function updateEmotion(action) {
  if (!action || !S.npc) return;
  // プレイヤーの行動から感情を推測
  // 暴力的
  if (/殴|斬|殺|壊|脅|攻撃|奪|縛|掴|押し倒/.test(action)) S.npcEmotion = '怯えている';
  // 優しい
  else if (/助|守|救|優|癒|治|抱きしめ|撫で/.test(action)) S.npcEmotion = '少し安心している';
  // 会話・探り
  else if (/話|声|聞|尋|質問|名前/.test(action)) S.npcEmotion = '様子を見ている';
  // 寄り道・環境探索（NPCに直接関係ない）
  else if (/見|調べ|探|歩|周囲|触|拾|読/.test(action)) {
    // 寄り道行動 → NPCの感情は変えない（プレイヤーの自由を尊重）
    // ただし、長く無視されたら少し寂しくなる等は将来追加
  }
  // その他 → 変更なし（プレイヤーの意図を尊重）
}

// ========================================
// UI
// ========================================
function setMode(m, btn) {
  S.mode = m;
  document.querySelectorAll('.mode').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  const ph = { do: '行動を入力…', say: '台詞を入力…', story: '描写の方向を入力…' };
  document.getElementById('input').placeholder = ph[m] || ph.do;
}

function addTurn(type, text, turnIdx) {
  const d = document.createElement('div');
  d.className = 'turn';
  const esc = t => { const e = document.createElement('span'); e.textContent = t; return e.innerHTML; };

  if (type === 'act') {
    const modeLabels = { do: '行動', say: '発言', story: '描写' };
    const mode = (turnIdx !== undefined && S.turns[turnIdx]?.mode) || S.mode;
    const label = modeLabels[mode] || '行動';
    d.innerHTML = `<div class="t-act">▸ ${label}：${esc(text)}</div>`;
  }
  else if (type === 'nar') {
    const ps = text.split(/\n+/).filter(p => p.trim());
    d.innerHTML = `<div class="t-nar">${ps.map(p => `<p>${esc(p.trim())}</p>`).join('')}</div>`;
    // 編集ボタン（ターンインデックスがあれば）
    if (turnIdx !== undefined) {
      d.innerHTML += `<span class="t-edit" onclick="editTurn(${turnIdx})">✎ 編集</span>`;
    }
  }
  else if (type === 'sys') d.innerHTML = `<div class="t-sys">${esc(text)}</div>`;
  else if (type === 'err') d.innerHTML = `<div class="t-err">${esc(text)}</div>`;
  else if (type === 'dbg') d.innerHTML = `<div class="t-dbg">${esc(text)}</div>`;

  document.getElementById('story').appendChild(d);
  window.scrollTo(0, document.body.scrollHeight);
}

function showLoad() {
  const d = document.createElement('div');
  d.className = 'turn'; d.id = 'ld';
  d.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';
  document.getElementById('story').appendChild(d);
  window.scrollTo(0, document.body.scrollHeight);
}
function hideLoad() { document.getElementById('ld')?.remove(); }
function setBusy(b) { S.busy = b; document.getElementById('sendbtn').disabled = b; }

// ========================================
// GAME LOGIC
// ========================================
function startGame() {
  S.hero = document.getElementById('s-name').value.trim() || '冒険者';
  S.heroDesc = document.getElementById('s-desc').value.trim() || '謎多き旅人';
  S.npc = document.getElementById('s-npc').value.trim() || '';
  S.npcDesc = document.getElementById('s-npcd').value.trim() || '';
  S.world = document.getElementById('s-world').value.trim() || '異世界';
  S.scene = document.getElementById('s-scene').value.trim() || '';
  S.tone = document.getElementById('s-tone').value;
  S.key = document.getElementById('s-key').value.replace(/[^\x20-\x7E]/g, '').trim();
  S.debug = document.getElementById('s-debug').checked;

  if (!S.key) { alert('APIキーを入力してください'); return; }

  S.turns = [];
  S.turnCount = 0;
  S.npcEmotion = '';
  S.save();

  document.getElementById('setup').style.display = 'none';
  document.getElementById('game').style.display = 'block';

  addTurn('sys', `${S.world} — ${S.hero}：${S.heroDesc}`);
  if (S.npc) addTurn('sys', `NPC：${S.npc} — ${S.npcDesc}`);
  addTurn('sys', '行動を入力してください。');
  document.getElementById('bar').textContent = S.scene || S.world;
}

function resumeGame() {
  document.getElementById('setup').style.display = 'none';
  document.getElementById('game').style.display = 'block';
  refreshStory();
}

async function send() {
  if (S.busy) return;
  const inp = document.getElementById('input');
  const action = inp.value.trim();
  if (!action) return;

  setBusy(true);
  inp.value = '';
  const mode = S.mode;

  const modeLabels = { do: '行動', say: '発言', story: '描写' };
  addTurn('act', action);

  showLoad();

  try {
    updateEmotion(action);
    const prompt = buildPrompt(action, mode);

    if (S.debug) addTurn('dbg', `PROMPT (${prompt.length}文字): ${prompt}`);

    const raw = await callAPI(prompt);

    if (S.debug) addTurn('dbg', `RAW: ${(raw || '').slice(0, 200)}`);

    let text = clean(raw);
    if (!text || text.length < 3) {
      text = '（生成できませんでした。やり直しを試してください。）';
    }

    hideLoad();

    const idx = S.turns.length;  // このターンのインデックス
    addTurn('nar', text, idx);

    S.turns.push({ action, mode, text });
    if (S.turns.length > 20) S.turns = S.turns.slice(-20);
    S.turnCount++;
    S.scene = text.slice(-40);
    document.getElementById('bar').textContent = S.scene;
    S.save();

  } catch (err) {
    hideLoad();
    addTurn('err', `エラー: ${err.message}`);
    if (S.debug) addTurn('dbg', `Stack: ${err.stack?.slice(0, 200)}`);
    console.error(err);
  }

  setBusy(false);
}

// 直前出力を編集
function editTurn(idx) {
  if (idx < 0 || idx >= S.turns.length) return;
  const turn = S.turns[idx];
  const el = document.getElementById('modal-body');
  el.innerHTML = `
    <h3>出力を編集</h3>
    <div class="fg"><label>本文</label>
    <textarea id="edit-text" rows="6" style="min-height:120px">${turn.text || ''}</textarea></div>
    <button class="modal-ok" onclick="
      S.turns[${idx}].text = document.getElementById('edit-text').value.trim();
      S.save();
      closeModal();
      refreshStory();
    ">保存</button>`;
  document.getElementById('modal').classList.add('show');
}

// 物語表示をリフレッシュ
function refreshStory() {
  const story = document.getElementById('story');
  story.innerHTML = '';
  addTurn('sys', S.world + ' — ' + S.hero);
  if (S.npc) addTurn('sys', 'NPC：' + S.npc);
  for (let i = 0; i < S.turns.length; i++) {
    const t = S.turns[i];
    if (t.action) addTurn('act', t.action, i);
    if (t.text) addTurn('nar', t.text, i);
  }
}

// Undo — 直前ターンを完全に取り消す
function undo() {
  if (S.turns.length === 0) return;
  if (!confirm('直前のターンを取り消しますか？')) return;
  S.turns.pop();
  S.turnCount = Math.max(0, S.turnCount - 1);
  S.scene = S.turns.length > 0 ? (S.turns[S.turns.length-1].text || '').slice(-40) : '';
  S.save();
  refreshStory();
}

async function cont() {
  if (S.busy || S.turns.length === 0) return;
  setBusy(true); showLoad();
  try {
    const prompt = buildPrompt(null, 'story');
    const raw = await callAPI(prompt);
    let text = clean(raw);
    if (!text) text = '（続きを生成できませんでした。）';
    hideLoad();
    const idx = S.turns.length;
    addTurn('nar', text, idx);
    S.turns.push({ action: null, mode: 'story', text });
    S.turnCount++;
    S.save();
  } catch (err) {
    hideLoad();
    addTurn('err', `エラー: ${err.message}`);
  }
  setBusy(false);
}

async function retry() {
  if (S.busy || S.turns.length === 0) return;
  const last = S.turns.pop();
  S.turnCount = Math.max(0, S.turnCount - 1);
  S.save();
  refreshStory();
  if (last?.action) {
    document.getElementById('input').value = last.action;
    S.mode = last.mode || 'do';
    // モードボタンも更新
    document.querySelectorAll('.mode').forEach(b => {
      b.classList.toggle('on', b.textContent.toLowerCase().includes(S.mode));
    });
    await send();
  }
}

function storyReset() {
  if (!confirm('物語をリセットしますか？（設定とAPIキーは残ります）')) return;
  S.turns = [];
  S.turnCount = 0;
  S.npcEmotion = '';
  S.scene = '';
  S.save();
  location.reload();
}

function openSettings() {
  const el = document.getElementById('modal-body');
  el.innerHTML = `
    <h3>設定</h3>
    <div class="fg"><label>主人公</label><input id="e-hero" value="${S.hero}"></div>
    <div class="fg"><label>主人公説明</label><textarea id="e-desc" rows="2">${S.heroDesc}</textarea></div>
    <div class="fg"><label>NPC名</label><input id="e-npc" value="${S.npc}"></div>
    <div class="fg"><label>NPC説明</label><textarea id="e-npcd" rows="2">${S.npcDesc}</textarea></div>
    <div class="fg"><label>世界観</label><textarea id="e-world" rows="2">${S.world}</textarea></div>
    <div class="fg"><label>APIキー</label><input type="password" id="e-key" value="${S.key}"></div>
    <button class="modal-ok" onclick="
      S.hero=document.getElementById('e-hero').value.trim()||S.hero;
      S.heroDesc=document.getElementById('e-desc').value.trim()||S.heroDesc;
      S.npc=document.getElementById('e-npc').value.trim();
      S.npcDesc=document.getElementById('e-npcd').value.trim();
      S.world=document.getElementById('e-world').value.trim()||S.world;
      S.key=document.getElementById('e-key').value.replace(/[^\\x20-\\x7E]/g,'').trim()||S.key;
      S.save(); closeModal(); addTurn('sys','設定を更新しました。');
    ">保存</button>
    <div style="margin-top:16px;padding-top:12px;border-top:1px solid var(--b)">
      <button style="padding:6px 14px;background:var(--e);color:white;border:none;border-radius:var(--r);cursor:pointer;font-size:.75rem" onclick="if(confirm('全データを削除しますか？')){localStorage.removeItem('chr4');location.reload()}">完全リセット</button>
    </div>`;
  document.getElementById('modal').classList.add('show');
}
function closeModal() { document.getElementById('modal').classList.remove('show'); }

// Keyboard
document.getElementById('input')?.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
document.getElementById('input')?.addEventListener('input', function() {
  this.style.height = '40px';
  this.style.height = Math.min(this.scrollHeight, 80) + 'px';
});

// ========================================
// INIT
// ========================================
(function() {
  const ok = S.load();
  if (ok) {
    resumeGame();
  } else {
    // フォーム復元
    if (S.hero) document.getElementById('s-name').value = S.hero;
    if (S.heroDesc) document.getElementById('s-desc').value = S.heroDesc;
    if (S.npc) document.getElementById('s-npc').value = S.npc;
    if (S.npcDesc) document.getElementById('s-npcd').value = S.npcDesc;
    if (S.world) document.getElementById('s-world').value = S.world;
    if (S.scene) document.getElementById('s-scene').value = S.scene;
    if (S.tone) document.getElementById('s-tone').value = S.tone;
    if (S.key) document.getElementById('s-key').value = S.key;
    if (S.debug) document.getElementById('s-debug').checked = true;
  }
})();
</script>
