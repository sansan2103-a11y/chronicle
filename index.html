<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chronicle — AI RPG</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Cinzel:wght@400;700&display=swap');

:root {
  --bg: #0a0a0f;
  --bg2: #12121a;
  --bg3: #1a1a26;
  --gold: #c8a44e;
  --gold-dim: #8a7235;
  --text: #d4c5a0;
  --text-dim: #7a7060;
  --red: #a83232;
  --blue: #3a5a8a;
  --accent: #e8d5a0;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Noto Serif JP', serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
}

/* ===== SETUP SCREEN ===== */
#setup {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100dvh;
  padding: 20px;
  background: radial-gradient(ellipse at center, #1a1520 0%, #0a0a0f 70%);
}

#setup h1 {
  font-family: 'Cinzel', serif;
  font-size: clamp(2rem, 6vw, 3.5rem);
  color: var(--gold);
  letter-spacing: 0.15em;
  margin-bottom: 8px;
  text-shadow: 0 0 30px rgba(200,164,78,0.3);
}

#setup .subtitle {
  font-size: 0.75rem;
  color: var(--text-dim);
  letter-spacing: 0.3em;
  margin-bottom: 40px;
}

.setup-group {
  width: 100%;
  max-width: 500px;
  margin-bottom: 24px;
}

.setup-group label {
  display: block;
  font-size: 0.85rem;
  color: var(--gold);
  margin-bottom: 6px;
  letter-spacing: 0.05em;
}

.setup-group .hint {
  font-size: 0.7rem;
  color: var(--text-dim);
  margin-bottom: 8px;
  line-height: 1.5;
}

.setup-group input,
.setup-group textarea {
  width: 100%;
  background: var(--bg2);
  border: 1px solid var(--gold-dim);
  color: var(--text);
  padding: 10px 14px;
  border-radius: 4px;
  font-family: 'Noto Serif JP', serif;
  font-size: 0.9rem;
  outline: none;
  transition: border-color 0.2s;
}

.setup-group input:focus,
.setup-group textarea:focus {
  border-color: var(--gold);
}

.setup-group textarea { resize: vertical; min-height: 60px; }

#btn-start {
  font-family: 'Cinzel', serif;
  font-size: 1rem;
  background: linear-gradient(135deg, var(--gold-dim), var(--gold));
  color: var(--bg);
  border: none;
  padding: 14px 48px;
  border-radius: 4px;
  cursor: pointer;
  letter-spacing: 0.1em;
  font-weight: 700;
  margin-top: 16px;
  transition: transform 0.15s, box-shadow 0.15s;
}

#btn-start:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(200,164,78,0.3); }
#btn-start:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

.key-note {
  font-size: 0.65rem;
  color: var(--text-dim);
  margin-top: 4px;
  line-height: 1.4;
}

.key-note a { color: var(--gold-dim); }

/* ===== GAME SCREEN ===== */
#game { display: none; flex-direction: column; min-height: 100dvh; }

/* Top bar */
.topbar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 16px;
  background: var(--bg2);
  border-bottom: 1px solid #2a2a35;
  font-size: 0.75rem;
  flex-wrap: wrap;
}

.stat { display: flex; align-items: center; gap: 4px; }
.stat-bar {
  width: 60px; height: 6px;
  background: #2a2a35;
  border-radius: 3px;
  overflow: hidden;
}
.stat-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
.hp-fill { background: var(--red); width: 100%; }
.mp-fill { background: var(--blue); width: 100%; }

.topbar .lv { color: var(--gold); font-weight: 700; margin-left: auto; }

/* Story area */
.story-area {
  flex: 1;
  overflow-y: auto;
  padding: 20px 16px 120px;
  scroll-behavior: smooth;
}

.story-block {
  margin-bottom: 16px;
  animation: fadeIn 0.4s ease;
}

@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

.story-block.narrator {
  line-height: 1.9;
  font-size: 0.95rem;
  color: var(--text);
}

.story-block.action {
  color: var(--gold);
  font-size: 0.85rem;
  padding: 8px 0;
  border-left: 2px solid var(--gold-dim);
  padding-left: 12px;
}

.story-block.action::before {
  content: '▸ ';
  color: var(--gold-dim);
}

.story-block.system {
  color: var(--text-dim);
  font-size: 0.8rem;
  text-align: center;
  padding: 12px;
}

.story-block.error {
  color: #c44;
  font-size: 0.8rem;
  padding: 8px 12px;
  background: rgba(200,60,60,0.1);
  border-radius: 4px;
}

/* Loading */
.loading-dots { display: inline-flex; gap: 4px; padding: 12px 0; }
.loading-dots span {
  width: 6px; height: 6px;
  background: var(--gold-dim);
  border-radius: 50%;
  animation: bounce 1.2s infinite;
}
.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,80%,100% { transform:translateY(0); } 40% { transform:translateY(-8px); } }

/* Input area */
.input-area {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--bg2);
  border-top: 1px solid #2a2a35;
  padding: 10px 12px;
  padding-bottom: max(10px, env(safe-area-inset-bottom));
}

.mode-tabs {
  display: flex;
  gap: 2px;
  margin-bottom: 8px;
}

.mode-tab {
  flex: 1;
  padding: 6px;
  background: var(--bg3);
  border: 1px solid transparent;
  color: var(--text-dim);
  font-size: 0.7rem;
  font-family: 'Noto Serif JP', serif;
  cursor: pointer;
  border-radius: 3px;
  text-align: center;
  transition: all 0.15s;
}

.mode-tab.active {
  background: var(--bg);
  border-color: var(--gold-dim);
  color: var(--gold);
}

.input-row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
}

.input-row textarea {
  flex: 1;
  background: var(--bg);
  border: 1px solid #2a2a35;
  color: var(--text);
  padding: 10px 12px;
  border-radius: 6px;
  font-family: 'Noto Serif JP', serif;
  font-size: 0.9rem;
  resize: none;
  height: 42px;
  max-height: 100px;
  outline: none;
  line-height: 1.4;
}

.input-row textarea:focus { border-color: var(--gold-dim); }

.btn-send {
  width: 42px;
  height: 42px;
  background: var(--gold);
  border: none;
  border-radius: 6px;
  color: var(--bg);
  font-size: 1.2rem;
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0.15s;
}

.btn-send:disabled { opacity: 0.3; cursor: not-allowed; }

.action-btns {
  display: flex;
  gap: 6px;
  margin-top: 6px;
}

.action-btn {
  padding: 5px 14px;
  background: transparent;
  border: 1px solid #2a2a35;
  color: var(--text-dim);
  font-size: 0.7rem;
  font-family: 'Noto Serif JP', serif;
  cursor: pointer;
  border-radius: 3px;
  transition: all 0.15s;
}

.action-btn:hover { border-color: var(--gold-dim); color: var(--text); }
.action-btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* Settings overlay */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.overlay.show { display: flex; }

.overlay-box {
  background: var(--bg2);
  border: 1px solid var(--gold-dim);
  border-radius: 8px;
  padding: 24px;
  max-width: 480px;
  width: 100%;
  max-height: 80vh;
  overflow-y: auto;
}

.overlay-box h3 {
  color: var(--gold);
  font-size: 1rem;
  margin-bottom: 16px;
  font-family: 'Cinzel', serif;
}

.overlay-box .close-btn {
  float: right;
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 1.2rem;
  cursor: pointer;
}

.overlay-box label { display: block; color: var(--gold-dim); font-size: 0.8rem; margin: 12px 0 4px; }
.overlay-box textarea, .overlay-box input[type="text"], .overlay-box input[type="password"] {
  width: 100%;
  background: var(--bg);
  border: 1px solid #2a2a35;
  color: var(--text);
  padding: 8px 10px;
  border-radius: 4px;
  font-family: 'Noto Serif JP', serif;
  font-size: 0.85rem;
}

.overlay-box textarea { min-height: 80px; resize: vertical; }

.overlay-box .save-btn {
  margin-top: 16px;
  padding: 8px 24px;
  background: var(--gold);
  color: var(--bg);
  border: none;
  border-radius: 4px;
  font-family: 'Noto Serif JP', serif;
  cursor: pointer;
}
</style>
</head>
<body>

<!-- ===== SETUP SCREEN ===== -->
<div id="setup">
  <h1>CHRONICLE</h1>
  <div class="subtitle">YOUR STORY · YOUR RULES</div>

  <div class="setup-group">
    <label>▸ 主人公の名前</label>
    <input type="text" id="s-name" placeholder="例：魔王、リン、旅人…">
  </div>

  <div class="setup-group">
    <label>▸ 主人公の説明</label>
    <div class="hint">職業・外見・性格・能力など。書いた内容がそのままゲームに反映される。</div>
    <textarea id="s-hero" rows="3" placeholder="例：中性的な見た目の魔王。圧倒的な魔力を持つが退屈している。"></textarea>
  </div>

  <div class="setup-group">
    <label>▸ 世界・舞台</label>
    <div class="hint">舞台・時代・世界観・始まりの場所。空欄ならAIが決める。</div>
    <textarea id="s-world" rows="2" placeholder="例：日本の大阪、中世ファンタジー…"></textarea>
  </div>

  <div class="setup-group">
    <label>▸ 文体</label>
    <div class="hint">AIの文章スタイルを選択。</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;">
      <label style="display:flex;align-items:center;gap:4px;cursor:pointer;padding:8px 12px;background:var(--bg2);border:1px solid var(--gold-dim);border-radius:4px;font-size:0.8rem;">
        <input type="radio" name="s-tone" value="literary" checked style="accent-color:var(--gold);"> 純文学（リアル・描写的）
      </label>
      <label style="display:flex;align-items:center;gap:4px;cursor:pointer;padding:8px 12px;background:var(--bg2);border:1px solid var(--gold-dim);border-radius:4px;font-size:0.8rem;">
        <input type="radio" name="s-tone" value="dark" style="accent-color:var(--gold);"> ダーク（残酷・生々しい）
      </label>
      <label style="display:flex;align-items:center;gap:4px;cursor:pointer;padding:8px 12px;background:var(--bg2);border:1px solid var(--gold-dim);border-radius:4px;font-size:0.8rem;">
        <input type="radio" name="s-tone" value="light" style="accent-color:var(--gold);"> ラノベ（軽快・テンポ重視）
      </label>
    </div>
  </div>

  <div class="setup-group">
    <label>▸ NovelAI APIキー</label>
    <input type="password" id="s-key" placeholder="pst-...">
    <div class="key-note">キーはブラウザ内にのみ保存。<a href="https://novelai.net/account" target="_blank">novelai.net</a> → アカウント設定 → 永続的APIトークン</div>
  </div>

  <button id="btn-start" onclick="startGame()">冒険を始める</button>
</div>

<!-- ===== GAME SCREEN ===== -->
<div id="game">
  <div class="topbar">
    <div class="stat">❤ <div class="stat-bar"><div class="stat-bar-fill hp-fill"></div></div></div>
    <div class="stat">✦ <div class="stat-bar"><div class="stat-bar-fill mp-fill"></div></div></div>
    <div class="lv">Lv.1</div>
    <button class="action-btn" onclick="showSettings()" style="margin-left:auto;">⚙</button>
  </div>

  <div class="story-area" id="story-area"></div>

  <div class="input-area">
    <div class="mode-tabs">
      <button class="mode-tab active" data-mode="do" onclick="setMode('do',this)">⚔ 行動する</button>
      <button class="mode-tab" data-mode="say" onclick="setMode('say',this)">💬 話す</button>
      <button class="mode-tab" data-mode="story" onclick="setMode('story',this)">📖 描写</button>
    </div>
    <div class="input-row">
      <textarea id="user-input" placeholder="行動を入力…" rows="1" onkeydown="handleKey(event)"></textarea>
      <button class="btn-send" id="btn-send" onclick="send()">▶</button>
    </div>
    <div class="action-btns">
      <button class="action-btn" id="btn-continue" onclick="doContinue()">続きを書く</button>
      <button class="action-btn" id="btn-retry" onclick="doRetry()">やり直す</button>
    </div>
  </div>
</div>

<!-- ===== SETTINGS OVERLAY ===== -->
<div class="overlay" id="settings-overlay">
  <div class="overlay-box">
    <button class="close-btn" onclick="hideSettings()">✕</button>
    <h3>SETTINGS</h3>
    <label>主人公の名前</label>
    <input type="text" id="set-name">
    <label>主人公の説明</label>
    <textarea id="set-hero"></textarea>
    <label>世界設定</label>
    <textarea id="set-world"></textarea>
    <label>文体</label>
    <select id="set-tone" style="width:100%;background:var(--bg);border:1px solid #2a2a35;color:var(--text);padding:8px;border-radius:4px;font-family:'Noto Serif JP',serif;font-size:0.85rem;">
      <option value="literary">純文学（リアル・描写的）</option>
      <option value="dark">ダーク（残酷・生々しい）</option>
      <option value="light">ラノベ（軽快・テンポ重視）</option>
    </select>
    <label>NovelAI APIキー</label>
    <input type="password" id="set-key">
    <button class="save-btn" onclick="saveSettings()">保存</button>
  </div>
</div>

<script>
// ===== STATE =====
const STATE = {
  heroName: '',
  heroDesc: '',
  world: '',
  apiKey: '',
  tone: 'literary',   // literary / dark / light
  mode: 'do',        // do / say / story
  storyText: '',      // 全ストーリーのクリーンテキスト
  lastPrompt: '',     // 最後に送ったプロンプト（retry用）
  lastAction: '',     // 最後のユーザー入力（retry用）
  lastMode: 'do',     // 最後のモード（retry用）
  busy: false
};

const PROXY_URL = 'https://novel-proxy.sansan2103.workers.dev';

// ===== INIT =====
function init() {
  // Restore saved settings
  STATE.heroName = localStorage.getItem('chr_name') || '';
  STATE.heroDesc = localStorage.getItem('chr_hero') || '';
  STATE.world = localStorage.getItem('chr_world') || '';
  STATE.apiKey = localStorage.getItem('chronicle_key') || '';
  STATE.tone = localStorage.getItem('chr_tone') || 'literary';

  document.getElementById('s-name').value = STATE.heroName;
  document.getElementById('s-hero').value = STATE.heroDesc;
  document.getElementById('s-world').value = STATE.world;
  document.getElementById('s-key').value = STATE.apiKey;
  // Restore tone radio
  const toneRadio = document.querySelector(`input[name="s-tone"][value="${STATE.tone}"]`);
  if (toneRadio) toneRadio.checked = true;
}

init();

// ===== START GAME =====
function startGame() {
  STATE.heroName = document.getElementById('s-name').value.trim() || '冒険者';
  STATE.heroDesc = document.getElementById('s-hero').value.trim() || '謎多き旅人';
  STATE.world = document.getElementById('s-world').value.trim() || '剣と魔法の異世界';
  STATE.apiKey = document.getElementById('s-key').value.trim();
  STATE.tone = document.querySelector('input[name="s-tone"]:checked')?.value || 'literary';

  if (!STATE.apiKey) {
    alert('APIキーを入力してください');
    return;
  }

  // Save
  localStorage.setItem('chr_name', STATE.heroName);
  localStorage.setItem('chr_hero', STATE.heroDesc);
  localStorage.setItem('chr_world', STATE.world);
  localStorage.setItem('chronicle_key', STATE.apiKey);
  localStorage.setItem('chr_tone', STATE.tone);

  // Switch screen
  document.getElementById('setup').style.display = 'none';
  document.getElementById('game').style.display = 'flex';

  // Show intro message
  addBlock('system', `【${STATE.world}】 ${STATE.heroName}：${STATE.heroDesc}`);
  addBlock('system', '最初の行動を入力してください。');
}

// ===== DISPLAY =====
function addBlock(type, text) {
  const area = document.getElementById('story-area');
  const div = document.createElement('div');
  div.className = `story-block ${type}`;
  div.textContent = text;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function addLoading() {
  const area = document.getElementById('story-area');
  const div = document.createElement('div');
  div.className = 'story-block narrator';
  div.id = 'loading';
  div.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function removeLoading() {
  const el = document.getElementById('loading');
  if (el) el.remove();
}

// ===== MODE =====
function setMode(mode, btn) {
  STATE.mode = mode;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  const input = document.getElementById('user-input');
  const placeholders = { do: '行動を入力…', say: '台詞を入力…', story: '展開を記述…' };
  input.placeholder = placeholders[mode] || '';
  input.focus();
}

// ===== PROMPT BUILDING =====
// Kayraは純粋なテキスト補完モデル。
// プロンプトの末尾をそのまま「続ける」だけ。
// だからユーザーの行動をプロンプトの最後の文にして、
// Kayraにその直後を書かせる。

function buildPrompt(action, mode) {
  // ===== KAYRA戦略 =====
  // 全モードで必ず：
  // 1. 主人公の名前を含める（誰の話かアンカー）
  // 2. 末尾を未完成にする（Kayraに続きを強制）

  let actionLine = '';
  if (action && action.trim()) {
    const act = action.trim();

    // まず行動文を作る（全モード共通で主人公名を含む）
    let sentence = '';
    if (mode === 'say') {
      sentence = `${STATE.heroName}は「${act}」と言った。`;
    } else {
      // 行動・描写モード共通
      // 動詞の末尾で判定して自然な文にする
      if (act.endsWith('る') || act.endsWith('す') || act.endsWith('く') || act.endsWith('ぐ') || act.endsWith('む') || act.endsWith('ぶ') || act.endsWith('つ') || act.endsWith('ぬ')) {
        sentence = `${STATE.heroName}は${act}ことにした。`;
      } else if (act.endsWith('した') || act.endsWith('った') || act.endsWith('いた') || act.endsWith('んだ') || act.endsWith('てた')) {
        sentence = `${STATE.heroName}は${act}。`;
      } else if (act.endsWith('て') || act.endsWith('で')) {
        sentence = `${STATE.heroName}は${act}みた。`;
      } else if (act.endsWith('。') || act.endsWith('！') || act.endsWith('？')) {
        sentence = `${STATE.heroName}は${act}`;
      } else {
        sentence = `${STATE.heroName}は${act}した。`;
      }
    }

    // 末尾を「すると、」で終わらせて、Kayraに結果を書かせる
    actionLine = `　${sentence}すると、`;
  }

  // ===== プロンプト組み立て =====
  let prompt = '';

  if (STATE.storyText.length === 0) {
    // 初回：文体に応じたプライミングテキスト
    // Kayraは直前の文体を真似る → ここで文体が決まる

    if (STATE.tone === 'dark') {
      // ダーク：残酷で生々しい描写
      prompt += `　${STATE.world}。薄暗い空気が肌に纏わりつく。嫌な予感がする。この場所には、何かが潜んでいる。\n`;
      prompt += `　${STATE.heroName}。${STATE.heroDesc}。その目には、常人には理解できない冷たさが宿っている。\n`;
      prompt += `　${STATE.heroName}は足を止めた。空気の中に、血の匂いが混じっている気がした。\n`;
    } else if (STATE.tone === 'light') {
      // ラノベ：テンポ良く軽快
      prompt += `　${STATE.world}。\n`;
      prompt += `　${STATE.heroName}は${STATE.heroDesc}。\n`;
      prompt += `　さて、今日も一日が始まる。${STATE.heroName}は大きく伸びをした。\n`;
    } else {
      // 純文学（デフォルト）：五感描写、心理描写、リアリティ重視
      prompt += `　${STATE.world}。空気は湿り気を帯び、微かに土と埃の匂いが漂っている。光が斜めに差し込み、空間の輪郭を浮かび上がらせた。\n`;
      prompt += `　${STATE.heroName}――${STATE.heroDesc}。\n`;
      prompt += `　${STATE.heroName}は息を吐き、周囲に目を向けた。風が頬を撫でる。遠くで何かの音がする。皮膚が、空気の変化を感じ取っていた。\n`;
    }

    if (actionLine) {
      prompt += actionLine;
    }
  } else {
    // 2回目以降：直近の文脈＋行動
    // 文脈は短く（200文字）— 長いとKayraが文脈の悪いパターンを真似る
    let context = STATE.storyText.trim();
    context = context.length > 200 ? context.slice(-200) : context;
    // 文脈を文末で切る（途中の文は不要）
    const firstEnd = Math.max(
      context.indexOf('。'), context.indexOf('！'),
      context.indexOf('？'), context.indexOf('」')
    );
    if (firstEnd > 0 && firstEnd < context.length - 10) {
      context = context.slice(firstEnd + 1).trim();
    }
    prompt += context + '\n';
    if (actionLine) {
      prompt += actionLine;
    }
  }

  return prompt;
}

// ===== API CALL =====
async function callKayra(prompt) {
  const res = await fetch(PROXY_URL, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + STATE.apiKey
    },
    body: JSON.stringify({
      input: prompt,
      model: 'kayra-v1',
      parameters: {
        max_length: 100,
        min_length: 1,
        use_string: true,
        temperature: 0.72,
        top_k: 50,
        top_p: 0.95,
        tail_free_sampling: 0.975,
        repetition_penalty: 1.5,
        repetition_penalty_range: 2048,
        repetition_penalty_slope: 3.33,
        repetition_penalty_frequency: 0.1,
        repetition_penalty_presence: 0.05,
        ban_bracket_generation: true
      }
    })
  });

  if (!res.ok) {
    const text = await res.text();
    throw new Error(`API Error ${res.status}: ${text}`);
  }

  const data = await res.json();
  if (data.error) throw new Error(data.error || data.message || JSON.stringify(data));
  return data.output || '';
}

// ===== OUTPUT CLEANING =====
function cleanOutput(raw) {
  let text = raw;

  // NovelAIルビタグ除去 — <rubycover>本文<rubystart>ルビ<rubyend> → 本文
  text = text.replace(/<rubycover>([^<]*)<rubystart>[^<]*<rubyend>/g, '$1');
  // 残ったrubyタグ断片も除去
  text = text.replace(/<\/?ruby(cover|start|end)>/g, '');
  // その他のHTMLタグも除去
  text = text.replace(/<[^>]{1,50}>/g, '');

  // ATTG タグ除去 [ ... ]
  text = text.replace(/\[[^\]]{0,200}\]/g, '');

  // 【】で囲まれたメタテキスト除去（作者コメント、選択肢UI等）
  text = text.replace(/【[^】]{0,100}】/g, '');

  // > action 形式を除去
  text = text.replace(/^>.*$/gm, '');

  // *** 区切りを除去
  text = text.replace(/\*{2,}/g, '');

  // Web小説メタ（作者コメント、評価依頼、ブクマ）を丸ごと除去
  // 「と、思ってくれたなら」以降の作者コメントパターン
  text = text.replace(/と、思って(くれた|もらえた)なら.*/gs, '');
  // ブクマ・評価・応援系
  text = text.replace(/(ブクマ|ブックマーク|お気に入り|ポイント評価|☆|★|応援|感想|コメント|フォロー).*(嬉しい|ください|お願い|よろしく|ありがと).*/g, '');
  // 作者からのお願い系
  text = text.replace(/(作者|筆者|著者)から.*/g, '');
  // 「面白かった！」「続きが気になる」パターン
  text = text.replace(/[「『]*(面白かった|続きが気になる|次回も|次話|更新)[！!」』]*/g, '');
  // 「→」で始まる選択肢風テキスト
  text = text.replace(/^.*→.*「.*」.*$/gm, '');
  // 「を選択。」パターン
  text = text.replace(/.*を選択[。．.]*/g, '');

  // メタ情報・指示文の漏出を除去
  text = text.replace(/^[\s　]*(Author|Tags|Genre|Setting|Note|Chapter|Scene|END|続く|つづく).*$/gim, '');
  text = text.replace(/第\d+[話章回節部].*/gm, '');
  text = text.replace(/^[\s　]*(最初の行動|行動を入力|入力してください|主人公[：:]).*/gm, '');
  // 章番号（行全体が数字だけの行）を除去
  text = text.replace(/^\s*\d{1,3}\s*$/gm, '');
  // 「第N話」「Chapter N」形式
  text = text.replace(/^[\s　]*(第\d+|Chapter\s*\d+|Episode\s*\d+|#\d+).*/gim, '');

  // リスト系を除去
  text = text.replace(/^[\s　]*(武器|防具|アイテム|スキル|能力|ステータス|HP|MP|攻撃力|防御力|所持|装備|レベル|Lv|種族|職業|称号|クエスト|名前|年齢|性別|身長|体重|好き|嫌い|趣味|特技|属性)[\s　]*[：:].*/gm, '');

  // 箇条書き除去
  text = text.replace(/^[\s　]*[-・●▸▹►◆◇★☆※→⇒]+\s*.*/gm, '');

  // 番号付きリスト除去
  text = text.replace(/^[\s　]*\d+[\.)）]\s*.*/gm, '');

  // 空行を整理
  text = text.replace(/\n{3,}/g, '\n\n');
  text = text.trim();

  // ループ検出＆除去（類似文も検出）
  // === フレーズループ検出（8文字以上の同一フレーズが3回出たらそこで切る） ===
  const phrases = text.replace(/[\s　]/g, '');
  for (let len = 12; len >= 8; len--) {
    for (let i = 0; i <= phrases.length - len; i++) {
      const phrase = phrases.slice(i, i + len);
      const regex = new RegExp(phrase.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g');
      const matches = phrases.match(regex);
      if (matches && matches.length >= 3) {
        // 2回目の出現位置で切る
        const first = text.replace(/[\s　]/g, '').indexOf(phrase);
        const second = text.replace(/[\s　]/g, '').indexOf(phrase, first + len);
        if (second > 0) {
          // 元テキストでの対応位置を見つけて切る
          let count = 0;
          let cutPos = 0;
          for (let j = 0; j < text.length && count < second; j++) {
            if (text[j] !== ' ' && text[j] !== '　' && text[j] !== '\n') count++;
            cutPos = j;
          }
          text = text.slice(0, cutPos);
          // 最後の文末で切る
          const lastSentEnd = Math.max(
            text.lastIndexOf('。'), text.lastIndexOf('！'),
            text.lastIndexOf('？'), text.lastIndexOf('」')
          );
          if (lastSentEnd > text.length * 0.3) {
            text = text.slice(0, lastSentEnd + 1);
          }
        }
        break;
      }
    }
  }

  // === 文レベルの類似検出 ===
  const sentences = text.split(/(?<=[。！？…」』])/);
  const unique = [];
  
  for (const s of sentences) {
    const key = s.trim().replace(/[\s　]/g, '');
    if (key.length < 3) continue;
    
    let isDuplicate = false;
    for (const prev of unique) {
      const prevKey = prev.trim().replace(/[\s　]/g, '');
      const shorter = Math.min(key.length, prevKey.length);
      if (shorter < 5) continue;
      
      let common = 0;
      for (let i = 0; i < key.length - 3; i++) {
        if (prevKey.includes(key.slice(i, i + 4))) common++;
      }
      if (common / (shorter - 3) > 0.5) {
        isDuplicate = true;
        break;
      }
    }
    
    if (!isDuplicate) unique.push(s);
  }
  text = unique.join('');

  // 最後の完全な文で切る（。！？…」』のいずれかで終わる位置）
  const lastEnd = Math.max(
    text.lastIndexOf('。'),
    text.lastIndexOf('！'),
    text.lastIndexOf('？'),
    text.lastIndexOf('…'),
    text.lastIndexOf('」'),
    text.lastIndexOf('』')
  );
  if (lastEnd > 0 && lastEnd < text.length - 1) {
    text = text.slice(0, lastEnd + 1);
  }

  return text.trim();
}

// ===== SEND =====
async function send() {
  if (STATE.busy) return;
  const input = document.getElementById('user-input');
  const action = input.value.trim();
  if (!action) return;

  STATE.busy = true;
  setUIBusy(true);
  input.value = '';

  // ユーザーの行動を表示
  const modeLabels = { do: '行動', say: '発言', story: '描写' };
  addBlock('action', `${modeLabels[STATE.mode]}：${action}`);

  // プロンプト構築
  const prompt = buildPrompt(action, STATE.mode);
  STATE.lastPrompt = prompt;
  STATE.lastAction = action;
  STATE.lastMode = STATE.mode;

  addLoading();

  try {
    console.log('=== PROMPT ===\n', prompt);
    let raw = await callKayra(prompt);
    console.log('=== RAW OUTPUT ===\n', raw);
    let text = cleanOutput(raw);
    console.log('=== CLEAN OUTPUT ===\n', text);

    // テキストが途中で切れてたら追加生成（1回だけ）
    // ただし文末（。！？…」』）で終わってたらそのままでOK
    const endsAtSentence = /[。！？…」』]$/.test(text.trim());
    if (text.length > 5 && text.length < 40 && !endsAtSentence) {
      const morePrompt = prompt + text;
      const more = await callKayra(morePrompt);
      const moreCleaned = cleanOutput(more);
      if (moreCleaned.length > 3) {
        text += moreCleaned;
      }
    }

    if (!text || text.length < 5) {
      text = '（物語の続きを生成できませんでした。もう一度試してください。）';
    }

    removeLoading();
    // 全モードで「すると、」で始まる表示
    const displayText = action ? 'すると、' + text : text;
    addBlock('narrator', displayText);

    // クリーンテキストを蓄積（buildPromptと同じ形式）
    // 品質チェック：壊れた文や繰り返しを蓄積しない
    let actionText = '';
    if (action) {
      const act = action.trim();
      let sentence = '';
      if (STATE.mode === 'say') {
        sentence = `${STATE.heroName}は「${act}」と言った。`;
      } else if (act.endsWith('る') || act.endsWith('す') || act.endsWith('く') || act.endsWith('ぐ') || act.endsWith('む') || act.endsWith('ぶ') || act.endsWith('つ') || act.endsWith('ぬ')) {
        sentence = `${STATE.heroName}は${act}ことにした。`;
      } else if (act.endsWith('した') || act.endsWith('った') || act.endsWith('いた') || act.endsWith('んだ')) {
        sentence = `${STATE.heroName}は${act}。`;
      } else if (act.endsWith('て') || act.endsWith('で')) {
        sentence = `${STATE.heroName}は${act}みた。`;
      } else {
        sentence = `${STATE.heroName}は${act}した。`;
      }
      actionText = sentence;
    }

    // AI出力の品質チェック — 壊れた文を蓄積しない
    let storeText = text;
    // 同じ助詞パターンが3回以上 → 壊れた文
    const particles = storeText.match(/は|が|を|に|で|の/g) || [];
    const avgLen = storeText.length / Math.max(particles.length, 1);
    if (avgLen < 3 && particles.length > 8) {
      // 助詞だらけの壊れた文 → 最初の文だけ保存
      const firstSentEnd = storeText.search(/[。！？」]/);
      storeText = firstSentEnd > 5 ? storeText.slice(0, firstSentEnd + 1) : '';
    }
    // エラーメッセージは蓄積しない
    if (storeText.startsWith('（')) storeText = '';

    if (storeText) {
      STATE.storyText += actionText + 'すると、' + storeText + '\n';
    } else {
      // 壊れた出力の場合、行動文だけ保存（文脈を維持）
      STATE.storyText += actionText + '\n';
    }

    // storyTextが長くなりすぎたら古い部分を切る（最大800文字）
    if (STATE.storyText.length > 800) {
      STATE.storyText = STATE.storyText.slice(-600);
      // 文頭を文末で切りそろえる
      const cut = STATE.storyText.search(/[。！？」]/);
      if (cut > 0) STATE.storyText = STATE.storyText.slice(cut + 1);
    }

  } catch (err) {
    removeLoading();
    addBlock('error', `エラー: ${err.message}`);
    console.error(err);
  }

  STATE.busy = false;
  setUIBusy(false);
}

// ===== CONTINUE =====
async function doContinue() {
  if (STATE.busy || STATE.storyText.length === 0) return;

  STATE.busy = true;
  setUIBusy(true);
  addLoading();

  // 行動なしで続きを生成
  const prompt = buildPrompt(null, 'story');
  STATE.lastPrompt = prompt;

  try {
    const raw = await callKayra(prompt);
    let text = cleanOutput(raw);

    if (!text || text.length < 5) {
      text = '（続きを生成できませんでした。）';
    }

    removeLoading();
    addBlock('narrator', text);
    if (!text.startsWith('（')) {
      STATE.storyText += text + '\n';
    }

  } catch (err) {
    removeLoading();
    addBlock('error', `エラー: ${err.message}`);
  }

  STATE.busy = false;
  setUIBusy(false);
}

// ===== RETRY =====
async function doRetry() {
  if (STATE.busy || !STATE.lastPrompt) return;

  // 最後のnarrator blockを削除
  const area = document.getElementById('story-area');
  const blocks = area.querySelectorAll('.story-block.narrator');
  if (blocks.length > 0) {
    const lastBlock = blocks[blocks.length - 1];
    // storyTextから最後の出力を除去
    const lastText = lastBlock.textContent;
    if (STATE.storyText.endsWith(lastText + '\n')) {
      STATE.storyText = STATE.storyText.slice(0, -(lastText.length + 1));
    }
    lastBlock.remove();
  }

  STATE.busy = true;
  setUIBusy(true);
  addLoading();

  try {
    // 同じプロンプトで再生成（temperatureが効くので違う結果になる）
    const raw = await callKayra(STATE.lastPrompt);
    let text = cleanOutput(raw);

    if (!text || text.length < 5) {
      text = '（生成できませんでした。）';
    }

    removeLoading();
    addBlock('narrator', text);

    // storyTextを更新（品質チェック付き）
    let retryStore = text;
    if (retryStore.startsWith('（')) retryStore = '';
    if (STATE.lastAction && retryStore) {
      STATE.storyText += `${STATE.heroName}は${STATE.lastAction}した。すると、${retryStore}\n`;
    } else if (retryStore) {
      STATE.storyText += retryStore + '\n';
    }

  } catch (err) {
    removeLoading();
    addBlock('error', `エラー: ${err.message}`);
  }

  STATE.busy = false;
  setUIBusy(false);
}

// ===== UI HELPERS =====
function setUIBusy(busy) {
  document.getElementById('btn-send').disabled = busy;
  document.getElementById('btn-continue').disabled = busy;
  document.getElementById('btn-retry').disabled = busy;
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
}

// Auto-resize textarea
document.getElementById('user-input')?.addEventListener('input', function() {
  this.style.height = '42px';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

// ===== SETTINGS =====
function showSettings() {
  document.getElementById('set-name').value = STATE.heroName;
  document.getElementById('set-hero').value = STATE.heroDesc;
  document.getElementById('set-world').value = STATE.world;
  document.getElementById('set-key').value = STATE.apiKey;
  document.getElementById('set-tone').value = STATE.tone;
  document.getElementById('settings-overlay').classList.add('show');
}

function hideSettings() {
  document.getElementById('settings-overlay').classList.remove('show');
}

function saveSettings() {
  STATE.heroName = document.getElementById('set-name').value.trim() || STATE.heroName;
  STATE.heroDesc = document.getElementById('set-hero').value.trim() || STATE.heroDesc;
  STATE.world = document.getElementById('set-world').value.trim() || STATE.world;
  STATE.apiKey = document.getElementById('set-key').value.trim() || STATE.apiKey;
  STATE.tone = document.getElementById('set-tone').value || STATE.tone;

  localStorage.setItem('chr_name', STATE.heroName);
  localStorage.setItem('chr_hero', STATE.heroDesc);
  localStorage.setItem('chr_world', STATE.world);
  localStorage.setItem('chronicle_key', STATE.apiKey);
  localStorage.setItem('chr_tone', STATE.tone);

  hideSettings();
  addBlock('system', '設定を更新しました。');
}
